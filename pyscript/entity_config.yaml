# ═══════════════════════════════════════════════════════════════════════════════
# Pyscript Entity Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Central config for hardware-tied entity IDs used across pyscript modules.
# Edit this file to reconfigure zones, trackers, calendars, etc.
# Changes take effect on pyscript reload (no code edits needed).
# ═══════════════════════════════════════════════════════════════════════════════

# FP2 zone map: binary_sensor entity → zone name
# Used by: presence_identity, presence_patterns, predictive_schedule,
#          routine_fingerprint, sleep_config, focus_guard
fp2_zones:
  binary_sensor.fp2_presence_sensor_workshop: workshop
  binary_sensor.fp2_presence_sensor_living_room: living_room
  binary_sensor.fp2_presence_sensor_main_room: main_room
  binary_sensor.fp2_presence_sensor_kitchen: kitchen
  binary_sensor.fp2_presence_sensor_bed: bed
  binary_sensor.fp2_presence_sensor_lobby: lobby
  binary_sensor.fp2_presence_sensor_bathroom: bathroom
  binary_sensor.fp2_presence_sensor_shower: shower

# Satellite → zone map
# Used by: presence_identity
satellite_zones:
  assist_satellite.home_assistant_voice_0905c5_assist_satellite: workshop
  assist_satellite.home_assistant_voice_0a0109_assist_satellite: living_room

# Agent persona → zone map
# Used by: presence_identity
agent_zones:
  rick: workshop
  quark: living_room

# Calendar entities (order: main, holidays, birthdays)
# Used by: calendar_promote
calendars:
  main: calendar.miquel_angel_cano_gmail_com
  holidays: calendar.holidays_in_spain
  birthdays: calendar.birthdays

# Music Assistant media players
# Used by: music_taste
music_players:
  - media_player.workshop_ma
  - media_player.bathroom_ma

# SpotifyPlus entity
# Used by: music_taste
spotifyplus_entity: media_player.spotifyplus_miquel_angel_madalone

# Outdoor temperature sensor (must report °C with unit_of_measurement)
# Used by: packages/ai_history_context.yaml (statistics platform — update entity_id there)
weather_temperature_entity: sensor.aemet_temperature

# IMAP sensor
# Used by: email_promote
imap_sensor: sensor.gmail_messages

# Scene Learner — zone-to-light mapping
# Used by: scene_learner
scene_learner_lights:
  workshop:
    - light.workshop_light
    - light.workshop_desk_2
    - light.workshop_main
  living_room:
    - light.controller_rgb_with_mic_bf0aec

# ═══════════════════════════════════════════════════════════════════════════════
# Per-person config overlay (Task 22)
# ═══════════════════════════════════════════════════════════════════════════════
# Keys match person.* entity slugs. Only non-discoverable config goes here —
# trackers, friendly_name, state are read from HA person.* entities at runtime.
# Used by: shared_utils.discover_persons()
persons:
  miquel:
    calendar: calendar.miquel_angel_cano_gmail_com
    notify_service: notify.mobile_app_oppo_a60
    spotify: media_player.spotifyplus_miquel_angel_madalone
    imap_sensor: sensor.gmail_messages
  jessica:
    calendar: ""
    notify_service: notify.mobile_app_oppo_a38
    spotify: ""
    imap_sensor: ""

# ═══════════════════════════════════════════════════════════════════════════════
# System Health — config for system_health.py
# ═══════════════════════════════════════════════════════════════════════════════
# Most check data is discovered dynamically at runtime:
#   Status sensors:   scanned from /config/pyscript/*.py (RESULT_ENTITY constants)
#   Services:         scanned from /config/pyscript/*.py (@service functions)
#   Helpers:          scanned from /config/helpers_input_*.yaml (ai_* keys)
#   Pipeline entities: satellite_zones (above) + dispatcher sensor attributes
# Only json_configs needs a static list (no single source to scan from).
# ═══════════════════════════════════════════════════════════════════════════════
# VSynced Speaker Groups — volume buddy mapping for duck_manager
# ═══════════════════════════════════════════════════════════════════════════════
# Per-zone player/alexa lists. Alexa devices are unreliable volume reporters;
# their buddy (first non-Alexa player in the same zone) is used instead.
# Used by: duck_manager (_get_volume_buddies)
vsync_zones:
  workshop:
    players:
      - media_player.workshop_sonos
    alexa:
      - media_player.miquel_s_2nd_echo_pop
      - media_player.miquel_s_echo_pop
  living_room:
    players:
      - media_player.ha_voice_pe_living_room_quark_esp
    alexa:
      - media_player.alexa
  main_room:
    players:
      - media_player.workshop_sonos
    alexa: []
  bed:
    players:
      - media_player.workshop_sonos
    alexa: []
  kitchen:
    players:
      - media_player.workshop_sonos
    alexa: []
  bathroom:
    players:
      - media_player.bathroom_sonos
    alexa: []
  lobby:
    players:
      - media_player.workshop_sonos
    alexa: []
  shower:
    players:
      - media_player.bathroom_sonos
    alexa: []

# ═══════════════════════════════════════════════════════════════════════════════
# Duck Manager — group, announcement, and satellite configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Used by: duck_manager (_get_duck_group, _get_announcement_players,
#          _get_duck_satellites)
duck:
  group:
    - media_player.madteevee
    - media_player.alexa
    - media_player.miquel_s_echo_pop
    - media_player.miquel_s_2nd_echo_pop
    - media_player.workshop_sonos
    - media_player.40pfs6009_12
  announcement_players:
    - media_player.home_assistant_voice_living_room_media_player_esp
    - media_player.home_assistant_voice_workshop_media_player_esp
  satellites:
    - assist_satellite.home_assistant_voice_0905c5_assist_satellite
    - assist_satellite.home_assistant_voice_0a0109_assist_satellite

system_health:
  json_configs:
    - /config/pyscript/tts_speaker_config.json
    - /config/pyscript/voice_mood_profile_map.json
    - /config/pyscript/model_pricing.json
