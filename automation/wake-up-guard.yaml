blueprint:
  name: "Wake-up guard – Snooze/Stop with TTS & mobile"
  author: madalone
  description: >
    ![Wake-up guard header](https://raw.githubusercontent.com/mmadalone/Project_Fronkensteen/main/images/header/wake-up-guard-header.jpg)

    # Wake-up guard

    Time-based wake-up with bed/workshop presence conditions, TTS announcements
    (static or LLM-generated), one snooze, mobile push with Snooze/Stop buttons,
    optional Assist Satellite TTS interrupt, and a music handoff script.

    ### Flow

    1. Fires at wake-up time on selected weekdays.
    2. Checks bed presence duration and workshop emptiness duration.
    3. Optionally turns on switches/lights.
    4. Prepares wake-up message (static or LLM).
    5. Optional mobile notification with Snooze/Stop.
    6. TTS announcement → wait for Snooze/Stop/timeout.
    7. If Snooze: pause, then repeat TTS + wait once more (second snooze = Stop).
    8. If Stop or final timeout: run music script, restore volume, clean up.

    ### Recent changes

    - **v6:** Style guide compliance — section keys renamed (AP-09),
      section display names to circled numbers (AP-09), three-line dividers
      (AP-09), plural top-level keys (AP-10b), min_version bump (AP-22),
      image reference fixed to match file on disk, changelog trimmed.
    - **v5:** Added trigger ID. Stripped redundant numbered comments — aliases
      are the primary documentation now. Added template justification comment
      on weekday condition. Added runtime validation warning on notify_service.
    - **v4:** Replaced hardcoded helper script calls with configurable inputs.
      Added `person_display_name` input for notification messages.
      Added selector documentation comments.

  domain: automation
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/wake-up-guard.yaml
  homeassistant:
    min_version: 2024.10.0

  input:
    # ===========================================================================
    # ① SCHEDULE & PRESENCE
    # ===========================================================================
    schedule:
      name: "① Schedule & presence"
      icon: mdi:calendar-clock
      collapsed: false
      description: >
        When the wake-up fires and what presence conditions must be met.
      input:
        active_days:
          name: Active weekdays
          description: >
            Days on which this wake-up should run. Only fires on selected days.
          default:
            - mon
            - tue
            - wed
            - thu
            - fri
          selector:
            select:
              multiple: true
              mode: list
              options:
                - label: Monday
                  value: mon
                - label: Tuesday
                  value: tue
                - label: Wednesday
                  value: wed
                - label: Thursday
                  value: thu
                - label: Friday
                  value: fri
                - label: Saturday
                  value: sat
                - label: Sunday
                  value: sun

        wakeup_time:
          name: Wake-up time
          description: >
            Time at which the wake-up guard fires. Combined with active weekdays
            to determine when the automation triggers.
          default: "07:00:00"
          selector:
            time: {}

        bed_presence_sensors:
          name: Bed presence sensors
          description: >
            One or more binary sensors that are ON when you are in bed (e.g. mmWave
            bed presence). ALL must have been continuously ON for at least the
            configured minimum minutes before wake-up time.
          default: []
          selector:
            entity:
              multiple: true
              domain: binary_sensor

        min_bed_minutes:
          name: Minutes in bed before wake-up
          description: >
            How many minutes ALL bed presence sensors must have been continuously ON
            before the wake-up time. This prevents false triggers if you just sat on
            the bed briefly. Uses last_changed to verify actual duration.
          default: 30
          selector:
            number:
              min: 1
              max: 240
              unit_of_measurement: min
              mode: slider

        workshop_presence_sensors:
          name: Workshop / living room presence sensors
          description: >
            One or more presence sensors for areas you'd be in if already awake.
            ALL must have been continuously OFF for the configured minimum minutes.
            Leave empty to skip this check entirely.
          default: []
          selector:
            entity:
              multiple: true
              domain: binary_sensor

        min_workshop_empty_minutes:
          name: Minutes workshop must have been empty
          description: >
            How many minutes ALL workshop sensors must have been continuously OFF
            before the wake-up time. Prevents firing if you're already up and about.
            Uses last_changed to verify actual duration.
          default: 15
          selector:
            number:
              min: 1
              max: 180
              unit_of_measurement: min
              mode: slider

    # ===========================================================================
    # ② LIGHTS & SWITCHES
    # ===========================================================================
    devices:
      name: "② Lights & switches"
      icon: mdi:lightbulb-on
      collapsed: true
      description: >
        Optional devices to turn on when the wake-up fires, and off during snooze.
      input:
        workshop_switches:
          name: Switches to turn on at wake-up
          description: >
            Optional switches (e.g. smart plugs, lamps) to turn ON when the wake-up
            triggers. Turned OFF during snooze, back ON after. Leave empty to skip.
          default: []
          selector:
            entity:
              domain: switch
              multiple: true

        workshop_lights:
          name: Lights to turn on at wake-up
          description: >
            Optional lights to turn ON when the wake-up triggers. Turned OFF during
            snooze, back ON after. Leave empty to skip.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    # ===========================================================================
    # ③ TTS & VOICE OUTPUT
    # ===========================================================================
    tts_voice:
      name: "③ TTS & voice output"
      icon: mdi:account-voice
      collapsed: true
      description: >
        Output speaker and volume levels.
      input:
        tts_output_player:
          name: Media player for TTS output
          description: >
            Speaker or speaker group where TTS will play.
          default: ""
          selector:
            entity:
              domain: media_player

        tts_volume_before:
          name: Volume before TTS
          description: >
            Volume level set on the TTS player BEFORE the wake-up announcement.
          default: 0.4
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.01
              mode: slider

        tts_volume_after:
          name: Volume after flow completes
          description: >
            Volume level restored on the TTS player AFTER the entire wake-up flow
            completes (Stop, snooze timeout, or music handoff).
          default: 0.4
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.01
              mode: slider

        stop_restore_delay:
          name: Delay before restoring volume on Stop
          description: >
            Seconds to wait before restoring TTS player volume after Stop. Prevents
            restoring volume while TTS audio is still draining from the buffer.
          default: 1
          selector:
            number:
              min: 0
              max: 30
              unit_of_measurement: s
              mode: slider

    # ===========================================================================
    # ④ WAKE-UP MESSAGE
    # ===========================================================================
    message:
      name: "④ Wake-up message"
      icon: mdi:robot-outline
      collapsed: true
      description: >
        Static fallback message or LLM-generated wake-up rant.
      input:
        tts_message:
          name: Static wake-up message (fallback)
          description: >
            Static message text used when LLM generation is disabled or when
            the LLM call fails. Always have a sensible fallback here.
          default: ""
          selector:
            text:
              multiline: true

        use_llm_wake_message:
          name: Generate message with LLM
          description: >
            If enabled, the wake-up message is generated on the fly by the
            conversation agent below. If disabled or the LLM call fails,
            falls back to the static message above.
          default: false
          selector:
            boolean: {}

        use_dispatcher:
          name: Use Dispatcher
          description: >-
            When enabled, the AI dispatcher selects the persona dynamically
            (ignoring the Voice Assistant selection above). When disabled, the
            Voice Assistant you selected above is used directly.
          default: true
          selector:
            boolean:

        llm_agent_id:
          name: Voice Assistant
          description: >
            The Voice Assistant (Assist Pipeline) used when the dispatcher is
            disabled. The pipeline bundles conversation agent, TTS engine,
            and TTS voice together.
          default: "Rick"
          selector:
            text:

        llm_wake_prompt:
          name: LLM prompt
          description: >
            Prompt sent to the conversation agent to generate the wake-up rant.
            The blueprint appends the snooze/stop window duration automatically
            so the LLM can calibrate message length.
          default: >-
            you are a sarcastic but supportive assistant waking the user up. make a
            single, continuous rant that roughly fits within the snooze/stop window,
            is annoying but not genuinely cruel, and ends with a clear call to get
            out of bed now.
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ⑤ SNOOZE/STOP CONTROLS
    # ===========================================================================
    controls:
      name: "⑤ Snooze/Stop controls"
      icon: mdi:alarm-snooze
      collapsed: true
      description: >
        Control toggles, music handoff, and timing for snooze/stop behavior.
      input:
        snooze_toggle:
          name: Snooze toggle (input_boolean)
          description: >
            Boolean helper used as the Snooze control flag. This blueprint turns it
            ON when snooze is triggered via mobile notification. Can also be driven
            from a dashboard button or another automation.
          default: ""
          selector:
            entity:
              domain: input_boolean

        stop_toggle:
          name: Stop toggle (input_boolean)
          description: >
            Boolean helper used as the Stop control flag. This blueprint turns it
            ON when stop is triggered via mobile notification. Can also be driven
            from a dashboard button or another automation.
          default: ""
          selector:
            entity:
              domain: input_boolean

        music_script:
          name: Wake-up music script
          description: >
            Script that starts your wake-up music or hands off to your music
            helper logic. Called when the snooze/stop window times out without
            user intervention.
          default: ""
          selector:
            entity:
              domain: script

        post_tts_timeout:
          name: Snooze/Stop window after TTS (seconds)
          description: >
            Seconds after TTS starts during which Snooze/Stop presses are
            listened for. If nothing is pressed, the automation proceeds to
            the music script.
          default: 40
          selector:
            number:
              min: 1
              max: 600
              unit_of_measurement: s
              mode: slider

        snooze_minutes:
          name: Snooze duration (minutes)
          description: >
            Minutes to wait during snooze before repeating the TTS announcement.
            Only ONE snooze is allowed — a second snooze press is treated as Stop.
          default: 7
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: min
              mode: slider

    # ===========================================================================
    # ⑥ OPTIONAL INTEGRATIONS
    # ===========================================================================
    optional:
      name: "⑥ Optional integrations"
      icon: mdi:puzzle-outline
      collapsed: true
      description: >
        Mobile notifications, Assist Satellite, person name, and companion
        helper scripts. All have sensible defaults.
      input:
        person_display_name:
          name: Person display name
          description: >
            Name used in notification messages (e.g. "time to get up, <name>").
            Change this to the name of the person being woken up.
          default: ""
          selector:
            text: {}

        # NOTE: text selector used because HA blueprints have no native
        # notify-service selector. The value is injected as a dynamic action
        # via `action: !input notify_service`, so load-time validation is
        # not possible — a bad value will only fail at runtime.
        notify_service:
          name: Mobile notify service
          description: >
            Notify service for mobile push with Snooze/Stop buttons (e.g.
            notify.mobile_app_yourphone). Leave empty to skip mobile notifications.
            The notification uses actions GUARD_SNOOZE and GUARD_STOP.
          default: ""
          selector:
            text: {}

        # NOTE: assist_satellite domain has no device_class to filter on;
        # domain-only filter is the best available constraint.
        assist_satellite_entity:
          name: Assist Satellite entity
          description: >
            Optional Assist Satellite for interrupting TTS faster and speaking
            short confirmations (e.g. "ok, snoozing"). Leave empty to skip.
          default: ""
          selector:
            entity:
              domain: assist_satellite

        tts_speak_script:
          name: TTS speak helper script
          description: >
            Script that routes TTS announcements (handles ElevenLabs custom
            vs standard engines). Override only if you use a different helper.
          default: script.wake_guard_tts_speak
          selector:
            entity:
              domain: script

        stop_cleanup_script:
          name: Stop cleanup helper script
          description: >
            Script that handles stop cleanup (stop playback, satellite
            announcement, volume restore, toggle reset). Override only if
            you use a different helper.
          default: script.wake_guard_stop_cleanup
          selector:
            entity:
              domain: script

        bypass_follow_me:
          name: Bypass Notification Follow-Me
          description: >
            Temporarily pause notification follow-me during the wake-up
            sequence to prevent notifications from interrupting the alarm.
          default: true
          selector:
            boolean: {}

        bypass_claim_script:
          name: Refcount claim script
          description: >
            Script entity that registers a bypass claim. Create from the
            Refcount Bypass — Claim blueprint.
          default: script.refcount_bypass_claim
          selector:
            entity:
              domain: script

        bypass_release_script:
          name: Refcount release script
          description: >
            Script entity that releases a bypass claim. Create from the
            Refcount Bypass — Release blueprint.
          default: script.refcount_bypass_release
          selector:
            entity:
              domain: script

    # ===========================================================================
    # ⑦ MUSIC
    # ===========================================================================
    music:
      name: "⑦ Music"
      icon: mdi:music-note
      description: >-
        Pre-TTS stinger/chime via music composition. Resolved chime
        path is passed to tts_queue_speak chime_path parameter.
      collapsed: true
      input:
        enable_pre_tts_stinger:
          name: Enable pre-TTS stinger
          description: >-
            When enabled, resolves a chime/stinger and passes it to
            tts_queue_speak for pre-TTS playback.
          default: false
          selector:
            boolean:

        stinger_agent:
          name: Stinger agent override
          description: >-
            Agent persona for library/compose lookups. Empty = use the
            dispatched persona.
          default: ""
          selector:
            text:

        stinger_library_id_override:
          name: Stinger library ID override
          description: >-
            Explicit music library ID. When set, skips auto-resolve
            and compose — builds path directly.
          default: ""
          selector:
            text:

        compose_stinger_if_missing:
          name: Compose if not in library
          description: >-
            When auto-resolve finds no matching chime, compose one
            locally via FluidSynth. When off, uses fallback URL.
          default: true
          selector:
            boolean:

        stinger_fallback_media_url:
          name: Stinger fallback media URL
          description: >-
            URL or path to a fallback chime file when library lookup
            and compose both fail. Empty = no chime on failure.
          default: ""
          selector:
            text:

    # ===========================================================================
    # ⑧ INFRASTRUCTURE
    # ===========================================================================
    infrastructure:
      name: "⑦ Infrastructure"
      icon: mdi:cog
      collapsed: true
      description: "Shared entity references for the duck guard system."
      input:
        ducking_flag:
          name: "Ducking flag entity"
          description: "Boolean indicating audio ducking is active."
          default: input_boolean.ai_ducking_flag
          selector:
            entity:
              domain: input_boolean
        duck_guard_enabled:
          name: "Duck guard enabled entity"
          description: "Boolean that enables the duck guard system."
          default: input_boolean.ai_duck_guard_enabled
          selector:
            entity:
              domain: input_boolean

        dispatcher_enabled:
          name: "Dispatcher enabled entity"
          description: "Boolean that enables the AI agent dispatcher."
          default: input_boolean.ai_dispatcher_enabled
          selector:
            entity:
              domain: input_boolean

    # ===========================================================================
    # ⑨ PRIVACY
    # ===========================================================================
    privacy:
      name: "⑨ Privacy"
      icon: mdi:shield-account
      collapsed: true
      input:
        privacy_tier:
          name: Privacy gate tier
          description: >
            Which privacy tier this feature belongs to. When the other
            household member's identity confidence crosses the tier's
            threshold, this automation is suppressed.
            Off = no privacy gating.
          default: "t1"
          selector:
            select:
              options:
                - label: "Off — no privacy gating"
                  value: "off"
                - label: "T1 — Intimate (bedtime/wake)"
                  value: "t1"
                - label: "T2 — Personal (notifications/briefings)"
                  value: "t2"
                - label: "T3 — Ambient (detection/tracking)"
                  value: "t3"
        privacy_gate_enabled:
          name: "Privacy gate enabled entity"
          description: "Boolean that enables the privacy gate system."
          default: input_boolean.ai_privacy_gate_enabled
          selector:
            entity:
              domain: input_boolean
        privacy_gate_mode:
          name: "Privacy gate mode entity"
          description: "Select that controls privacy gate behavior (auto/force_suppress/force_allow)."
          default: input_select.ai_privacy_gate_mode
          selector:
            entity:
              domain: input_select
        privacy_gate_person:
          name: "Privacy gate person"
          description: "Person entity for tier suppression lookups."
          default: ""
          selector:
            entity:
              domain: person

    # ===========================================================================
    # ⑩ USER PREFERENCES
    # ===========================================================================
    user_preferences:
      name: "⑩ User Preferences"
      icon: mdi:account-cog
      description: "User preference injection and preference-based wake time."
      collapsed: true
      input:
        enable_user_preferences:
          name: "Enable user preference injection"
          description: "Inject user preferences into wake-up prompts."
          default: true
          selector:
            boolean:
        use_preference_wake_time:
          name: "Use preference wake time"
          description: >
            Override the static wake-up time with the user's preference wake time
            helpers. Supports weekday, weekend, and alt-day schedules.
          default: false
          selector:
            boolean:
        pref_wake_weekday_entity:
          name: "Weekday wake time entity"
          description: "input_datetime helper for weekday wake time."
          default: input_datetime.ai_time_placeholder
          selector:
            entity:
              domain: input_datetime
        pref_wake_weekend_entity:
          name: "Weekend wake time entity"
          description: "input_datetime helper for weekend wake time."
          default: input_datetime.ai_time_placeholder
          selector:
            entity:
              domain: input_datetime
        pref_wake_alt_entity:
          name: "Alt weekday wake time entity"
          description: "input_datetime helper for alternate weekday wake time."
          default: input_datetime.ai_time_placeholder
          selector:
            entity:
              domain: input_datetime
        pref_wake_alt_days:
          name: "Alt wake days"
          description: >
            Comma-separated English 3-letter day abbreviations that use the alt
            wake time (e.g., "thu" or "tue,thu"). Leave empty to disable.
          default: ""
          selector:
            text:

mode: single
max_exceeded: silent

variables:
  v_active_days: !input active_days
  use_dispatcher: !input use_dispatcher
  v_dispatcher_enabled: !input dispatcher_enabled
  v_pipeline_name: !input llm_agent_id
  v_tts_output_player: !input tts_output_player
  v_notify_service: !input notify_service
  v_assist_satellite: !input assist_satellite_entity
  v_use_llm_wake: !input use_llm_wake_message
  v_llm_wake_prompt: !input llm_wake_prompt
  v_post_tts_timeout: !input post_tts_timeout
  v_bed_presence_sensors: !input bed_presence_sensors
  v_min_bed_minutes: !input min_bed_minutes
  v_workshop_presence_sensors: !input workshop_presence_sensors
  v_min_workshop_empty_minutes: !input min_workshop_empty_minutes
  v_snooze_toggle: !input snooze_toggle
  v_stop_toggle: !input stop_toggle
  v_workshop_switches: !input workshop_switches
  v_workshop_lights: !input workshop_lights
  v_tts_volume_before: !input tts_volume_before
  v_tts_volume_after: !input tts_volume_after
  v_stop_restore_delay: !input stop_restore_delay
  v_music_script: !input music_script
  v_snooze_minutes: !input snooze_minutes
  v_person_name: !input person_display_name
  v_tts_speak_script: !input tts_speak_script
  v_stop_cleanup_script: !input stop_cleanup_script
  v_ducking_flag: !input ducking_flag
  v_duck_guard: !input duck_guard_enabled
  v_bypass_follow_me: !input bypass_follow_me
  v_bypass_claim: !input bypass_claim_script
  v_bypass_release: !input bypass_release_script
  privacy_tier: !input privacy_tier
  v_privacy_enabled: !input privacy_gate_enabled
  v_privacy_mode: !input privacy_gate_mode
  v_privacy_person: !input privacy_gate_person
  v_privacy_slug: "{{ v_privacy_person.split('.')[-1] }}"
  # ── Music stinger inputs ──
  v_enable_stinger: !input enable_pre_tts_stinger
  v_stinger_agent: !input stinger_agent
  v_stinger_library_id: !input stinger_library_id_override
  v_compose_if_missing: !input compose_stinger_if_missing
  v_stinger_fallback_url: !input stinger_fallback_media_url
  # ── User preference inputs ──
  enable_user_prefs: !input enable_user_preferences
  use_pref_wake: !input use_preference_wake_time
  pref_alt_days_val: !input pref_wake_alt_days
  # ── User preference context ──
  _resolved_user: >-
    {% set _primary = states('input_text.ai_primary_user') | default('', true) %}
    {% set occ = states('sensor.occupancy_mode') | default('unknown') %}
    {% if occ.startswith('solo_') %}{{ occ.replace('solo_', '') }}
    {% elif occ in ['dual', 'home'] %}{{ state_attr('sensor.occupancy_mode', 'persons') | first | default(_primary) }}
    {% else %}{{ _primary }}{% endif %}
  _user_prefs_block: >-
    {% set ns = namespace(lines=[]) %}
    {% set humor = states('input_text.ai_context_user_humor_' ~ _resolved_user) | default('', true) %}
    {% set off_limits = states('input_text.ai_context_user_off_limits_' ~ _resolved_user) | default('', true) %}
    {% set verbosity = states('input_text.ai_context_user_verbosity_' ~ _resolved_user) | default('', true) %}
    {% set morning_night = states('input_text.ai_context_user_morning_or_night_' ~ _resolved_user) | default('', true) %}
    {% if off_limits not in ['unknown','unavailable','','None'] %}
      {% set ns.lines = ns.lines + ['NEVER mention: ' ~ off_limits ~ '.'] %}
    {% endif %}
    {% if humor not in ['unknown','unavailable','','None'] %}
      {% set ns.lines = ns.lines + ['Humor preference: ' ~ humor ~ '.'] %}
    {% endif %}
    {% if verbosity not in ['unknown','unavailable','','None'] %}
      {% set ns.lines = ns.lines + ['Verbosity: ' ~ verbosity ~ '.'] %}
    {% endif %}
    {% if morning_night not in ['unknown','unavailable','','None'] %}
      {% set ns.lines = ns.lines + ['User is a ' ~ morning_night ~ '.'] %}
    {% endif %}
    {{ ns.lines | join(' ') if ns.lines else '' }}

triggers:
  - alias: "Wake-up time on selected days"
    id: wake_time
    trigger: time
    at: !input wakeup_time
  - alias: "Preference weekday wake time"
    trigger: time
    at: !input pref_wake_weekday_entity
    id: pref_weekday
  - alias: "Preference weekend wake time"
    trigger: time
    at: !input pref_wake_weekend_entity
    id: pref_weekend
  - alias: "Preference alt weekday wake time"
    trigger: time
    at: !input pref_wake_alt_entity
    id: pref_alt

conditions:
  - alias: "Gate — trigger source (static vs preference)"
    condition: template
    value_template: >-
      {% set trig = trigger.id | default('wake_time') %}
      {% if not (use_pref_wake | bool(false)) %}
        {{ trig not in ['pref_weekday', 'pref_weekend', 'pref_alt'] }}
      {% else %}
        {% if trig not in ['pref_weekday', 'pref_weekend', 'pref_alt'] %}
          false
        {% else %}
          {% set today_dow = now().strftime('%a')[:3] | lower %}
          {% set alt_list = pref_alt_days_val.lower().split(',') | map('trim') | list if pref_alt_days_val not in ['','unknown','unavailable','None'] else [] %}
          {% if today_dow in alt_list %}
            {{ trig == 'pref_alt' }}
          {% elif today_dow in ['sat','sun'] %}
            {{ trig == 'pref_weekend' }}
          {% else %}
            {{ trig == 'pref_weekday' }}
          {% endif %}
        {% endif %}
      {% endif %}

  # NOTE: No native condition for "is today in a user-selected list of
  # weekday abbreviations." Template is the only option here.
  - alias: "Today is in active_days"
    condition: template
    value_template: >-
      {{ ['mon','tue','wed','thu','fri','sat','sun'][now().weekday()] in v_active_days }}

  # Uses last_changed to check actual duration, not just current state.
  # Returns false if no sensors configured (safety).
  - alias: "Bed presence ON for at least min_bed_minutes"
    condition: template
    value_template: >-
      {% set sensors = expand(v_bed_presence_sensors | default([])) %}
      {% set min_secs = (v_min_bed_minutes | int(0)) * 60 %}
      {% if sensors | length == 0 %}
        false
      {% else %}
        {% set ns = namespace(ok=true) %}
        {% for s in sensors %}
          {% if s.state != 'on'
             or (now() - s.last_changed).total_seconds() < min_secs %}
            {% set ns.ok = false %}
          {% endif %}
        {% endfor %}
        {{ ns.ok }}
      {% endif %}

  # Skipped (returns true) when no sensors are configured.
  - alias: "Workshop empty for at least min_workshop_empty_minutes (if configured)"
    condition: template
    value_template: >-
      {% set sensors = expand(v_workshop_presence_sensors | default([])) %}
      {% if sensors | length == 0 %}
        true
      {% else %}
        {% set min_secs = (v_min_workshop_empty_minutes | int(0)) * 60 %}
        {% set ns = namespace(ok=true) %}
        {% for s in sensors %}
          {% if s.state != 'off'
             or (now() - s.last_changed).total_seconds() < min_secs %}
            {% set ns.ok = false %}
          {% endif %}
        {% endfor %}
        {{ ns.ok }}
      {% endif %}

  - alias: "Privacy gate"
    condition: template
    value_template: >-
      {%- set tier = privacy_tier -%}
      {%- set mode = states(v_privacy_mode) | default('off') -%}
      {%- set override = states('input_select.ai_privacy_gate_wake_up_guard') | default('off') -%}
      {%- if tier == 'off'
          or not is_state(v_privacy_enabled, 'on')
          or mode == 'force_allow_all' or override == 'force_allow'
          or override == 'off' -%}
        true
      {%- elif mode == 'force_suppress_all' or override == 'force_suppress' -%}
        false
      {%- else -%}
        {{ is_state('input_boolean.ai_privacy_gate_' ~ v_privacy_slug ~ '_' ~ tier ~ '_suppressed', 'off') }}
      {%- endif -%}

actions:
  # ── Infrastructure: Agent selection — dispatcher > manual ─────────────
  - alias: "Agent selection — dispatcher > manual"
    choose:
      - alias: "Dispatcher path"
        conditions:
          - condition: template
            value_template: >-
              {{ use_dispatcher and is_state(v_dispatcher_enabled, 'on') }}
        sequence:
          - alias: "Dispatch agent for wake-up"
            action: pyscript.agent_dispatch
            response_variable: dispatch
            data:
              wake_word: "proactive_wakeup"
              intent_text: "wake-up alarm"
              skip_continuity: true
            continue_on_error: true

          - alias: "Set dispatch agent and 3 more variables"
            variables:
              dispatch_agent: "{{ (dispatch | default({})).get('agent', '') }}"
              dispatch_voice: "{{ (dispatch | default({})).get('tts_engine', '') }}"
              dispatch_tts_voice: "{{ (dispatch | default({})).get('tts_voice', '') }}"
              dispatch_persona: "{{ (dispatch | default({})).get('persona', 'rick') }}"
    default:
      - alias: "Resolve manually selected pipeline to agent"
        action: pyscript.agent_dispatch
        response_variable: pipeline_resolve
        data:
          pipeline_name: "{{ v_pipeline_name }}"
        continue_on_error: true
      - alias: "Set dispatch agent and 3 more variables"
        variables:
          dispatch_agent: "{{ (pipeline_resolve | default({})).get('agent', '') }}"
          dispatch_voice: "{{ (pipeline_resolve | default({})).get('tts_engine', '') }}"
          dispatch_tts_voice: "{{ (pipeline_resolve | default({})).get('tts_voice', '') }}"
          dispatch_persona: "{{ (pipeline_resolve | default({})).get('persona', 'rick') }}"

  # ── Bypass follow-me during wake-up sequence ──────────────────
  - alias: "Set follow me was on"
    variables:
      follow_me_was_on: >-
        {{ v_bypass_follow_me | default(false)
           and is_state('input_boolean.ai_notification_follow_me', 'on') }}

  - alias: "Bypass follow-me (if configured)"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Claim follow-me bypass via refcount"
            action: "{{ v_bypass_claim }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  - alias: "Turn ON switches (optional)"
    action: switch.turn_on
    target:
      entity_id: !input workshop_switches
    continue_on_error: true

  - alias: "Turn ON lights (optional)"
    action: light.turn_on
    target:
      entity_id: !input workshop_lights
    continue_on_error: true

  - alias: "Set TTS player volume before wake-up TTS"
    action: media_player.volume_set
    target:
      entity_id: !input tts_output_player
    data:
      volume_level: !input tts_volume_before

  - alias: "Update duck snapshot if active (pre-TTS)"
    if:
      - condition: template
        value_template: >-
          {{ is_state(v_duck_guard, 'on')
             and is_state(v_ducking_flag, 'on') }}
    then:
      - alias: "Sync duck snapshot with pre-TTS volume"
        action: pyscript.duck_manager_update_snapshot
        data:
          entity_id: "{{ v_tts_output_player }}"
          volume_level: "{{ v_tts_volume_before }}"
        continue_on_error: true

  # LLM step below may overwrite this if enabled and successful.
  - alias: "Prepare wake-up message (static fallback)"
    variables:
      wake_message: !input tts_message

  # Falls back to static message on failure via continue_on_error + default().
  - alias: "Generate wake-up text via LLM (if enabled)"
    choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ v_use_llm_wake and (dispatch_agent | default('') | string | length > 0) }}
        sequence:
          - alias: "Call conversation.process for wake-up message"
            action: conversation.process
            data:
              agent_id: "{{ dispatch_agent }}"
              text: >-
                [ALARM — do NOT call any functions or tools. Respond only with speech text, no actions.]
                {{ (v_llm_wake_prompt | default('') | string)
                   ~ '\n\nsnooze_stop_window_seconds: '
                   ~ (v_post_tts_timeout | string) }}
                {% if enable_user_prefs | bool(true) %}
                {% if _user_prefs_block | trim | length > 0 %}
                User context: {{ _user_prefs_block }}
                {% endif %}
                {% endif %}
            response_variable: wake_llm
            continue_on_error: true

          - alias: "Extract LLM response (fall back to static on any failure)"
            variables:
              wake_message: >-
                {% set speech = (wake_llm | default({}))
                    .get('response', {})
                    .get('speech', {})
                    .get('plain', {})
                    .get('speech', '') %}
                {{ speech if speech | length > 0 else wake_message }}

          - alias: "Post-interaction whisper"
            action: pyscript.agent_whisper
            response_variable: _whisper
            data:
              agent_name: "{{ dispatch_persona }}"
              source: "automation"
              user_query: "wake-up alarm"
              agent_response: "{{ wake_message[:200] }}"
            continue_on_error: true

  - alias: "Send mobile notification (optional)"
    choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ (v_notify_service | default('')) | string | length > 0 }}
        sequence:
          # NOTE: action: !input injects the service name as a string at
          # runtime — a typo in the input will only fail when this fires,
          # not at automation load time. No load-time validation is possible.
          - alias: "Push Snooze/Stop notification"
            action: !input notify_service
            data:
              title: "Wake-up alarm"
              message: "time to get up, {{ v_person_name }}. snooze or stop?"
              data:
                actions:
                  - alias: "Call GUARD_SNOOZE"
                    action: "GUARD_SNOOZE"
                    title: "Snooze alarm"
                  - alias: "Call GUARD_STOP"
                    action: "GUARD_STOP"
                    title: "Stop alarm"
    default: []

  # ---------------------------------------------------------------------------
  # Resolve chime path (before TTS delivery)
  # ---------------------------------------------------------------------------
  - alias: "Resolve pre-TTS chime path"
    variables:
      v_wake_chime_path: ""
  - alias: "Chime resolution (when stinger enabled)"
    if:
      - condition: template
        value_template: "{{ v_enable_stinger | bool(false) }}"
    then:
      - choose:
          # Tier 1: Explicit library ID → build path
          - alias: "Tier 1 — Explicit library ID"
            conditions:
              - condition: template
                value_template: "{{ v_stinger_library_id | default('') | length > 0 }}"
            sequence:
              - variables:
                  v_wake_chime_path: "/local/music_cache/production/{{ v_stinger_library_id }}.mp3"

          # Tier 2: Auto-resolve by agent + content type
          - alias: "Tier 2 — Auto-resolve / compose"
            conditions:
              - condition: template
                value_template: "{{ v_stinger_library_id | default('') | length == 0 }}"
            sequence:
              - action: pyscript.music_compose_get
                response_variable: _chime_lookup
                data:
                  agent: "{{ v_stinger_agent if v_stinger_agent | default('') | length > 0 else dispatch_persona | default('rick') }}"
                  content_type: "chime"
                continue_on_error: true
              - choose:
                  - alias: "Library hit"
                    conditions:
                      - condition: template
                        value_template: "{{ (_chime_lookup | default({})).get('status', '') == 'ok' }}"
                    sequence:
                      - variables:
                          v_wake_chime_path: "{{ (_chime_lookup.get('file_path', '') | replace('/config/www/', '/local/')) }}"
                  - alias: "Not found — compose locally"
                    conditions:
                      - condition: template
                        value_template: >-
                          {{ (_chime_lookup | default({})).get('status', '') == 'not_found'
                             and v_compose_if_missing | bool(true) }}
                    sequence:
                      - action: pyscript.music_compose_local
                        response_variable: _local
                        data:
                          agent: "{{ v_stinger_agent if v_stinger_agent | default('') | length > 0 else dispatch_persona | default('rick') }}"
                          content_type: "chime"
                          duration_s: 2.0
                        continue_on_error: true
                      - if: "{{ (_local | default({})).get('status', '') == 'ok' }}"
                        then:
                          - variables:
                              v_wake_chime_path: "{{ (_local.get('file_path', '') | replace('/config/www/', '/local/')) }}"
                default:
                  # Tier 3: Fallback URL
                  - if: "{{ v_stinger_fallback_url | default('') | length > 0 }}"
                    then:
                      - variables:
                          v_wake_chime_path: "{{ v_stinger_fallback_url }}"

  - alias: "Wake-up TTS announcement"
    action: pyscript.tts_queue_speak
    response_variable: _tts
    data:
      text: "{{ wake_message }}"
      voice: "{{ dispatch_voice }}"
      voice_id: "{{ dispatch_tts_voice }}"
      chime_path: "{{ v_wake_chime_path | default('') }}"
      priority: 1
      target_mode: explicit
      target: "{{ v_tts_output_player }}"

  - alias: "Whisper — update self-awareness"
    action: pyscript.agent_whisper
    data:
      agent_name: "{{ dispatch_persona }}"
      source: "automation"
      user_query: "Delivered wake-up alarm announcement"
    continue_on_error: true

  # ── Release bypass BEFORE wait_for_trigger ──────────────────────────
  #     Bypass only needed during TTS delivery. Holding it through
  #     snooze delays and wait_for_trigger timeouts strands the counter
  #     on reload/restart/kill. TTS queue priority handles concurrency.
  - alias: "Release follow-me bypass after TTS delivery"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Release follow-me bypass via refcount (post-TTS)"
            action: "{{ v_bypass_release }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  # Listens for mobile notification action events AND input_boolean toggles
  # (dashboard / other automation).
  - alias: "Wait for snooze/stop or timeout (pass 1)"
    wait_for_trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: "GUARD_SNOOZE"
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: "GUARD_STOP"
      - trigger: state
        entity_id: !input snooze_toggle
        to: "on"
      - trigger: state
        entity_id: !input stop_toggle
        to: "on"
    timeout:
      seconds: !input post_tts_timeout
    continue_on_timeout: true

  # Normalize mobile events into toggles so downstream logic only checks
  # toggle state.
  - alias: "Sync mobile events into toggles (pass 1)"
    choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ wait.trigger is not none
                 and wait.trigger.platform == 'event'
                 and (wait.trigger.event.data.action | default('')) == 'GUARD_SNOOZE' }}
        sequence:
          - alias: "Set snooze toggle ON"
            action: input_boolean.turn_on
            target:
              entity_id: !input snooze_toggle

      - conditions:
          - condition: template
            value_template: >-
              {{ wait.trigger is not none
                 and wait.trigger.platform == 'event'
                 and (wait.trigger.event.data.action | default('')) == 'GUARD_STOP' }}
        sequence:
          - alias: "Set stop toggle ON"
            action: input_boolean.turn_on
            target:
              entity_id: !input stop_toggle
    default: []

  # Main state machine branch point.
  - alias: "Handle snooze / stop / timeout (pass 1)"
    choose:
      # ── STOP BRANCH ──────────────────────────────────────────────────
      - alias: "STOP: user pressed stop"
        conditions:
          - condition: state
            entity_id: !input stop_toggle
            state: "on"
        sequence:
          - alias: "Stop cleanup via helper script"
            action: "{{ v_stop_cleanup_script }}"
            data:
              tts_output_player: "{{ v_tts_output_player }}"
              assist_satellite_entity: "{{ v_assist_satellite }}"
              satellite_message: "ok, stopping the wake-up alarm."
              tts_volume_after: "{{ v_tts_volume_after }}"
              stop_restore_delay: "{{ v_stop_restore_delay }}"
              snooze_toggle: "{{ v_snooze_toggle }}"
              stop_toggle: "{{ v_stop_toggle }}"

          # Bypass already released after TTS delivery (see above)

          - alias: "Stop: Wake-up completed after Stop."
            stop: "Wake-up completed after Stop."

      # ── SNOOZE BRANCH ────────────────────────────────────────────────
      - alias: "SNOOZE: user pressed snooze"
        conditions:
          - condition: state
            entity_id: !input snooze_toggle
            state: "on"
        sequence:
          - alias: "Stop TTS playback for snooze"
            action: media_player.media_stop
            target:
              entity_id: !input tts_output_player

          - alias: "Announce snooze via Assist Satellite (if configured)"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (v_assist_satellite | default('')) | length > 0 }}
                sequence:
                  - alias: "Satellite: snoozing announcement"
                    action: assist_satellite.announce
                    target:
                      entity_id: !input assist_satellite_entity
                    data:
                      message: "ok, snoozing the wake-up alarm."
            default: []

          - alias: "Reset snooze toggle"
            action: input_boolean.turn_off
            target:
              entity_id: !input snooze_toggle
            continue_on_error: true

          # Turn off devices so the room goes dark during snooze.
          - alias: "Turn OFF switches during snooze"
            action: switch.turn_off
            target:
              entity_id: !input workshop_switches
            continue_on_error: true

          - alias: "Turn OFF lights during snooze"
            action: light.turn_off
            target:
              entity_id: !input workshop_lights
            continue_on_error: true

          - alias: "Snooze delay"
            delay:
              minutes: !input snooze_minutes

          - alias: "Resend mobile notification after snooze"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (v_notify_service | default('')) | string | length > 0 }}
                sequence:
                  - alias: "Push Snooze/Stop notification (after snooze)"
                    action: !input notify_service
                    data:
                      title: "Wake-up alarm (after snooze)"
                      message: "the wake-up alarm is back. snooze or stop?"
                      data:
                        actions:
                          - alias: "Call GUARD_SNOOZE"
                            action: "GUARD_SNOOZE"
                            title: "Snooze again"
                          - alias: "Call GUARD_STOP"
                            action: "GUARD_STOP"
                            title: "Stop alarm"
            default: []

          - alias: "Turn ON switches after snooze"
            action: switch.turn_on
            target:
              entity_id: !input workshop_switches
            continue_on_error: true

          - alias: "Turn ON lights after snooze"
            action: light.turn_on
            target:
              entity_id: !input workshop_lights
            continue_on_error: true

          - alias: "Set TTS player volume before wake-up TTS (pass 2)"
            action: media_player.volume_set
            target:
              entity_id: !input tts_output_player
            data:
              volume_level: !input tts_volume_before

          - alias: "Update duck snapshot if active (pass 2 pre-TTS)"
            if:
              - condition: template
                value_template: >-
                  {{ is_state(v_duck_guard, 'on')
                     and is_state(v_ducking_flag, 'on') }}
            then:
              - alias: "Sync duck snapshot with pass-2 pre-TTS volume"
                action: pyscript.duck_manager_update_snapshot
                data:
                  entity_id: "{{ v_tts_output_player }}"
                  volume_level: "{{ v_tts_volume_before }}"
                continue_on_error: true

          - alias: "Wake-up TTS announcement (pass 2)"
            action: pyscript.tts_queue_speak
            data:
              text: "{{ wake_message }}"
              voice: "{{ dispatch_voice }}"
              voice_id: "{{ dispatch_tts_voice }}"
              chime_path: "{{ v_wake_chime_path | default('') }}"
              priority: 1
              target_mode: explicit
              target: "{{ v_tts_output_player }}"

          - alias: "Wait for snooze/stop or timeout (pass 2)"
            wait_for_trigger:
              - trigger: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "GUARD_SNOOZE"
              - trigger: event
                event_type: mobile_app_notification_action
                event_data:
                  action: "GUARD_STOP"
              - trigger: state
                entity_id: !input snooze_toggle
                to: "on"
              - trigger: state
                entity_id: !input stop_toggle
                to: "on"
            timeout:
              seconds: !input post_tts_timeout
            continue_on_timeout: true

          - alias: "Sync mobile events into toggles (pass 2)"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ wait.trigger is not none
                         and wait.trigger.platform == 'event'
                         and (wait.trigger.event.data.action | default('')) == 'GUARD_SNOOZE' }}
                sequence:
                  - alias: "Set snooze toggle ON (pass 2)"
                    action: input_boolean.turn_on
                    target:
                      entity_id: !input snooze_toggle
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ wait.trigger is not none
                         and wait.trigger.platform == 'event'
                         and (wait.trigger.event.data.action | default('')) == 'GUARD_STOP' }}
                sequence:
                  - alias: "Set stop toggle ON (pass 2)"
                    action: input_boolean.turn_on
                    target:
                      entity_id: !input stop_toggle
            default: []

          # Second snooze press is treated as Stop.
          - alias: "Handle snooze/stop/timeout (pass 2)"
            choose:
              # STOP after snooze
              - alias: "STOP after snooze"
                conditions:
                  - condition: state
                    entity_id: !input stop_toggle
                    state: "on"
                sequence:
                  - alias: "Stop cleanup via helper script (after snooze)"
                    action: "{{ v_stop_cleanup_script }}"
                    data:
                      tts_output_player: "{{ v_tts_output_player }}"
                      assist_satellite_entity: "{{ v_assist_satellite }}"
                      satellite_message: "ok, stopping the wake-up alarm."
                      tts_volume_after: "{{ v_tts_volume_after }}"
                      stop_restore_delay: "{{ v_stop_restore_delay }}"
                      snooze_toggle: "{{ v_snooze_toggle }}"
                      stop_toggle: "{{ v_stop_toggle }}"

                  # Bypass already released after TTS delivery (see above)

                  - alias: "Stop: Wake-up completed after snooze + Stop."
                    stop: "Wake-up completed after snooze + Stop."

              # Second snooze = treated as Stop (no infinite snooze)
              - alias: "Second snooze = Stop"
                conditions:
                  - condition: state
                    entity_id: !input snooze_toggle
                    state: "on"
                sequence:
                  - alias: "Stop cleanup via helper script (second snooze)"
                    action: "{{ v_stop_cleanup_script }}"
                    data:
                      tts_output_player: "{{ v_tts_output_player }}"
                      assist_satellite_entity: "{{ v_assist_satellite }}"
                      satellite_message: "no more snoozing. get up."
                      tts_volume_after: "{{ v_tts_volume_after }}"
                      stop_restore_delay: "{{ v_stop_restore_delay }}"
                      snooze_toggle: "{{ v_snooze_toggle }}"
                      stop_toggle: "{{ v_stop_toggle }}"

                  # Bypass already released after TTS delivery (see above)

                  - alias: "Stop: Wake-up completed after second snooze (treated as Stop)."
                    stop: "Wake-up completed after second snooze (treated as Stop)."

            # No input received — hand off to music.
            default:
              - alias: "Run wake-up music script (after snooze timeout)"
                action: script.turn_on
                target:
                  entity_id: !input music_script

              - alias: "Restore TTS player volume (after snooze, music path)"
                action: media_player.volume_set
                target:
                  entity_id: !input tts_output_player
                data:
                  volume_level: !input tts_volume_after

              - alias: "Update duck snapshot if active (snooze restore)"
                if:
                  - condition: template
                    value_template: >-
                      {{ is_state(v_duck_guard, 'on')
                         and is_state(v_ducking_flag, 'on') }}
                then:
                  - alias: "Sync duck snapshot after snooze volume restore"
                    action: pyscript.duck_manager_update_snapshot
                    data:
                      entity_id: "{{ v_tts_output_player }}"
                      volume_level: "{{ v_tts_volume_after }}"
                    continue_on_error: true

              - alias: "Reset snooze/stop toggles (after snooze, music path)"
                action: input_boolean.turn_off
                target:
                  entity_id:
                    - !input snooze_toggle
                    - !input stop_toggle
                continue_on_error: true

              # Bypass already released after TTS delivery (see above)

          - alias: "Stop: Wake-up completed after snooze + music."
            stop: "Wake-up completed after snooze + music."

    # ── DEFAULT: no snooze/stop pressed on pass 1 ──────────────────────
    default:
      - alias: "Run wake-up music script (normal path)"
        action: script.turn_on
        target:
          entity_id: !input music_script

      - alias: "Restore TTS player volume (normal path)"
        action: media_player.volume_set
        target:
          entity_id: !input tts_output_player
        data:
          volume_level: !input tts_volume_after

      - alias: "Update duck snapshot if active (normal restore)"
        if:
          - condition: template
            value_template: >-
              {{ is_state(v_duck_guard, 'on')
                 and is_state(v_ducking_flag, 'on') }}
        then:
          - alias: "Sync duck snapshot after normal volume restore"
            action: pyscript.duck_manager_update_snapshot
            data:
              entity_id: "{{ v_tts_output_player }}"
              volume_level: "{{ v_tts_volume_after }}"
            continue_on_error: true

      - alias: "Reset snooze/stop toggles (normal path)"
        action: input_boolean.turn_off
        target:
          entity_id:
            - !input snooze_toggle
            - !input stop_toggle
        continue_on_error: true

      # Bypass already released after TTS delivery (see above)
