blueprint:
  name: "Charge reminder – persona-aware battery nudges (v8)"
  author: madalone
  description: >
    # Charge Reminder – persona-aware battery nudges

    Escalating TTS reminders when a device's battery drops below configurable
    thresholds. Supports three delivery styles — prompt (LLM-generated,
    persona-aware), factual (static, no LLM), or silent (no TTS).
    Congratulates on plug-in when battery was low.

    Works with any device that has a battery sensor and charging binary
    sensor — phones, remotes, tablets, etc. Set the **Device name** input
    to customize prompts (e.g., "phone", "remote control", "tablet").

    Escalation: casual → critical → urgent. Each tier has its own
    editable prompt/factual message, reminder count, and dedup window.

    ### Recent changes
    - **v8:** Charge control fixes — (1) switch hardware actions
      (turn_off at ceiling, turn_on at floor) now bypass all TTS
      gates so charging control always works regardless of quiet
      hours, DND, presence, or delivery style. TTS announcements
      for these events still respect all gates as normal;
      (2) switch.turn_off at 100% no longer gated behind "Announce
      fully charged" toggle; (3) charge ceiling trigger uses `>=`
      (template trigger) instead of `above:` (numeric_state) so the
      switch disables at exactly the configured percentage, not 1%
      above it; (4) charge resume only fires when the switch is
      currently OFF (i.e., we previously disabled it at the ceiling),
      preventing false "charging resumed" announcements from normal
      battery drain while undocked.
    - **v7:** Charge control — optional wireless charging switch
      (`charge_control_switch`) with configurable full-charge ceiling
      (`full_charge_threshold`, default 100) and resume floor
      (`charge_resume_threshold`, default 60). When set, charging is
      disabled at the ceiling and re-enabled at the floor. Separate
      `charge_limit_*` and `charge_resumed_*` prompt/factual pairs
      with `{full_charge_threshold}` placeholder. Fully backward-
      compatible — leave switch empty for phone-style behavior.
    - **v6:** Generic device support — new `device_name` input replaces
      hardcoded "phone" in all prompts, aliases, and dispatcher intent.
      Use `{device}` placeholder in custom prompts alongside `{battery}`.
    - **v5:** Quiet hours & DND — optional time-based quiet window and
      DND sensor gate suppress all announcements when active
    - **v4:** Optional "fully charged" TTS announcement when battery
      reaches 100% while still charging — LLM prompt or static fallback
    - **v3:** Per-tier prompts & factual messages, reminder count with
      repeat loops, bypass follow-me & ducking, mode restart
    - **v2:** Dispatcher support, conversation-agent selector, editable
      prompts for nudge and congrats, presence sensor selector
    - **v1:** Initial blueprint — replaces package ai_phone_charge_reminder.yaml
  domain: automation
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/phone_charge_reminder.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    # ===========================================================================
    # ① PHONE SENSORS
    # ===========================================================================
    device_section:
      name: "① Device"
      icon: mdi:devices
      description: Device name, battery sensor, and charging sensor.
      collapsed: false
      input:
        device_name:
          name: Device name
          description: >-
            Name of the device (e.g., "phone", "remote control", "tablet").
            Used in prompts, announcements, and dispatcher intent. Use
            `{device}` placeholder in custom prompts to reference this name.
          default: "phone"
          selector:
            text: {}

        battery_sensor:
          name: Battery level sensor
          description: >
            The sensor that reports battery percentage
            (e.g. sensor.phone_battery_level, sensor.remote_battery).
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: battery

        charging_sensor:
          name: Charging state sensor
          description: >
            Binary sensor that reports whether the device is charging
            (on = charging, off = not charging).
          default: ""
          selector:
            entity:
              domain: binary_sensor

    # ===========================================================================
    # ② THRESHOLDS & MESSAGES
    # ===========================================================================
    thresholds_and_messages:
      name: "② Thresholds & messages"
      icon: mdi:battery-alert
      description: >
        Battery percentage thresholds, reminder counts, and per-tier
        prompts/factual messages. Set thresholds in descending order
        (low > critical > urgent). Use {battery} and {device} as placeholders.
      collapsed: true
      input:
        # ── Low tier ──────────────────────────────────────────────────
        low_threshold:
          name: Low threshold (%)
          description: >
            First casual nudge fires when battery drops below this.
          default: 20
          selector:
            number:
              min: 10
              max: 50
              step: 5
              unit_of_measurement: "%"

        low_reminder_count:
          name: Low — reminder count
          description: >
            How many times the low-tier nudge repeats (with 30 min delay
            between each). Stops early if the device is plugged in.
          default: 2
          selector:
            number:
              min: 1
              max: 10
              step: 1

        low_prompt:
          name: Low — LLM prompt
          description: >
            LLM prompt for the casual nudge. Use {battery} for percentage.
            Only used when delivery style is "prompt".
          default: >-
            The user's {device} battery is at {battery}%. This is a casual,
            low-priority reminder. Say ONE short, in-character sentence
            nudging them to charge their {device}. Keep it playful and
            light-hearted. No quotation marks, no special formatting.
          selector:
            text:
              multiline: true

        low_factual:
          name: Low — factual message
          description: >
            Static message for the casual nudge. Use {battery} for
            percentage. Only used when delivery style is "factual".
          default: >-
            {device} battery at {battery}%. Consider charging soon.
          selector:
            text:
              multiline: true

        # ── Critical tier ─────────────────────────────────────────────
        critical_threshold:
          name: Critical threshold (%)
          description: >
            Second, more urgent nudge fires below this.
          default: 10
          selector:
            number:
              min: 8
              max: 20
              step: 1
              unit_of_measurement: "%"

        critical_reminder_count:
          name: Critical — reminder count
          description: >
            How many times the critical nudge repeats (with 15 min delay
            between each). Stops early if the device is plugged in.
          default: 2
          selector:
            number:
              min: 1
              max: 10
              step: 1

        critical_prompt:
          name: Critical — LLM prompt
          description: >
            LLM prompt for the critical nudge. Use {battery} for
            percentage. Only used when delivery style is "prompt".
          default: >-
            The user's {device} battery is at {battery}%. This is a critical
            warning — battery is getting dangerously low. Say ONE short,
            firm, in-character sentence urging them to charge NOW. Be
            serious, not playful. No quotation marks, no special formatting.
          selector:
            text:
              multiline: true

        critical_factual:
          name: Critical — factual message
          description: >
            Static message for the critical nudge. Use {battery} for
            percentage. Only used when delivery style is "factual".
          default: >-
            {battery}% battery. This is not a drill. Charger. Now.
          selector:
            text:
              multiline: true

        # ── Urgent tier ───────────────────────────────────────────────
        urgent_threshold:
          name: Urgent threshold (%)
          description: >
            Emergency-level warning fires below this.
          default: 5
          selector:
            number:
              min: 2
              max: 15
              step: 1
              unit_of_measurement: "%"

        urgent_reminder_count:
          name: Urgent — reminder count
          description: >
            How many times the urgent warning repeats (with 5 min delay
            between each). Stops early if the device is plugged in.
          default: 2
          selector:
            number:
              min: 1
              max: 10
              step: 1

        urgent_prompt:
          name: Urgent — LLM prompt
          description: >
            LLM prompt for the emergency warning. Use {battery} for
            percentage. Only used when delivery style is "prompt".
          default: >-
            The user's {device} battery is at {battery}%! This is an
            EMERGENCY — the {device} is about to die. Say ONE short,
            alarming, in-character sentence demanding they plug in
            IMMEDIATELY. Maximum urgency. No quotation marks, no
            special formatting.
          selector:
            text:
              multiline: true

        urgent_factual:
          name: Urgent — factual message
          description: >
            Static message for the emergency warning. Use {battery} for
            percentage. Only used when delivery style is "factual".
          default: >-
            {battery}%! Your {device} is about to die! Plug it in right now!
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ③ AGENT & DELIVERY
    # ===========================================================================
    agent_and_delivery:
      name: "③ Agent & delivery"
      icon: mdi:account-voice
      description: >
        Agent selection (dispatcher or manual) and delivery style.
      collapsed: true
      input:
        use_dispatcher:
          name: Use Dispatcher
          description: >-
            When enabled, the AI dispatcher selects the persona dynamically.
            When disabled, uses the Voice Assistant below.
          default: true
          selector:
            boolean: {}

        conversation_agent:
          name: Voice Assistant
          description: >
            The Voice Assistant (Assist Pipeline) used when dispatcher is
            disabled. Ignored when dispatcher is enabled.
          default: Rick
          selector:
            text:

        style:
          name: Delivery style
          description: >
            "prompt" generates persona-aware lines via LLM.
            "factual" uses plain static messages, no LLM call.
            "silent" suppresses all TTS.
          default: "prompt"
          selector:
            select:
              options:
                - label: "Prompt (LLM persona)"
                  value: "prompt"
                - label: "Factual (plain)"
                  value: "factual"
                - label: "Silent (no TTS)"
                  value: "silent"

        congrats_prompt:
          name: Congratulate on plug-in prompt
          description: >
            LLM prompt for the plug-in celebration message. Use {battery}
            for the percentage when they plugged in. Only used when delivery
            style is "prompt".
          default: >-
            The user just plugged in their {device} at {battery}% battery.
            Congratulate them in ONE short, in-character sentence. Be
            playful — they were cutting it close. No quotation marks, no
            special formatting.
          selector:
            text:
              multiline: true

        congrats_factual:
          name: Congratulate on plug-in (factual)
          description: >
            Static text for the plug-in celebration. Use {battery} for the
            percentage. Used when delivery style is "factual" or as fallback
            when the LLM call fails.
          default: "Good call plugging that in. {battery}% was cutting it close."
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ④ TTS OUTPUT
    # ===========================================================================
    tts_output:
      name: "④ TTS & speaker output"
      icon: mdi:speaker
      description: >
        Where TTS plays. Satellite takes priority over media player.
        Leave both empty to use the TTS queue default target.
      collapsed: true
      input:
        satellite_entity:
          name: Assist Satellite
          description: >
            Assist Satellite entity for TTS announcements. When set,
            announcements play via assist_satellite.announce instead of
            the TTS queue.
          default: ""
          selector:
            entity:
              domain: assist_satellite

        tts_output_player:
          name: Media player for TTS
          description: >
            Speaker or speaker group where TTS will play via the TTS
            queue. Ignored when an Assist Satellite is configured above.
          default: ""
          selector:
            entity:
              domain: media_player

        tts_volume:
          name: TTS volume
          description: >
            Volume set on speaker for TTS delivery. The previous volume
            is captured and restored automatically. 0 = disabled.
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.05
              mode: slider

        bypass_ducking:
          name: Bypass volume ducking
          description: >
            When enabled, TTS plays without lowering the volume on other
            speakers first.
          default: false
          selector:
            boolean: {}

    # ===========================================================================
    # ⑤ QUIET HOURS & DND
    # ===========================================================================
    quiet_hours:
      name: "⑤ Quiet hours & DND"
      icon: mdi:weather-night
      description: >-
        DND sensor gate and optional time-based quiet hours window.
        Both gates are enforced independently — belt and suspenders.
      collapsed: true
      input:
        dnd_sensor:
          name: Do Not Disturb sensor
          description: >-
            DND sensor (e.g., phone Companion App). When state is
            anything other than "off" or "unavailable", announcements
            are suppressed. Leave empty to skip DND checking.
          default: ""
          selector:
            entity:
              domain: sensor

        enable_quiet_hours:
          name: Enable quiet hours window
          description: >-
            When enabled, announcements are suppressed between the
            start and end times below. Stacks with DND — both are
            checked independently.
          default: false
          selector:
            boolean: {}

        quiet_start:
          name: Quiet hours start
          description: >-
            Time when quiet hours begin (e.g., 23:00). Only used when
            quiet hours are enabled.
          default: "23:00:00"
          selector:
            time: {}

        quiet_end:
          name: Quiet hours end
          description: >-
            Time when quiet hours end (e.g., 07:00). Only used when
            quiet hours are enabled.
          default: "07:00:00"
          selector:
            time: {}

    # ===========================================================================
    # ⑥ FEATURES & PRESENCE
    # ===========================================================================
    features_and_presence:
      name: "⑥ Features & presence"
      icon: mdi:home-account
      description: Optional features and presence gating.
      collapsed: true
      input:
        enable_congrats:
          name: Congratulate on plug-in
          description: >
            Send a celebratory TTS when the device is plugged in
            while battery was below the low threshold.
          default: true
          selector:
            boolean: {}

        enable_fully_charged:
          name: Announce fully charged
          description: >
            Send a TTS announcement when battery reaches 100%
            while still charging.
          default: true
          selector:
            boolean: {}

        fully_charged_prompt:
          name: Fully charged — LLM prompt
          description: >
            Prompt sent to the LLM when battery hits 100%.
            Used when style is "prompt". Keep it short — the agent
            should return a single sentence.
          default: >-
            The {device} is fully charged at 100%. Generate a short,
            friendly message letting the user know they can unplug it.
            One sentence only.
          selector:
            text:
              multiline: true

        fully_charged_factual:
          name: Fully charged — static message
          description: >
            Fallback message when style is "factual" or LLM is unavailable.
          default: "{device} is fully charged. You can unplug it."
          selector:
            text:
              multiline: true

        presence_sensor:
          name: Presence sensor
          description: >
            Binary sensor indicating whether someone is home
            (e.g. an occupancy or presence sensor). Leave empty
            to skip the presence check. When set, TTS is suppressed
            if the sensor is off.
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

    # ===========================================================================
    # ⑦ BYPASS CONTROLS
    # ===========================================================================
    bypass_controls:
      name: "⑦ Bypass controls"
      icon: mdi:shield-off
      description: >
        Temporarily disable follow-me during the reminder sequence.
        Originals are restored when the sequence finishes.
      collapsed: true
      input:
        bypass_follow_me:
          name: Bypass follow-me
          description: >
            Pause notification follow-me during the reminder sequence
            so nudges always play on the configured speaker.
          default: true
          selector:
            boolean: {}

        bypass_claim_script:
          name: Refcount claim script
          description: >
            Script entity that registers a bypass claim. Create from the
            Refcount Bypass — Claim blueprint.
          default: script.refcount_bypass_claim
          selector:
            entity:
              domain: script

        bypass_release_script:
          name: Refcount release script
          description: >
            Script entity that releases a bypass claim. Create from the
            Refcount Bypass — Release blueprint.
          default: script.refcount_bypass_release
          selector:
            entity:
              domain: script

    # ===========================================================================
    # ⑧ PRIVACY
    # ===========================================================================
    privacy:
      name: "⑧ Privacy"
      icon: mdi:shield-account
      collapsed: true
      input:
        privacy_tier:
          name: Privacy gate tier
          description: >
            Which privacy tier this feature belongs to. When the other
            household member's identity confidence crosses the tier's
            threshold, this automation is suppressed.
            Off = no privacy gating.
          default: "t2"
          selector:
            select:
              options:
                - label: "Off — no privacy gating"
                  value: "off"
                - label: "T1 — Intimate (bedtime/wake)"
                  value: "t1"
                - label: "T2 — Personal (notifications/briefings)"
                  value: "t2"
                - label: "T3 — Ambient (detection/tracking)"
                  value: "t3"
        privacy_gate_enabled:
          name: "Privacy gate enabled entity"
          description: "Boolean that enables the privacy gate system."
          default: input_boolean.ai_privacy_gate_enabled
          selector:
            entity:
              domain: input_boolean
        privacy_gate_mode:
          name: "Privacy gate mode entity"
          description: "Select that controls privacy gate behavior (auto/force_suppress/force_allow)."
          default: input_select.ai_privacy_gate_mode
          selector:
            entity:
              domain: input_select
        privacy_gate_person:
          name: "Privacy gate person"
          description: "Person entity for tier suppression lookups."
          default: ""
          selector:
            entity:
              domain: person

    # ===========================================================================
    # ⑨ INFRASTRUCTURE
    # ===========================================================================
    infrastructure:
      name: "⑨ Infrastructure"
      icon: mdi:cog
      collapsed: true
      description: "Shared entity references for the dispatcher system."
      input:
        dispatcher_enabled:
          name: "Dispatcher enabled entity"
          description: "Boolean that enables the AI agent dispatcher."
          default: input_boolean.ai_dispatcher_enabled
          selector:
            entity:
              domain: input_boolean

    # ===========================================================================
    # ⑩ CHARGE CONTROL
    # ===========================================================================
    charge_control:
      name: "⑩ Charge control"
      icon: mdi:battery-charging-wireless
      description: >
        Optional wireless charging switch and thresholds for battery
        preservation. Leave switch empty to disable (default phone
        behavior). When set, charging is cut at the ceiling and
        re-enabled at the floor.
      collapsed: true
      input:
        charge_control_switch:
          name: Charge control switch
          description: >
            Switch entity that controls wireless charging (e.g.,
            switch.remote_3_wireless_charging from hass-unfoldedcircle).
            Leave empty to disable charge control — the blueprint
            behaves exactly like v6.
          default: ""
          selector:
            entity:
              domain: switch

        full_charge_threshold:
          name: Full charge threshold (%)
          description: >
            Battery percentage at which the "fully charged" announcement
            fires and (if a charge control switch is set) charging is
            disabled. Set to 100 for phones, 80 for battery preservation.
          default: 100
          selector:
            number:
              min: 50
              max: 100
              step: 5
              unit_of_measurement: "%"

        charge_resume_threshold:
          name: Charge resume threshold (%)
          description: >
            Battery percentage at which charging is re-enabled via the
            charge control switch. Only used when a charge control
            switch is configured.
          default: 60
          selector:
            number:
              min: 20
              max: 80
              step: 5
              unit_of_measurement: "%"

        charge_limit_prompt:
          name: Charge limit reached — LLM prompt
          description: >
            LLM prompt when battery hits the full charge threshold and
            charging is disabled. Use {battery}, {device}, and
            {full_charge_threshold} as placeholders. Only used when
            delivery style is "prompt" and a charge control switch
            is configured.
          default: >-
            The user's {device} has reached {battery}%, hitting the
            configured charge limit of {full_charge_threshold}%.
            Wireless charging has been disabled to preserve battery
            health. Say ONE short, in-character sentence letting them
            know. Keep it casual and informative. No quotation marks,
            no special formatting.
          selector:
            text:
              multiline: true

        charge_limit_factual:
          name: Charge limit reached — static message
          description: >
            Static message when battery hits the full charge threshold
            and charging is disabled. Use {battery}, {device}, and
            {full_charge_threshold} as placeholders.
          default: >-
            {device} at {battery}%. Charge limit of {full_charge_threshold}%
            reached — wireless charging disabled.
          selector:
            text:
              multiline: true

        enable_charge_resumed:
          name: Announce charge resumed
          description: >
            Send a TTS announcement when battery drops below the
            resume threshold and charging is re-enabled. Only used
            when a charge control switch is configured.
          default: false
          selector:
            boolean: {}

        charge_resumed_prompt:
          name: Charge resumed — LLM prompt
          description: >
            LLM prompt when battery drops below the resume threshold
            and charging is re-enabled. Use {battery}, {device}, and
            {charge_resume_threshold} as placeholders.
          default: >-
            The user's {device} battery dropped to {battery}%, below
            the {charge_resume_threshold}% threshold. Wireless charging
            has been re-enabled. Say ONE short, in-character sentence.
            Keep it brief and informative. No quotation marks, no
            special formatting.
          selector:
            text:
              multiline: true

        charge_resumed_factual:
          name: Charge resumed — static message
          description: >
            Static message when charging is re-enabled. Use {battery},
            {device}, and {charge_resume_threshold} as placeholders.
          default: >-
            {device} at {battery}%. Charging re-enabled.
          selector:
            text:
              multiline: true

variables:
  _device_name: !input device_name
  battery_sensor: !input battery_sensor
  charging_sensor: !input charging_sensor
  low_threshold: !input low_threshold
  critical_threshold: !input critical_threshold
  urgent_threshold: !input urgent_threshold
  low_reminder_count: !input low_reminder_count
  critical_reminder_count: !input critical_reminder_count
  urgent_reminder_count: !input urgent_reminder_count
  low_prompt: !input low_prompt
  low_factual: !input low_factual
  critical_prompt: !input critical_prompt
  critical_factual: !input critical_factual
  urgent_prompt: !input urgent_prompt
  urgent_factual: !input urgent_factual
  use_dispatcher: !input use_dispatcher
  v_dispatcher_enabled: !input dispatcher_enabled
  v_pipeline_name: !input conversation_agent
  style: !input style
  congrats_prompt: !input congrats_prompt
  congrats_factual: !input congrats_factual
  enable_congrats: !input enable_congrats
  enable_fully_charged: !input enable_fully_charged
  fully_charged_prompt: !input fully_charged_prompt
  fully_charged_factual: !input fully_charged_factual
  presence_sensor: !input presence_sensor
  v_satellite_entity: !input satellite_entity
  v_tts_output_player: !input tts_output_player
  v_tts_volume: !input tts_volume
  v_bypass_ducking: !input bypass_ducking
  v_bypass_follow_me: !input bypass_follow_me
  v_bypass_claim: !input bypass_claim_script
  v_bypass_release: !input bypass_release_script
  privacy_tier: !input privacy_tier
  v_privacy_enabled: !input privacy_gate_enabled
  v_privacy_mode: !input privacy_gate_mode
  v_privacy_person: !input privacy_gate_person
  v_privacy_slug: "{{ v_privacy_person.split('.')[-1] }}"
  # ── quiet hours & DND ──────────────────────────────────────────────────
  dnd_entity: !input dnd_sensor
  enable_quiet: !input enable_quiet_hours
  quiet_start_val: !input quiet_start
  quiet_end_val: !input quiet_end
  _pfx: "[REMINDER — do NOT call any functions or tools. Respond only with speech text, no actions.] "
  # ── charge control ─────────────────────────────────────────────────────
  v_charge_switch: !input charge_control_switch
  full_charge_threshold: !input full_charge_threshold
  charge_resume_threshold: !input charge_resume_threshold
  charge_limit_prompt: !input charge_limit_prompt
  charge_limit_factual: !input charge_limit_factual
  enable_charge_resumed: !input enable_charge_resumed
  charge_resumed_prompt: !input charge_resumed_prompt
  charge_resumed_factual: !input charge_resumed_factual

trigger_variables:
  _tv_battery_sensor: !input battery_sensor
  _tv_full_charge_threshold: !input full_charge_threshold

mode: restart
max_exceeded: silent

triggers:
  - alias: "Low battery — casual nudge threshold"
    id: low_battery
    trigger: numeric_state
    entity_id: !input battery_sensor
    below: !input low_threshold

  - alias: "Critical battery — second nudge threshold"
    id: critical_battery
    trigger: numeric_state
    entity_id: !input battery_sensor
    below: !input critical_threshold

  - alias: "Urgent battery — emergency threshold"
    id: urgent_battery
    trigger: numeric_state
    entity_id: !input battery_sensor
    below: !input urgent_threshold

  - alias: "Device plugged in"
    id: plugged_in
    trigger: state
    entity_id: !input charging_sensor
    from: "off"
    to: "on"

  - alias: "Device fully charged"
    id: fully_charged
    trigger: numeric_state
    entity_id: !input battery_sensor
    above: 99

  - alias: "Charge ceiling reached"
    id: charge_ceiling
    trigger: template
    value_template: >-
      {{ (_tv_full_charge_threshold | int(100)) < 100
         and states(_tv_battery_sensor) | int(0) >= (_tv_full_charge_threshold | int(100)) }}

  - alias: "Battery dropped to charge resume level"
    id: charge_resume
    trigger: numeric_state
    entity_id: !input battery_sensor
    below: !input charge_resume_threshold

  - alias: "HA restart — catch-up check"
    id: ha_restart
    trigger: homeassistant
    event: start

conditions:
  - condition: or
    conditions:
      - alias: "Charge-control triggers bypass all TTS gates"
        condition: template
        value_template: "{{ trigger.id in ['charge_ceiling', 'charge_resume'] }}"

      - alias: "All other triggers must pass TTS gates"
        condition: and
        conditions:
          - alias: "Style is not silent"
            condition: template
            value_template: "{{ style != 'silent' }}"

          - alias: "Someone is home (or no presence sensor configured)"
            condition: template
            value_template: >-
              {{ presence_sensor == '' or is_state(presence_sensor, 'on') }}

          - alias: "DND must not be active (skip if no sensor configured)"
            condition: template
            value_template: >-
              {% set dnd = dnd_entity | default('') | string %}
              {% if dnd | length == 0 %}
                true
              {% else %}
                {{ states(dnd) | default('off') in ['off', 'unavailable', 'unknown'] }}
              {% endif %}

          - alias: "Quiet hours gate (skip if disabled)"
            condition: template
            value_template: >-
              {% if not (enable_quiet | bool(false)) %}
                true
              {% else %}
                {% set qs = today_at(quiet_start_val | default('23:00:00')) %}
                {% set qe = today_at(quiet_end_val | default('07:00:00')) %}
                {% if qs < qe %}
                  {{ not (qs <= now() < qe) }}
                {% else %}
                  {{ qe <= now() < qs }}
                {% endif %}
              {% endif %}

          - alias: "Privacy gate"
            condition: template
            value_template: >-
              {%- set tier = privacy_tier -%}
              {%- set mode = states(v_privacy_mode) | default('off') -%}
              {%- set override = states('input_select.ai_privacy_gate_phone_charge_reminder') | default('off') -%}
              {%- if tier == 'off'
                  or not is_state(v_privacy_enabled, 'on')
                  or mode == 'force_allow_all' or override == 'force_allow'
                  or override == 'off'
                  or v_privacy_slug | trim | length == 0 -%}
                true
              {%- elif mode == 'force_suppress_all' or override == 'force_suppress' -%}
                false
              {%- else -%}
                {{ is_state('input_boolean.ai_privacy_gate_' ~ v_privacy_slug ~ '_' ~ tier ~ '_suppressed', 'off') }}
              {%- endif -%}

actions:
  - alias: "Set battery"
    variables:
      _battery: "{{ states(battery_sensor) | int(0) }}"

  # ── Bypass save/disable ──────────────────────────────────────────────
  - alias: "Set follow me was on"
    variables:
      follow_me_was_on: >-
        {{ v_bypass_follow_me | default(false)
           and is_state('input_boolean.ai_notification_follow_me', 'on') }}

  - alias: "Bypass follow-me (if configured)"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Claim follow-me bypass via refcount"
            action: "{{ v_bypass_claim }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  # ── Agent selection — dispatcher > manual ──────────────────────────────
  - alias: "Agent selection — dispatcher > manual"
    choose:
      - alias: "Dispatcher path"
        conditions:
          - condition: template
            value_template: >-
              {{ style == 'prompt' and use_dispatcher
                 and is_state(v_dispatcher_enabled, 'on') }}
        sequence:
          - alias: "Dispatch agent for charge reminder"
            action: pyscript.agent_dispatch
            response_variable: dispatch
            data:
              wake_word: ""
              intent_text: "{{ _device_name }} charge reminder"
              skip_continuity: true
            continue_on_error: true

          - alias: "Set dispatch agent, dispatch voice"
            variables:
              dispatch_agent: "{{ (dispatch | default({})).get('agent', '') }}"
              dispatch_voice: "{{ (dispatch | default({})).get('tts_engine', '') }}"
              dispatch_tts_voice: "{{ (dispatch | default({})).get('tts_voice', '') }}"

      - alias: "Manual pipeline path (prompt mode, dispatcher off)"
        conditions:
          - condition: template
            value_template: "{{ style == 'prompt' }}"
        sequence:
          - alias: "Resolve manually selected pipeline to agent"
            action: pyscript.agent_dispatch
            response_variable: pipeline_resolve
            data:
              pipeline_name: "{{ v_pipeline_name }}"
            continue_on_error: true
          - alias: "Set dispatch agent, dispatch voice"
            variables:
              dispatch_agent: "{{ (pipeline_resolve | default({})).get('agent', '') }}"
              dispatch_voice: "{{ (pipeline_resolve | default({})).get('tts_engine', '') }}"
              dispatch_tts_voice: "{{ (pipeline_resolve | default({})).get('tts_voice', '') }}"
    default:
      - alias: "Set dispatch agent, dispatch voice"
        variables:
          dispatch_agent: ""
          dispatch_voice: ""
          dispatch_tts_voice: ""

  # ── Release bypass BEFORE reminder loops ──────────────────────────────
  #     Bypass only needed during agent dispatch (~2s). Holding it through
  #     5-30min reminder loops strands the counter on reload/restart/kill.
  #     TTS queue handles ducking for individual announcements.
  - alias: "Release follow-me bypass before loops"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Release follow-me bypass via refcount (pre-loop)"
            action: "{{ v_bypass_release }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  - alias: "Route by trigger"
    choose:
      # ── LOW BATTERY — casual nudge ───────────────────────────────────
      - alias: "Low battery — casual nudge"
        conditions:
          - condition: trigger
            id: low_battery
          - condition: state
            entity_id: !input charging_sensor
            state: "off"
        sequence:
          - alias: "Repeat low-battery reminder loop"
            repeat:
              count: "{{ low_reminder_count | int(2) }}"
              sequence:
                - alias: "Stop if device was plugged in"
                  condition: state
                  entity_id: !input charging_sensor
                  state: "off"

                - alias: "Generate casual nudge"
                  choose:
                    - alias: "Prompt mode — LLM-generated nudge"
                      conditions:
                        - condition: template
                          value_template: >-
                            {{ style == 'prompt'
                               and (dispatch_agent | default('') | length > 0) }}
                      sequence:
                        - alias: "LLM-generate casual low-battery nudge"
                          action: conversation.process
                          data:
                            agent_id: "{{ dispatch_agent }}"
                            text: >-
                              {{ _pfx }}{{ low_prompt
                                 | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
                          response_variable: llm_result
                          continue_on_error: true
                        - alias: "Set message"
                          variables:
                            _message: >-
                              {{ (llm_result | default({})).get('response', {})
                                 .get('speech', {}).get('plain', {}).get('speech',
                                 low_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name)) }}
                  default:
                    - alias: "Set message"
                      variables:
                        _message: >-
                          {{ low_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}

                - alias: "Deliver casual nudge — satellite > player > default"
                  choose:
                    - alias: "Via Assist Satellite"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Announce casual nudge via satellite"
                          action: assist_satellite.announce
                          target:
                            entity_id: "{{ v_satellite_entity }}"
                          data:
                            message: "{{ _message }}"
                          continue_on_error: true
                    - alias: "Via TTS queue — explicit player"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Speak casual nudge on explicit player"
                          action: pyscript.tts_queue_speak
                          data:
                            text: "{{ _message }}"
                            voice: "{{ dispatch_voice | default('') }}"
                            voice_id: "{{ dispatch_tts_voice }}"
                            volume_level: "{{ v_tts_volume }}"
                            priority: 3
                            duck: "{{ not v_bypass_ducking }}"
                            target_mode: explicit
                            target: "{{ v_tts_output_player }}"
                          response_variable: tts_result
                          continue_on_error: true
                  default:
                    - alias: "Speak casual nudge on default player"
                      action: pyscript.tts_queue_speak
                      data:
                        text: "{{ _message }}"
                        voice: "{{ dispatch_voice | default('') }}"
                        voice_id: "{{ dispatch_tts_voice }}"
                        volume_level: "{{ v_tts_volume }}"
                        priority: 3
                        duck: "{{ not v_bypass_ducking }}"
                      response_variable: tts_result
                      continue_on_error: true

                - alias: "Delay between reminders (skip on last)"
                  if:
                    - condition: template
                      value_template: "{{ repeat.index < (low_reminder_count | int(2)) }}"
                  then:
                    - alias: "Wait 00:30:00"
                      delay: "00:30:00"

      # ── CRITICAL BATTERY — second nudge ─────────────────────────────
      - alias: "Critical battery — urgent tone"
        conditions:
          - condition: trigger
            id: critical_battery
          - condition: state
            entity_id: !input charging_sensor
            state: "off"
        sequence:
          - alias: "Repeat critical-battery reminder loop"
            repeat:
              count: "{{ critical_reminder_count | int(2) }}"
              sequence:
                - alias: "Stop if device was plugged in"
                  condition: state
                  entity_id: !input charging_sensor
                  state: "off"

                - alias: "Generate critical nudge"
                  choose:
                    - alias: "Prompt mode — LLM-generated critical nudge"
                      conditions:
                        - condition: template
                          value_template: >-
                            {{ style == 'prompt'
                               and (dispatch_agent | default('') | length > 0) }}
                      sequence:
                        - alias: "LLM-generate critical battery nudge"
                          action: conversation.process
                          data:
                            agent_id: "{{ dispatch_agent }}"
                            text: >-
                              {{ _pfx }}{{ critical_prompt
                                 | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
                          response_variable: llm_result
                          continue_on_error: true
                        - alias: "Set message"
                          variables:
                            _message: >-
                              {{ (llm_result | default({})).get('response', {})
                                 .get('speech', {}).get('plain', {}).get('speech',
                                 critical_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name)) }}
                  default:
                    - alias: "Set message"
                      variables:
                        _message: >-
                          {{ critical_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}

                - alias: "Deliver critical nudge — satellite > player > default"
                  choose:
                    - alias: "Via Assist Satellite"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Announce critical nudge via satellite"
                          action: assist_satellite.announce
                          target:
                            entity_id: "{{ v_satellite_entity }}"
                          data:
                            message: "{{ _message }}"
                          continue_on_error: true
                    - alias: "Via TTS queue — explicit player"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Speak critical nudge on explicit player"
                          action: pyscript.tts_queue_speak
                          data:
                            text: "{{ _message }}"
                            voice: "{{ dispatch_voice | default('') }}"
                            voice_id: "{{ dispatch_tts_voice }}"
                            volume_level: "{{ v_tts_volume }}"
                            priority: 2
                            duck: "{{ not v_bypass_ducking }}"
                            target_mode: explicit
                            target: "{{ v_tts_output_player }}"
                          response_variable: tts_result
                          continue_on_error: true
                  default:
                    - alias: "Speak critical nudge on default player"
                      action: pyscript.tts_queue_speak
                      data:
                        text: "{{ _message }}"
                        voice: "{{ dispatch_voice | default('') }}"
                        voice_id: "{{ dispatch_tts_voice }}"
                        volume_level: "{{ v_tts_volume }}"
                        priority: 2
                        duck: "{{ not v_bypass_ducking }}"
                      response_variable: tts_result
                      continue_on_error: true

                - alias: "Delay between reminders (skip on last)"
                  if:
                    - condition: template
                      value_template: "{{ repeat.index < (critical_reminder_count | int(2)) }}"
                  then:
                    - alias: "Wait 00:15:00"
                      delay: "00:15:00"

      # ── URGENT BATTERY — emergency ──────────────────────────────────
      - alias: "Urgent battery — emergency warning"
        conditions:
          - condition: trigger
            id: urgent_battery
          - condition: state
            entity_id: !input charging_sensor
            state: "off"
        sequence:
          - alias: "Repeat urgent-battery reminder loop"
            repeat:
              count: "{{ urgent_reminder_count | int(2) }}"
              sequence:
                - alias: "Stop if device was plugged in"
                  condition: state
                  entity_id: !input charging_sensor
                  state: "off"

                - alias: "Generate urgent warning"
                  choose:
                    - alias: "Prompt mode — LLM-generated urgent warning"
                      conditions:
                        - condition: template
                          value_template: >-
                            {{ style == 'prompt'
                               and (dispatch_agent | default('') | length > 0) }}
                      sequence:
                        - alias: "LLM-generate urgent battery warning"
                          action: conversation.process
                          data:
                            agent_id: "{{ dispatch_agent }}"
                            text: >-
                              {{ _pfx }}{{ urgent_prompt
                                 | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
                          response_variable: llm_result
                          continue_on_error: true
                        - alias: "Set message"
                          variables:
                            _message: >-
                              {{ (llm_result | default({})).get('response', {})
                                 .get('speech', {}).get('plain', {}).get('speech',
                                 urgent_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name)) }}
                  default:
                    - alias: "Set message"
                      variables:
                        _message: >-
                          {{ urgent_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}

                - alias: "Deliver emergency warning — satellite > player > default"
                  choose:
                    - alias: "Via Assist Satellite"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Announce urgent warning via satellite"
                          action: assist_satellite.announce
                          target:
                            entity_id: "{{ v_satellite_entity }}"
                          data:
                            message: "{{ _message }}"
                          continue_on_error: true
                    - alias: "Via TTS queue — explicit player"
                      conditions:
                        - condition: template
                          value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                      sequence:
                        - alias: "Speak urgent warning on explicit player"
                          action: pyscript.tts_queue_speak
                          data:
                            text: "{{ _message }}"
                            voice: "{{ dispatch_voice | default('') }}"
                            voice_id: "{{ dispatch_tts_voice }}"
                            volume_level: "{{ v_tts_volume }}"
                            priority: 1
                            duck: "{{ not v_bypass_ducking }}"
                            target_mode: explicit
                            target: "{{ v_tts_output_player }}"
                          response_variable: tts_result
                          continue_on_error: true
                  default:
                    - alias: "Speak urgent warning on default player"
                      action: pyscript.tts_queue_speak
                      data:
                        text: "{{ _message }}"
                        voice: "{{ dispatch_voice | default('') }}"
                        voice_id: "{{ dispatch_tts_voice }}"
                        volume_level: "{{ v_tts_volume }}"
                        priority: 1
                        duck: "{{ not v_bypass_ducking }}"
                      response_variable: tts_result
                      continue_on_error: true

                - alias: "Delay between reminders (skip on last)"
                  if:
                    - condition: template
                      value_template: "{{ repeat.index < (urgent_reminder_count | int(2)) }}"
                  then:
                    - alias: "Wait 00:05:00"
                      delay: "00:05:00"

      # ── PLUGGED IN — congratulation ─────────────────────────────────
      - alias: "Plugged in — celebrate"
        conditions:
          - condition: trigger
            id: plugged_in
          - condition: template
            value_template: "{{ enable_congrats }}"
          - condition: template
            value_template: "{{ _battery < (low_threshold | int(20)) }}"
        sequence:
          - alias: "Generate congrats message"
            choose:
              - alias: "Prompt mode — LLM-generated congrats"
                conditions:
                  - condition: template
                    value_template: >-
                      {{ style == 'prompt'
                         and (dispatch_agent | default('') | length > 0) }}
                sequence:
                  - alias: "LLM-generate plug-in celebration message"
                    action: conversation.process
                    data:
                      agent_id: "{{ dispatch_agent }}"
                      text: >-
                        {{ _pfx }}{{ congrats_prompt
                           | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
                    response_variable: llm_result
                    continue_on_error: true
                  - alias: "Set message"
                    variables:
                      _message: >-
                        {{ (llm_result | default({})).get('response', {})
                           .get('speech', {}).get('plain', {}).get('speech',
                           congrats_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name)) }}
            default:
              - alias: "Set message"
                variables:
                  _message: >-
                    {{ congrats_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
          - alias: "Deliver congrats — satellite > player > default"
            choose:
              - alias: "Via Assist Satellite"
                conditions:
                  - condition: template
                    value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                sequence:
                  - alias: "Announce plug-in congrats via satellite"
                    action: assist_satellite.announce
                    target:
                      entity_id: "{{ v_satellite_entity }}"
                    data:
                      message: "{{ _message }}"
                    continue_on_error: true
              - alias: "Via TTS queue — explicit player"
                conditions:
                  - condition: template
                    value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                sequence:
                  - alias: "Speak congrats on explicit player"
                    action: pyscript.tts_queue_speak
                    data:
                      text: "{{ _message }}"
                      voice: "{{ dispatch_voice | default('') }}"
                      voice_id: "{{ dispatch_tts_voice }}"
                      volume_level: "{{ v_tts_volume }}"
                      priority: 3
                      duck: "{{ not v_bypass_ducking }}"
                      target_mode: explicit
                      target: "{{ v_tts_output_player }}"
                    response_variable: tts_result
                    continue_on_error: true
            default:
              - alias: "Speak congrats on default player"
                action: pyscript.tts_queue_speak
                data:
                  text: "{{ _message }}"
                  voice: "{{ dispatch_voice | default('') }}"
                  voice_id: "{{ dispatch_tts_voice }}"
                  volume_level: "{{ v_tts_volume }}"
                  priority: 3
                  duck: "{{ not v_bypass_ducking }}"
                response_variable: tts_result
                continue_on_error: true

      # ── FULLY CHARGED — charge control + announcement ────────────────
      - alias: "Fully charged — charge control + announcement"
        conditions:
          - condition: trigger
            id: fully_charged
          - condition: state
            entity_id: !input charging_sensor
            state: "on"
          # Suppress if already fired recently (prevents double fire
          # when plugging in at near-full battery)
          - condition: template
            value_template: >-
              {% set last = this.attributes.last_triggered %}
              {{ last is none or (now() - last).total_seconds() > 60 }}
        sequence:
          - alias: "Disable charging switch at 100% (if configured)"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ (v_charge_switch | default('')) | length > 0 }}
                sequence:
                  - alias: "Turn off wireless charging switch"
                    action: switch.turn_off
                    target:
                      entity_id: "{{ v_charge_switch }}"
                    continue_on_error: true

          - alias: "Announce fully charged (if enabled and not silent)"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ enable_fully_charged and style != 'silent' }}
                sequence:
                  - alias: "Generate fully-charged message"
                    choose:
                      - alias: "Prompt mode — LLM-generated message"
                        conditions:
                          - condition: template
                            value_template: >-
                              {{ style == 'prompt'
                                 and (dispatch_agent | default('') | length > 0) }}
                        sequence:
                          - alias: "LLM-generate fully-charged announcement"
                            action: conversation.process
                            data:
                              agent_id: "{{ dispatch_agent }}"
                              text: "{{ _pfx }}{{ fully_charged_prompt | replace('{device}', _device_name) }}"
                            response_variable: llm_result
                            continue_on_error: true
                          - alias: "Set message"
                            variables:
                              _message: >-
                                {{ (llm_result | default({})).get('response', {})
                                   .get('speech', {}).get('plain', {}).get('speech',
                                   fully_charged_factual | replace('{device}', _device_name)) }}
                    default:
                      - alias: "Set message"
                        variables:
                          _message: "{{ fully_charged_factual | replace('{device}', _device_name) }}"
                  - alias: "Deliver fully-charged — satellite > player > default"
                    choose:
                      - alias: "Via Assist Satellite"
                        conditions:
                          - condition: template
                            value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                        sequence:
                          - alias: "Announce fully-charged via satellite"
                            action: assist_satellite.announce
                            target:
                              entity_id: "{{ v_satellite_entity }}"
                            data:
                              message: "{{ _message }}"
                            continue_on_error: true
                      - alias: "Via TTS queue — explicit player"
                        conditions:
                          - condition: template
                            value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                        sequence:
                          - alias: "Speak fully-charged on explicit player"
                            action: pyscript.tts_queue_speak
                            data:
                              text: "{{ _message }}"
                              voice: "{{ dispatch_voice | default('') }}"
                              voice_id: "{{ dispatch_tts_voice }}"
                              volume_level: "{{ v_tts_volume }}"
                              priority: 3
                              duck: "{{ not v_bypass_ducking }}"
                              target_mode: explicit
                              target: "{{ v_tts_output_player }}"
                            response_variable: tts_result
                            continue_on_error: true
                    default:
                      - alias: "Speak fully-charged on default player"
                        action: pyscript.tts_queue_speak
                        data:
                          text: "{{ _message }}"
                          voice: "{{ dispatch_voice | default('') }}"
                          voice_id: "{{ dispatch_tts_voice }}"
                          volume_level: "{{ v_tts_volume }}"
                          priority: 3
                          duck: "{{ not v_bypass_ducking }}"
                        response_variable: tts_result
                        continue_on_error: true

      # ── CHARGE CEILING — preservation cutoff ────────────────────────
      - alias: "Charge ceiling — preservation cutoff"
        conditions:
          - condition: trigger
            id: charge_ceiling
          - condition: template
            value_template: >-
              {{ (v_charge_switch | default('')) | length > 0
                 and (full_charge_threshold | int(100)) < 100 }}
          - condition: state
            entity_id: !input charging_sensor
            state: "on"
          - condition: template
            value_template: >-
              {% set last = this.attributes.last_triggered %}
              {{ last is none or (now() - last).total_seconds() > 60 }}
        sequence:
          - alias: "Disable wireless charging"
            action: switch.turn_off
            target:
              entity_id: "{{ v_charge_switch }}"
            continue_on_error: true

          - alias: "TTS gate — skip announcement if suppressed"
            condition: and
            conditions:
              - condition: template
                value_template: "{{ style != 'silent' }}"
              - condition: template
                value_template: >-
                  {{ presence_sensor == '' or is_state(presence_sensor, 'on') }}
              - condition: template
                value_template: >-
                  {% set dnd = dnd_entity | default('') | string %}
                  {% if dnd | length == 0 %}true
                  {% else %}{{ states(dnd) | default('off') in ['off', 'unavailable', 'unknown'] }}{% endif %}
              - condition: template
                value_template: >-
                  {% if not (enable_quiet | bool(false)) %}true
                  {% else %}
                    {% set qs = today_at(quiet_start_val | default('23:00:00')) %}
                    {% set qe = today_at(quiet_end_val | default('07:00:00')) %}
                    {% if qs < qe %}{{ not (qs <= now() < qe) }}
                    {% else %}{{ qe <= now() < qs }}{% endif %}
                  {% endif %}
              - condition: template
                value_template: >-
                  {%- set tier = privacy_tier -%}
                  {%- set mode = states(v_privacy_mode) | default('off') -%}
                  {%- set override = states('input_select.ai_privacy_gate_phone_charge_reminder') | default('off') -%}
                  {%- if tier == 'off' or not is_state(v_privacy_enabled, 'on')
                      or mode == 'force_allow_all' or override == 'force_allow'
                      or override == 'off' or v_privacy_slug | trim | length == 0 -%}true
                  {%- elif mode == 'force_suppress_all' or override == 'force_suppress' -%}false
                  {%- else -%}{{ is_state('input_boolean.ai_privacy_gate_' ~ v_privacy_slug ~ '_' ~ tier ~ '_suppressed', 'off') }}
                  {%- endif -%}

          - alias: "Generate charge-limit message"
            choose:
              - alias: "Prompt mode — LLM-generated charge-limit"
                conditions:
                  - condition: template
                    value_template: >-
                      {{ style == 'prompt'
                         and (dispatch_agent | default('') | length > 0) }}
                sequence:
                  - alias: "LLM-generate charge-limit announcement"
                    action: conversation.process
                    data:
                      agent_id: "{{ dispatch_agent }}"
                      text: >-
                        {{ _pfx }}{{ charge_limit_prompt
                           | replace('{battery}', _battery | string)
                           | replace('{device}', _device_name)
                           | replace('{full_charge_threshold}', full_charge_threshold | string) }}
                    response_variable: llm_result
                    continue_on_error: true
                  - alias: "Set message"
                    variables:
                      _message: >-
                        {{ (llm_result | default({})).get('response', {})
                           .get('speech', {}).get('plain', {}).get('speech',
                           charge_limit_factual
                           | replace('{battery}', _battery | string)
                           | replace('{device}', _device_name)
                           | replace('{full_charge_threshold}', full_charge_threshold | string)) }}
            default:
              - alias: "Set message"
                variables:
                  _message: >-
                    {{ charge_limit_factual
                       | replace('{battery}', _battery | string)
                       | replace('{device}', _device_name)
                       | replace('{full_charge_threshold}', full_charge_threshold | string) }}

          - alias: "Deliver charge-limit — satellite > player > default"
            choose:
              - alias: "Via Assist Satellite"
                conditions:
                  - condition: template
                    value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                sequence:
                  - alias: "Announce charge-limit via satellite"
                    action: assist_satellite.announce
                    target:
                      entity_id: "{{ v_satellite_entity }}"
                    data:
                      message: "{{ _message }}"
                    continue_on_error: true
              - alias: "Via TTS queue — explicit player"
                conditions:
                  - condition: template
                    value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                sequence:
                  - alias: "Speak charge-limit on explicit player"
                    action: pyscript.tts_queue_speak
                    data:
                      text: "{{ _message }}"
                      voice: "{{ dispatch_voice | default('') }}"
                      voice_id: "{{ dispatch_tts_voice }}"
                      volume_level: "{{ v_tts_volume }}"
                      priority: 3
                      duck: "{{ not v_bypass_ducking }}"
                      target_mode: explicit
                      target: "{{ v_tts_output_player }}"
                    response_variable: tts_result
                    continue_on_error: true
            default:
              - alias: "Speak charge-limit on default player"
                action: pyscript.tts_queue_speak
                data:
                  text: "{{ _message }}"
                  voice: "{{ dispatch_voice | default('') }}"
                  voice_id: "{{ dispatch_tts_voice }}"
                  volume_level: "{{ v_tts_volume }}"
                  priority: 3
                  duck: "{{ not v_bypass_ducking }}"
                response_variable: tts_result
                continue_on_error: true

      # ── CHARGE RESUME — re-enable charging ──────────────────────────
      - alias: "Charge resume — re-enable charging"
        conditions:
          - condition: trigger
            id: charge_resume
          - condition: template
            value_template: >-
              {{ (v_charge_switch | default('')) | length > 0 }}
          - alias: "Only resume if we previously disabled charging"
            condition: template
            value_template: >-
              {{ (v_charge_switch | default('')) | length > 0
                 and is_state(v_charge_switch, 'off') }}
        sequence:
          - alias: "Re-enable wireless charging"
            action: switch.turn_on
            target:
              entity_id: "{{ v_charge_switch }}"
            continue_on_error: true

          - alias: "Announce charge resumed (if enabled and TTS gates pass)"
            choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ enable_charge_resumed | bool(false)
                         and style != 'silent' }}
                  - condition: template
                    value_template: >-
                      {{ presence_sensor == '' or is_state(presence_sensor, 'on') }}
                  - condition: template
                    value_template: >-
                      {% set dnd = dnd_entity | default('') | string %}
                      {% if dnd | length == 0 %}true
                      {% else %}{{ states(dnd) | default('off') in ['off', 'unavailable', 'unknown'] }}{% endif %}
                  - condition: template
                    value_template: >-
                      {% if not (enable_quiet | bool(false)) %}true
                      {% else %}
                        {% set qs = today_at(quiet_start_val | default('23:00:00')) %}
                        {% set qe = today_at(quiet_end_val | default('07:00:00')) %}
                        {% if qs < qe %}{{ not (qs <= now() < qe) }}
                        {% else %}{{ qe <= now() < qs }}{% endif %}
                      {% endif %}
                  - condition: template
                    value_template: >-
                      {%- set tier = privacy_tier -%}
                      {%- set mode = states(v_privacy_mode) | default('off') -%}
                      {%- set override = states('input_select.ai_privacy_gate_phone_charge_reminder') | default('off') -%}
                      {%- if tier == 'off' or not is_state(v_privacy_enabled, 'on')
                          or mode == 'force_allow_all' or override == 'force_allow'
                          or override == 'off' or v_privacy_slug | trim | length == 0 -%}true
                      {%- elif mode == 'force_suppress_all' or override == 'force_suppress' -%}false
                      {%- else -%}{{ is_state('input_boolean.ai_privacy_gate_' ~ v_privacy_slug ~ '_' ~ tier ~ '_suppressed', 'off') }}
                      {%- endif -%}
                sequence:
                  - alias: "Generate charge-resumed message"
                    choose:
                      - alias: "Prompt mode — LLM-generated charge-resumed"
                        conditions:
                          - condition: template
                            value_template: >-
                              {{ style == 'prompt'
                                 and (dispatch_agent | default('') | length > 0) }}
                        sequence:
                          - alias: "LLM-generate charge-resumed announcement"
                            action: conversation.process
                            data:
                              agent_id: "{{ dispatch_agent }}"
                              text: >-
                                {{ _pfx }}{{ charge_resumed_prompt
                                   | replace('{battery}', _battery | string)
                                   | replace('{device}', _device_name)
                                   | replace('{charge_resume_threshold}', charge_resume_threshold | string) }}
                            response_variable: llm_result
                            continue_on_error: true
                          - alias: "Set message"
                            variables:
                              _message: >-
                                {{ (llm_result | default({})).get('response', {})
                                   .get('speech', {}).get('plain', {}).get('speech',
                                   charge_resumed_factual
                                   | replace('{battery}', _battery | string)
                                   | replace('{device}', _device_name)
                                   | replace('{charge_resume_threshold}', charge_resume_threshold | string)) }}
                    default:
                      - alias: "Set message"
                        variables:
                          _message: >-
                            {{ charge_resumed_factual
                               | replace('{battery}', _battery | string)
                               | replace('{device}', _device_name)
                               | replace('{charge_resume_threshold}', charge_resume_threshold | string) }}

                  - alias: "Deliver charge-resumed — satellite > player > default"
                    choose:
                      - alias: "Via Assist Satellite"
                        conditions:
                          - condition: template
                            value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                        sequence:
                          - alias: "Announce charge-resumed via satellite"
                            action: assist_satellite.announce
                            target:
                              entity_id: "{{ v_satellite_entity }}"
                            data:
                              message: "{{ _message }}"
                            continue_on_error: true
                      - alias: "Via TTS queue — explicit player"
                        conditions:
                          - condition: template
                            value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                        sequence:
                          - alias: "Speak charge-resumed on explicit player"
                            action: pyscript.tts_queue_speak
                            data:
                              text: "{{ _message }}"
                              voice: "{{ dispatch_voice | default('') }}"
                              voice_id: "{{ dispatch_tts_voice }}"
                              volume_level: "{{ v_tts_volume }}"
                              priority: 3
                              duck: "{{ not v_bypass_ducking }}"
                              target_mode: explicit
                              target: "{{ v_tts_output_player }}"
                            response_variable: tts_result
                            continue_on_error: true
                    default:
                      - alias: "Speak charge-resumed on default player"
                        action: pyscript.tts_queue_speak
                        data:
                          text: "{{ _message }}"
                          voice: "{{ dispatch_voice | default('') }}"
                          voice_id: "{{ dispatch_tts_voice }}"
                          volume_level: "{{ v_tts_volume }}"
                          priority: 3
                          duck: "{{ not v_bypass_ducking }}"
                        response_variable: tts_result
                        continue_on_error: true

    # ── FALLBACK — null-trigger (reload/restart/manual) ──────────────
    default:
      - alias: "Wait for sensors to settle after restart"
        delay: "00:00:30"

      - alias: "Charge ceiling catch-up — disable switch if battery already at/above threshold"
        choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ (v_charge_switch | default('')) | length > 0
                     and (full_charge_threshold | int(100)) < 100
                     and states(battery_sensor) | int(0) >= (full_charge_threshold | int(100))
                     and is_state(v_charge_switch, 'on') }}
            sequence:
              - alias: "Turn off wireless charging switch"
                action: switch.turn_off
                target:
                  entity_id: "{{ v_charge_switch }}"
                continue_on_error: true

      - alias: "Determine tier from battery level"
        variables:
          _tier: >-
            {% if _battery | int(0) >= (low_threshold | int(20)) %}none
            {% elif _battery | int(0) < (urgent_threshold | int(5)) %}urgent
            {% elif _battery | int(0) < (critical_threshold | int(10)) %}critical
            {% else %}low{% endif %}
          _tier_prompt: >-
            {% if _tier == 'urgent' %}{{ urgent_prompt }}
            {% elif _tier == 'critical' %}{{ critical_prompt }}
            {% else %}{{ low_prompt }}{% endif %}
          _tier_factual: >-
            {% if _tier == 'urgent' %}{{ urgent_factual }}
            {% elif _tier == 'critical' %}{{ critical_factual }}
            {% else %}{{ low_factual }}{% endif %}
          _tier_count: >-
            {% if _tier == 'urgent' %}{{ urgent_reminder_count | int(2) }}
            {% elif _tier == 'critical' %}{{ critical_reminder_count | int(2) }}
            {% else %}{{ low_reminder_count | int(2) }}{% endif %}
          _tier_priority: >-
            {% if _tier == 'urgent' %}1
            {% elif _tier == 'critical' %}2
            {% else %}3{% endif %}
          _tier_delay: >-
            {% if _tier == 'urgent' %}00:05:00
            {% elif _tier == 'critical' %}00:15:00
            {% else %}00:30:00{% endif %}

      - alias: "Skip if battery above low threshold"
        condition: template
        value_template: "{{ _tier != 'none' }}"

      - alias: "Skip if already charging"
        condition: state
        entity_id: !input charging_sensor
        state: "off"

      - alias: "Repeat charge reminder loop for current tier"
        repeat:
          count: "{{ _tier_count | int(2) }}"
          sequence:
            - alias: "Stop if device was plugged in"
              condition: state
              entity_id: !input charging_sensor
              state: "off"

            - alias: "Generate nudge (tier-parameterized)"
              choose:
                - alias: "Prompt mode — LLM-generated nudge"
                  conditions:
                    - condition: template
                      value_template: >-
                        {{ style == 'prompt'
                           and (dispatch_agent | default('') | length > 0) }}
                  sequence:
                    - alias: "LLM-generate tier-parameterized nudge after restart"
                      action: conversation.process
                      data:
                        agent_id: "{{ dispatch_agent }}"
                        text: >-
                          {{ _pfx }}{{ _tier_prompt
                             | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}
                      response_variable: llm_result
                      continue_on_error: true
                    - alias: "Set message"
                      variables:
                        _message: >-
                          {{ (llm_result | default({})).get('response', {})
                             .get('speech', {}).get('plain', {}).get('speech',
                             _tier_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name)) }}
              default:
                - alias: "Set message"
                  variables:
                    _message: >-
                      {{ _tier_factual | replace('{battery}', _battery | string) | replace('{device}', _device_name) }}

            - alias: "Deliver nudge — satellite > player > default"
              choose:
                - alias: "Via Assist Satellite"
                  conditions:
                    - condition: template
                      value_template: "{{ (v_satellite_entity | default('')) | length > 0 }}"
                  sequence:
                    - alias: "Announce fallback nudge via satellite"
                      action: assist_satellite.announce
                      target:
                        entity_id: "{{ v_satellite_entity }}"
                      data:
                        message: "{{ _message }}"
                      continue_on_error: true
                - alias: "Via TTS queue — explicit player"
                  conditions:
                    - condition: template
                      value_template: "{{ (v_tts_output_player | default('')) | length > 0 }}"
                  sequence:
                    - alias: "Speak fallback nudge on explicit player"
                      action: pyscript.tts_queue_speak
                      data:
                        text: "{{ _message }}"
                        voice: "{{ dispatch_voice | default('') }}"
                        voice_id: "{{ dispatch_tts_voice }}"
                        volume_level: "{{ v_tts_volume }}"
                        priority: "{{ _tier_priority | int(3) }}"
                        duck: "{{ not v_bypass_ducking }}"
                        target_mode: explicit
                        target: "{{ v_tts_output_player }}"
                      response_variable: tts_result
                      continue_on_error: true
              default:
                - alias: "Speak fallback nudge on default player"
                  action: pyscript.tts_queue_speak
                  data:
                    text: "{{ _message }}"
                    voice: "{{ dispatch_voice | default('') }}"
                    voice_id: "{{ dispatch_tts_voice }}"
                    volume_level: "{{ v_tts_volume }}"
                    priority: "{{ _tier_priority | int(3) }}"
                    duck: "{{ not v_bypass_ducking }}"
                  response_variable: tts_result
                  continue_on_error: true

            - alias: "Delay between reminders (skip on last)"
              if:
                - condition: template
                  value_template: "{{ repeat.index < (_tier_count | int(2)) }}"
              then:
                - alias: "Wait for configured delay"
                  delay: "{{ _tier_delay }}"

  # ── Bypass already released before loops (see above) ─────────────────

