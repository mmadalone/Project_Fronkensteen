blueprint:
  name: "Music — Batch Composition Trigger"
  description: >
    Trigger batch generation of static music compositions (themes, chimes,
    thinking loops, stingers) for all or selected agents via ElevenLabs
    Music/SFX API. Press the batch button on the dashboard to start.
  domain: automation
  author: madalone
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/music_compose_batch_trigger.yaml
  homeassistant:
    min_version: "2024.10.0"
  input:
    generation:
      name: "① Generation Settings"
      description: "Control which agents and content types to generate."
      icon: mdi:music-box
      collapsed: false
      input:
        agents_to_generate:
          name: Agents to generate for
          description: >
            Which agents to include in batch generation.
            Leave empty for all agents.
          default: []
          selector:
            select:
              multiple: true
              options:
                - rick
                - quark
                - deadpool
                - kramer
                - portuondo
        content_types:
          name: Content types to generate
          description: >
            Which composition types to include.
            Leave empty for all static types (theme, chime, thinking, stinger).
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: "Theme jingle (5s)"
                  value: theme
                - label: "Notification chime (1-2s)"
                  value: chime
                - label: "Thinking music (10s)"
                  value: thinking
                - label: "Handoff stinger (2-3s)"
                  value: stinger
        auto_approve:
          name: Auto-approve generations
          description: >
            Skip staging and write directly to production cache.
            Disable for first-time generation to review quality before use.
          default: false
          selector:
            boolean: {}
    infrastructure:
      name: "② Infrastructure"
      description: "Kill switch and batch trigger button."
      icon: mdi:cog
      collapsed: true
      input:
        kill_switch:
          name: Music composer kill switch
          description: >
            Global enable/disable for the music composition engine.
          default: input_boolean.ai_music_composer_enabled
          selector:
            entity:
              domain: input_boolean
        batch_button:
          name: Batch trigger button
          description: >
            Input button entity that triggers batch generation.
          default: input_button.ai_music_compose_batch
          selector:
            entity:
              domain: input_button

mode: single
max_exceeded: silent

variables:
  v_agents: !input agents_to_generate
  v_types: !input content_types
  v_auto_approve: !input auto_approve
  v_kill_switch: !input kill_switch

trigger:
  - trigger: state
    entity_id: !input batch_button

condition:
  - condition: template
    value_template: "{{ is_state(v_kill_switch, 'on') }}"

action:
  - alias: "Call batch generation service"
    action: pyscript.music_compose_batch
    response_variable: batch_result
    data:
      agents: "{{ v_agents if v_agents | length > 0 else [] }}"
      content_types: "{{ v_types if v_types | length > 0 else [] }}"
      auto_approve: "{{ v_auto_approve | bool(false) }}"
    continue_on_error: true

  - alias: "Log batch result"
    action: logbook.log
    data:
      name: "Music Composer"
      entity_id: "{{ v_kill_switch }}"
      message: >-
        Batch complete — Generated: {{ (batch_result | default({})).get('generated', '?') }},
        Cached: {{ (batch_result | default({})).get('cached', '?') }},
        Errors: {{ (batch_result | default({})).get('errors', '?') }}
