blueprint:
  name: "Zone Pre-Activation"
  author: madalone
  description: >
    # Zone Pre-Activation

    Pre-activates scenes, lights, or climate before the user arrives in a
    predicted zone. Consumes `input_text.ai_predicted_next_zone_raw` from
    `presence_patterns.py`.

    ### How it works

    1. Watches the predicted next zone helper.
    2. When the prediction matches the target zone with sufficient probability
       and confidence, fires the pre-activation actions.
    3. If the prediction changes away or the user doesn't arrive within the
       timeout, optionally runs deactivation actions.

    ### Example instances

    - "Kitchen Pre-Light" — predicted→kitchen at ≥65% → turn on kitchen lights
    - "Workshop Climate" — predicted→workshop → start heater 5 min early

  domain: automation
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/zone_preactivation.yaml
  homeassistant:
    min_version: 2024.10.0

  input:
    # ===========================================================================
    # ① CONTROL
    # ===========================================================================
    control:
      name: "① Control"
      icon: mdi:tune
      collapsed: false
      description: >
        Kill switch and zone targeting.
      input:
        enable_toggle:
          name: Enable toggle
          description: >
            Per-instance kill switch.
          selector:
            entity:
              domain: input_boolean

        target_zone:
          name: Target zone
          description: >
            Zone to watch for. Must match the zone names from
            presence_patterns.py (FP2 zone map in entity_config.yaml).
          selector:
            select:
              options:
                - label: "Workshop"
                  value: "workshop"
                - label: "Living Room"
                  value: "living_room"
                - label: "Main Room"
                  value: "main_room"
                - label: "Kitchen"
                  value: "kitchen"
                - label: "Bed"
                  value: "bed"
                - label: "Lobby"
                  value: "lobby"
                - label: "Bathroom"
                  value: "bathroom"
                - label: "Shower"
                  value: "shower"

        min_probability:
          name: Minimum probability (%)
          description: >
            Minimum prediction probability to trigger.
          default: 60
          selector:
            number:
              min: 10
              max: 100
              unit_of_measurement: "%"

        min_confidence:
          name: Minimum confidence
          description: >
            Minimum confidence level to trigger.
          default: "medium"
          selector:
            select:
              options:
                - label: "Low"
                  value: "low"
                - label: "Medium"
                  value: "medium"
                - label: "High"
                  value: "high"

        occupancy_gate:
          name: Occupancy gate
          description: >
            Only fire when occupancy_mode matches this value.
          default: "any"
          selector:
            select:
              options:
                - label: "Any"
                  value: "any"
                - label: "Solo Miquel"
                  value: "solo_miquel"
                - label: "Solo Jessica"
                  value: "solo_jessica"
                - label: "Dual (both home)"
                  value: "dual"

        predicted_zone_entity:
          name: Predicted zone entity
          description: >
            The input_text helper that holds the predicted next zone
            from presence_patterns.py.
          default: input_text.ai_predicted_next_zone_raw
          selector:
            entity:
              domain: input_text

    # ===========================================================================
    # ② ACTIONS
    # ===========================================================================
    actions:
      name: "② Actions"
      icon: mdi:cog-play
      collapsed: false
      description: >
        Pre-activation and optional deactivation actions.
      input:
        pre_activation_actions:
          name: Pre-activation actions
          description: >
            Actions to run when the predicted zone matches (e.g., lights, climate).
          default: []
          selector:
            action: {}

        deactivation_actions:
          name: Deactivation actions
          description: >
            Actions to run if the prediction changes away or the user doesn't
            arrive within the timeout. Leave empty to skip.
          default: []
          selector:
            action: {}

        deactivation_timeout_minutes:
          name: Deactivation timeout (minutes)
          description: >
            Auto-run deactivation if the user doesn't arrive within this time.
          default: 10
          selector:
            number:
              min: 2
              max: 30
              unit_of_measurement: min

mode: restart
max_exceeded: silent

variables:
  v_enable: !input enable_toggle
  v_target: !input target_zone
  v_min_prob: !input min_probability
  v_min_conf: !input min_confidence
  v_occ_gate: !input occupancy_gate
  v_deact_actions: !input deactivation_actions
  v_deact_timeout: !input deactivation_timeout_minutes
  _predicted_zone: !input predicted_zone_entity
  v_confidence_map:
    low: 1
    medium: 2
    high: 3

triggers:
  - trigger: state
    entity_id: !input predicted_zone_entity

conditions:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"

  # ── Occupancy gate ──
  - condition: template
    value_template: >-
      {% if v_occ_gate == 'any' %}
        true
      {% else %}
        {{ states('sensor.occupancy_mode') == v_occ_gate }}
      {% endif %}

actions:
  - alias: "Set v raw"
    variables:
      v_raw: "{{ states(_predicted_zone) }}"

  - alias: "Choose action path"
    choose:
      # ── Prediction matches target zone ──
      - conditions:
          - condition: template
            value_template: >-
              {% if v_raw in ['', 'unknown', 'unavailable', 'None'] or '{' not in v_raw %}
                false
              {% else %}
                {% set data = v_raw | from_json | default({}) %}
                {% set zone = data.zone | default('') %}
                {% set prob = data.probability | default(0) | int %}
                {% set conf = data.confidence | default('low') %}
                {% set conf_level = v_confidence_map.get(conf, 0) %}
                {% set min_level = v_confidence_map.get(v_min_conf, 2) %}
                {{ zone == v_target and prob >= v_min_prob | int and conf_level >= min_level }}
              {% endif %}
        sequence:
          # ── Run pre-activation actions ──
          - choose: []
            default: !input pre_activation_actions

          # ── Wait for deactivation timeout, then check if zone changed ──
          - alias: "Wait for deactivation timeout, then check if zone changed"
            if:
              - condition: template
                value_template: "{{ v_deact_actions | length > 0 }}"
            then:
              - alias: "Wait !input deactivation_timeout_minutes minutes"
                delay:
                  minutes: !input deactivation_timeout_minutes
              # If zone prediction has changed away from target, deactivate
              - alias: "Set v raw now, v zone now"
                variables:
                  v_raw_now: "{{ states(_predicted_zone) }}"
                  v_zone_now: >-
                    {% if v_raw_now not in ['', 'unknown', 'unavailable', 'None'] and '{' in v_raw_now %}
                      {{ (v_raw_now | from_json | default({})).zone | default('') }}
                    {% else %}
                      none
                    {% endif %}
              - alias: "Check v zone now condition"
                if:
                  - condition: template
                    value_template: "{{ v_zone_now != v_target }}"
                then: !input deactivation_actions

    # ── Prediction changed AWAY from target (immediate deactivation) ──
    default:
      - alias: "Prediction changed AWAY from target (immediate deactivation)"
        if:
          - condition: template
            value_template: "{{ v_deact_actions | length > 0 }}"
        then: !input deactivation_actions
