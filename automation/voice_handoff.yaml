# =============================================================================
# Voice Handoff Blueprint — Agent Switching (Dual Trigger)
# =============================================================================
# Two trigger sources:
#   1. input_text.ai_handoff_pending (set by LLM handoff_agent tool)
#   2. ai_handoff_request event (fired by dispatcher for self-handoffs)
#
# Farewell/greeting text generation uses 4 modes (llm_lines_mode input):
#   static: text spoken literally via TTS
#   ha_text_ai: prompt sent to pyscript.llm_task_call (no tools, no re-entry)
#   pipeline_agent: prompt sent to the pipeline's resolved conversation agent
#   conversation_agent: prompt sent via conversation.process (use tool-free agents only)
# Persona aliases configurable via blueprint input (persona_aliases).
#
# Requires:
#   - input_boolean.ai_voice_handoff_enabled
#   - input_text.ai_handoff_pending
#   - pyscript/agent_dispatcher.py (fires ai_handoff_request event)
#   - pyscript/tts_queue.py (tts_queue_speak for commentary only)
#   (restore_mode and restore_timeout are now blueprint inputs, not helpers)
# =============================================================================
blueprint:
  name: Voice Handoff — Agent Switching
  description: >-
    Switches the satellite pipeline when the LLM handoff tool sets
    ai_handoff_pending or when the dispatcher fires ai_handoff_request.
    Optionally plays farewell (TTS) and greeting (satellite), then
    reopens the mic.
  domain: automation
  author: madalone
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/voice_handoff.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    # ===========================================================================
    # ① Core
    # ===========================================================================
    core:
      name: "① Core"
      icon: mdi:swap-horizontal-bold
      description: Satellite, pipeline, and commentary/greeting toggles.
      collapsed: false
      input:
        satellite:
          name: Voice PE Satellite
          default: ""
          selector:
            entity:
              domain: assist_satellite

        pipeline_select:
          name: Satellite Pipeline Select
          description: The select entity controlling this satellite's pipeline.
          default: ""
          selector:
            entity:
              domain: select

        enable_commentary:
          name: Enable Commentary (outgoing agent)
          description: >-
            When enabled, the outgoing agent speaks a farewell via TTS
            before the handoff. Usually not needed since the LLM already
            says goodbye in its normal response.
          default: false
          selector:
            boolean:

        enable_greeting:
          name: Enable Greeting (incoming agent)
          description: >-
            When enabled, the incoming agent speaks a greeting after the
            switch. Disable for silent handoff (just switches pipeline
            and reopens mic).
          default: true
          selector:
            boolean:

    # ===========================================================================
    # ② Persona & Voice
    # ===========================================================================
    persona_voice:
      name: "② Persona & Voice"
      icon: mdi:account-music
      description: TTS speaker, voice mapping, and persona aliases.
      collapsed: true
      input:
        tts_speaker:
          name: TTS Speaker
          default: ""
          selector:
            entity:
              domain: media_player

        persona_aliases:
          name: Persona Aliases
          description: >-
            Map persona names to nicknames users might say.
            Format: canonical = alias1, alias2; canonical2 = alias3
            Example: doctor portuondo = the doctor, el doctor;deadpool=deepee, wade wilson
            The canonical name must match a pipeline option name (case-insensitive).
            Only needed for the LLM tool path — the dispatcher has its own alias config.
          default: "deadpool=deepee,wade wilson;doctor portuondo=the doctor,el doctor,portuondo"
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ③ Farewell & Greeting
    # ===========================================================================
    farewell_greeting:
      name: "③ Farewell & Greeting"
      icon: mdi:message-text-outline
      description: Prompts, text, and LLM mode for farewell/greeting generation.
      collapsed: true
      input:
        commentary_prompt:
          name: Commentary Prompt (outgoing agent)
          description: >-
            LLM prompt for the outgoing agent's farewell line.
            Use {target} as placeholder for the target agent name.
          default: >-
            The user asked to talk to {target}. Say a brief in-character
            goodbye or handoff line. One sentence max. Do not include any
            tags or special formatting.
          selector:
            text:
              multiline: true

        greeting_prompt:
          name: Greeting Prompt (incoming agent)
          description: "Use {source} for the outgoing agent name."
          default: >-
            {source} just handed the user to you. Introduce yourself and greet
            them naturally. Stay completely in character — voice, cadence,
            personality, everything. Do not simplify your speech pattern.
          selector:
            text:
              multiline: true

        llm_lines_mode:
          name: LLM Lines Mode
          description: >-
            How to generate farewell/greeting text.
            static: farewell_text/greeting_text spoken literally via TTS.
            ha_text_ai: Prompt sent to pyscript.llm_task_call — no tools.
            pipeline_agent: Prompt sent via conversation.process to the agent
            resolved from the active pipeline. Re-entry mitigated by
            tool-suppression prompt prefix + tool guard.
            conversation_agent: Same as pipeline_agent but you manually pick
            the agent in llm_lines_agent.
          default: "static"
          selector:
            select:
              options:
                - ha_text_ai
                - pipeline_agent
                - conversation_agent
                - static

        llm_lines_agent:
          name: LLM Lines Agent (conversation_agent mode only)
          description: >-
            Conversation agent entity for farewell/greeting generation. ONLY used
            when llm_lines_mode = conversation_agent. Standard agents are safe
            (tool-suppression prompt prefix + tool guard prevent re-entry).
          default: ""
          selector:
            entity:
              domain: conversation

        llm_lines_instance:
          name: HA Text AI Instance (ha_text_ai mode only)
          description: >-
            The HA Text AI sensor entity to use for farewell/greeting generation.
            ONLY used when llm_lines_mode = ha_text_ai. Pick the model/persona
            instance you want (e.g., sensor.ha_text_ai_rick). If empty,
            llm_task_call uses its default instance.
          default: ""
          selector:
            entity:
              domain: sensor
              filter:
                - integration: ha_text_ai

        farewell_text:
          name: Farewell Text / Prompt
          description: >-
            static: spoken literally. ha_text_ai / conversation_agent: LLM prompt.
            {target} = target persona name.
          default: "Switching you over to {target} now."
          selector:
            text:
              multiline: true

        greeting_text:
          name: Greeting Text / Prompt
          description: >-
            static: spoken literally. ha_text_ai / conversation_agent: LLM prompt.
            {source} = outgoing persona name.
          default: "Hey there, I'm here."
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ④ Mic & Conversation
    # ===========================================================================
    mic_conversation:
      name: "④ Mic & Conversation"
      icon: mdi:microphone-settings
      description: Echo guard, mic behavior, continuous conversation, and silence media.
      collapsed: true
      input:
        echo_guard_delay:
          name: Echo Guard Delay (seconds)
          description: >-
            Delay after greeting TTS finishes before opening the mic.
            Prevents the satellite from hearing its own greeting.
          default: 2
          selector:
            number:
              min: 0
              max: 5
              step: 0.5

        mic_behavior:
          name: Mic Behavior After Handoff
          description: >-
            Controls how the mic behaves after the agent responds.
            llm_decides (recommended): The agent's response determines mic
            behavior — if it ends with a question or decision phrase, mic
            stays open. If it ends with a statement, mic closes. Uses the
            Extended OpenAI agent's native continue_conversation flag.
            single_turn: Forces agent to end with statements (injects
            "never end with a question" instruction). Mic always closes
            after each response. User must wake-word to continue.
          default: "llm_decides"
          selector:
            select:
              options:
                - llm_decides
                - single_turn

        extra_system_prompt:
          name: Extra System Prompt (start_conversation)
          description: >-
            Custom instructions injected into the conversation agent's context
            when the mic opens. Added alongside mic_behavior instruction (if any).
            Use for persona-specific directives. Leave empty for default behavior.
          default: ""
          selector:
            text:
              multiline: true

        enable_continuous_conversation:
          name: Continuous Conversation After Handoff
          description: >-
            Keep the mic open after each response so the user can continue
            talking without a wake word. Exits after timeout or when a new
            handoff fires (mode: restart).
          default: false
          selector:
            boolean:

        continuous_conversation_timeout:
          name: Continuous Conversation Timeout (seconds)
          description: >-
            Maximum duration for continuous conversation after handoff.
            0 = use default (120 seconds).
          default: 120
          selector:
            number:
              min: 0
              max: 600
              step: 10

        silence_media_url:
          name: Silence Media URL
          description: >-
            Audio file played when opening the mic silently.
            start_conversation requires start_message or start_media_id —
            this is the workaround. Default is a 250ms silence file.
          default: "http://homeassistant.local:8123/local/silence.wav"
          selector:
            text:

    # ===========================================================================
    # ⑤ Bypass
    # ===========================================================================
    bypass:
      name: "⑤ Bypass"
      icon: mdi:shield-off-outline
      description: Follow-me bypass during handoff sequence.
      collapsed: true
      input:
        bypass_follow_me:
          name: Bypass Notification Follow-Me
          description: >
            Temporarily pause notification follow-me during the handoff
            sequence to prevent notifications from interrupting.
          default: true
          selector:
            boolean: {}

        bypass_claim_script:
          name: Refcount claim script
          description: >
            Script entity that registers a bypass claim. Create from the
            Refcount Bypass — Claim blueprint.
          default: script.refcount_bypass_claim
          selector:
            entity:
              domain: script

        bypass_release_script:
          name: Refcount release script
          description: >
            Script entity that releases a bypass claim. Create from the
            Refcount Bypass — Release blueprint.
          default: script.refcount_bypass_release
          selector:
            entity:
              domain: script

    # ===========================================================================
    # ⑥ Expertise Routing
    # ===========================================================================
    expertise_routing:
      name: "⑥ Expertise Routing"
      icon: mdi:head-lightbulb-outline
      description: Proactive expertise-based agent handoff.
      collapsed: true
      input:
        enable_expertise_handoff:
          name: Enable Expertise-Based Handoff
          description: >-
            When enabled, this satellite accepts proactive handoffs triggered
            by expertise routing (agent detects out-of-domain question and
            auto-routes to the expert). Disable to block proactive handoffs
            on this satellite while still allowing user-initiated ones.
          default: true
          selector:
            boolean:

        expertise_commentary_prompt:
          name: Expertise Commentary Prompt (outgoing agent)
          description: >-
            LLM prompt for the outgoing agent's farewell when expertise-routing.
            Use {target} for the target agent name. Different from reactive
            commentary — this explains WHY the agent is routing.
          default: >-
            You're handing the user to {target} because their question is
            more in {target}'s area of expertise. Say a brief in-character
            explanation — one sentence. Stay in character. No tags or formatting.
          selector:
            text:
              multiline: true

        expertise_greeting_prompt:
          name: Expertise Greeting Prompt (incoming agent)
          description: >-
            LLM prompt for the incoming agent's greeting on expertise handoff.
            Use {source} for the outgoing agent name. The incoming agent
            should answer the user's question directly, not just greet.
          default: >-
            {source} just routed the user to you because their question is
            in your area of expertise. Answer their question directly and
            helpfully. Stay in character.
          selector:
            text:
              multiline: true

    # ===========================================================================
    # ⑦ Infrastructure
    # ===========================================================================
    infrastructure:
      name: "⑦ Infrastructure"
      icon: mdi:cog-outline
      description: Kill switch, re-entry guard, and privacy gate settings.
      collapsed: true
      input:
        voice_handoff_enabled:
          name: "Voice handoff enabled entity"
          description: "Boolean that controls whether voice handoff is enabled."
          default: input_boolean.ai_voice_handoff_enabled
          selector:
            entity:
              filter:
                domain: input_boolean

        processing_guard:
          name: Handoff Processing Guard
          description: >-
            Boolean helper that prevents feedback loops during handoff. The
            blueprint sets this ON when a handoff starts and OFF when it finishes.
            If the outgoing agent's farewell accidentally triggers another handoff
            request, this guard blocks re-entry. Create input_boolean.ai_handoff_processing
            (initial: off) and select it here.
          default: ""
          selector:
            entity:
              domain: input_boolean

        stale_guard_timeout:
          name: Stale Guard Timeout (seconds)
          description: >-
            How long the processing guard can stay ON before being treated as
            stale and bypassed. Lower values recover faster from stuck handoffs.
          default: 30
          selector:
            number:
              min: 10
              max: 120
              step: 5
              unit_of_measurement: seconds
              mode: slider

        restore_mode:
          name: "Restore Mode"
          description: >-
            After a handoff, how should the pipeline be restored?
            Source = restore to the pre-handoff pipeline.
            Preferred = restore to the "Preferred" pipeline option.
            Never = don't auto-restore (idle monitor handles era reset).
          default: "source"
          selector:
            select:
              options:
                - label: "Source (pre-handoff)"
                  value: "source"
                - label: "Preferred"
                  value: "preferred"
                - label: "Never"
                  value: "never"
              mode: dropdown

        restore_timeout:
          name: "Restore Timeout (seconds)"
          description: >-
            How many seconds to wait before restoring the pipeline after
            a handoff. Only applies when Restore Mode is source or preferred.
            Set to 0 to disable timed restore.
          default: 300
          selector:
            number:
              min: 0
              max: 3600
              step: 30
              unit_of_measurement: s
              mode: box

        privacy_tier:
          name: Privacy gate tier
          description: >
            Which privacy tier this feature belongs to. When the other
            household member's identity confidence crosses the tier's
            threshold, this automation is suppressed.
            Off = no privacy gating.
          default: "t2"
          selector:
            select:
              options:
                - label: "Off — no privacy gating"
                  value: "off"
                - label: "T1 — Intimate (bedtime/wake)"
                  value: "t1"
                - label: "T2 — Personal (notifications/briefings)"
                  value: "t2"
                - label: "T3 — Ambient (detection/tracking)"
                  value: "t3"
        privacy_gate_enabled:
          name: "Privacy gate enabled entity"
          description: "Boolean that enables the privacy gate system."
          default: input_boolean.ai_privacy_gate_enabled
          selector:
            entity:
              domain: input_boolean
        privacy_gate_mode:
          name: "Privacy gate mode entity"
          description: "Select that controls privacy gate behavior (auto/force_suppress/force_allow)."
          default: input_select.ai_privacy_gate_mode
          selector:
            entity:
              domain: input_select
        privacy_gate_person:
          name: "Privacy gate person"
          description: "Person entity for tier suppression lookups."
          default: ""
          selector:
            entity:
              domain: person

    # ===========================================================================
    # ⑧ Music    # ===========================================================================
    music:
      name: "⑧ Music"
      icon: mdi:music-note
      description: >
        Agent jingles, handoff stingers, and thinking music during
        voice handoff. Requires music compositions in the production cache
        (generate via the batch composition blueprint first).
      collapsed: true
      input:
        enable_agent_jingle:
          name: Play agent theme jingle
          description: >
            Play the target agent's theme jingle before the greeting.
            Requires static compositions in the production cache.
          default: false
          selector:
            boolean: {}
        jingle_cooldown_s:
          name: Jingle cooldown (seconds)
          description: >
            Minimum time between jingles on the same speaker.
            Prevents every-sentence jingle repetition.
          default: 60
          selector:
            number:
              min: 10
              max: 300
              step: 10
              unit_of_measurement: seconds
              mode: slider
        enable_handoff_stinger:
          name: Play handoff stinger
          description: >
            Play a transition stinger between farewell and greeting
            during agent handoff. Short audio that bridges the two personas.
          default: false
          selector:
            boolean: {}
        enable_thinking_music:
          name: Play thinking music during deliberation
          description: >
            Play the agent's thinking loop while waiting for LLM response.
            Automatically preempted when TTS arrives (lower priority).
          default: false
          selector:
            boolean: {}

        jingle_library_id_override:
          name: Jingle tune override (library ID)
          description: >
            Play a specific composition by library ID for the agent jingle,
            bypassing auto-resolution. Leave empty for automatic selection.
          default: ""
          selector:
            text: {}

        stinger_library_id_override:
          name: Stinger tune override (library ID)
          description: >
            Play a specific composition by library ID for the handoff stinger,
            bypassing auto-resolution. Leave empty for automatic selection.
          default: ""
          selector:
            text: {}

        music_delay_after:
          name: Pause after music (seconds)
          description: >
            Seconds to wait after stinger/jingle before continuing.
          default: 2
          selector:
            number:
              min: 0
              max: 15
              step: 1
              unit_of_measurement: "s"

        music_fallback_media_url:
          name: Fallback audio URL
          description: >
            Static audio URL to play if the library is empty.
            Leave empty to skip music silently.
          default: ""
          selector:
            text: {}

mode: restart

# =============================================================================
# Triggers: flag change (LLM tool) OR event (dispatcher)
# =============================================================================
triggers:
  - trigger: state
    entity_id: input_text.ai_handoff_pending
    not_to: ""
    id: flag_trigger
  - trigger: event
    event_type: ai_handoff_request
    id: event_trigger
  - trigger: state
    entity_id: input_text.ai_handoff_pending
    not_to: ""
    for: "00:00:30"
    id: watchdog_trigger

# =============================================================================
# Conditions — master toggle + satellite match
# =============================================================================
variables:
  satellite_entity: !input satellite
  processing_guard_entity: !input processing_guard
  privacy_tier: !input privacy_tier
  v_privacy_enabled: !input privacy_gate_enabled
  v_privacy_mode: !input privacy_gate_mode
  v_privacy_person: !input privacy_gate_person
  v_privacy_slug: "{{ v_privacy_person.split('.')[-1] }}"
  stale_guard_timeout: !input stale_guard_timeout
  v_handoff_enabled: !input voice_handoff_enabled

conditions:
  - alias: "Privacy gate"
    condition: template
    value_template: >-
      {%- set tier = privacy_tier -%}
      {%- set mode = states(v_privacy_mode) | default('off') -%}
      {%- set override = states('input_select.ai_privacy_gate_voice_handoff') | default('off') -%}
      {%- if tier == 'off'
          or not is_state(v_privacy_enabled, 'on')
          or mode == 'force_allow_all' or override == 'force_allow'
          or override == 'off' -%}
        true
      {%- elif mode == 'force_suppress_all' or override == 'force_suppress' -%}
        false
      {%- else -%}
        {{ is_state('input_boolean.ai_privacy_gate_' ~ v_privacy_slug ~ '_' ~ tier ~ '_suppressed', 'off') }}
      {%- endif -%}
  - condition: template
    value_template: "{{ is_state(v_handoff_enabled, 'on') }}"
  # Only the satellite that last responded should handle the handoff
  - condition: template
    value_template: >-
      {{ states('input_text.ai_last_satellite') == satellite_entity }}
  # Re-entry guard — prevent feedback loops from commentary triggering handoff tools
  # Stale guard bypass: if guard stuck ON beyond stale_guard_timeout, treat as stale
  - condition: template
    value_template: >-
      {% set v_stale_timeout = stale_guard_timeout | default(30) | int %}
      {{ trigger.id in ['watchdog_trigger', 'event_trigger']
         or is_state(processing_guard_entity, 'off')
         or (now() - states[processing_guard_entity].last_changed).total_seconds() > v_stale_timeout }}

# =============================================================================
# Actions
# =============================================================================
actions:
  # 0. Watchdog: clear stale flag and stop
  - alias: "0. Watchdog: clear stale flag and stop"
    if:
      - condition: template
        value_template: "{{ trigger.id | default('') == 'watchdog_trigger' }}"
    then:
      - alias: "Clear stale handoff pending flag"
        action: input_text.set_value
        target:
          entity_id: input_text.ai_handoff_pending
        data:
          value: ""
      - alias: "Release processing guard after watchdog clear"
        action: input_boolean.turn_off
        target:
          entity_id: "{{ processing_guard_entity }}"
      - stop: "Watchdog cleared stale flag"

  # 0b. Set processing guard
  - alias: "Set processing guard to prevent re-entry"
    action: input_boolean.turn_on
    target:
      entity_id: "{{ processing_guard_entity }}"

  # 1. Static inputs + lookup tables
  - alias: "Set pipeline select and 21 more variables"
    variables:
      pipeline_select: !input pipeline_select
      satellite_entity: !input satellite
      speaker_entity: !input tts_speaker
      commentary_prompt_tpl: !input commentary_prompt
      greeting_prompt_tpl: !input greeting_prompt
      do_commentary: !input enable_commentary
      do_greeting: !input enable_greeting
      echo_guard_seconds: !input echo_guard_delay
      processing_guard_entity: !input processing_guard
      # Expertise routing inputs
      enable_expertise: !input enable_expertise_handoff
      expertise_commentary_tpl: !input expertise_commentary_prompt
      expertise_greeting_tpl: !input expertise_greeting_prompt
      # LLM lines mode — static / ha_text_ai / conversation_agent
      llm_lines_mode: !input llm_lines_mode
      llm_lines_agent: !input llm_lines_agent
      llm_lines_instance: !input llm_lines_instance
      farewell_text: !input farewell_text
      greeting_text_input: !input greeting_text
      # Continuous conversation
      continuous_enabled: !input enable_continuous_conversation
      continuous_timeout: !input continuous_conversation_timeout
      # Silence media
      silence_media_url: !input silence_media_url
      # Mic behavior + extra system prompt
      mic_behavior: !input mic_behavior
      extra_system_prompt_input: !input extra_system_prompt
      # Bypass follow-me
      v_bypass_follow_me: !input bypass_follow_me
      v_bypass_claim: !input bypass_claim_script
      v_bypass_release: !input bypass_release_script
      # Music
      v_enable_jingle: !input enable_agent_jingle
      v_jingle_cooldown: !input jingle_cooldown_s
      v_enable_stinger: !input enable_handoff_stinger
      v_enable_thinking: !input enable_thinking_music
      v_jingle_library_id: !input jingle_library_id_override
      v_stinger_library_id: !input stinger_library_id_override
      v_music_delay_after: !input music_delay_after
      v_music_fallback_url: !input music_fallback_media_url
      # TTS voice resolved dynamically via pyscript.dispatcher_resolve_engine

  # 1b. Compose extra_system_prompt from mic_behavior + custom prompt
  - alias: "Set mic instruction and 2 more variables"
    variables:
      mic_instruction: >-
        {% if mic_behavior == 'single_turn' %}
          Always end your responses with a statement, never with a question. Do not ask the user what they need help with or prompt them to speak.
        {% endif %}
      continuous_stop_instruction: >-
        {% if enable_continuous_conversation | default(false) %}
          If the user wants to end the conversation (goodbye, stop, done, we're done, that's all), call input_boolean.turn_off on input_boolean.ai_continuous_conversation_active to signal the system.
        {% endif %}
      rendered_extra_prompt: >-
        {{ [mic_instruction | trim, extra_system_prompt_input | trim, continuous_stop_instruction | trim] | reject('eq', '') | join(' ') }}

  # 1c. Save & bypass follow-me — after step 1 so v_bypass_* are defined
  - alias: "1c · Save & bypass follow-me"
    variables:
      follow_me_was_on: >-
        {{ v_bypass_follow_me | default(false)
           and is_state('input_boolean.ai_notification_follow_me', 'on') }}

  - alias: "1c · Disable follow-me (if configured)"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Claim follow-me bypass via refcount"
            action: "{{ v_bypass_claim }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  # 2. Dynamic values — handle both trigger types
  - alias: "Set handoff topic and 4 more variables"
    variables:
      handoff_topic: >-
        {% if trigger.id | default('') == 'event_trigger' %}
          {{ trigger.event.data.topic | default('') | trim }}
        {% else %}
          {{ '' }}
        {% endif %}
      handoff_target: >-
        {% if trigger.id | default('') == 'event_trigger' %}
          {{ trigger.event.data.target | default('') | trim | lower }}
        {% elif trigger.id | default('') == 'flag_trigger' %}
          {{ trigger.to_state.state | default('') | trim | lower }}
        {% else %}
          {{ '' }}
        {% endif %}
      is_self_handoff: >-
        {% if trigger.id | default('') == 'event_trigger' %}
          {{ trigger.event.data.self_handoff | default(false) | bool(false) }}
        {% else %}
          false
        {% endif %}
      handoff_variant: >-
        {% if trigger.id | default('') == 'event_trigger' %}
          {{ trigger.event.data.variant | default('') | trim | lower | replace('_', ' ') }}
        {% else %}
          {{ '' }}
        {% endif %}
      saved_pipeline: "{{ states(pipeline_select) }}"
      # Derive source persona — fall back to last interaction sensor when pipeline is "preferred"
      saved_persona: >-
        {% set pipe = states(pipeline_select) | lower | replace(' - bedtime', '') | replace(' - extended', '') %}
        {% if pipe == 'preferred' %}
          {{ states('sensor.ai_last_interaction') | lower }}
        {% else %}
          {{ pipe }}
        {% endif %}

  # 2b. Resolve persona aliases (LLM tool path sends raw user speech)
  - alias: "Set persona aliases raw, handoff target"
    variables:
      persona_aliases_raw: !input persona_aliases
      handoff_target: >-
        {% set raw = persona_aliases_raw | default('') %}
        {% set target = handoff_target %}
        {% set ns = namespace(result=target) %}
        {% for group in raw.split(';') %}
          {% set parts = group.split('=') %}
          {% if parts | length == 2 %}
            {% set canonical = parts[0] | trim | lower %}
            {% for alias in parts[1].split(',') %}
              {% if alias | trim | lower == target %}
                {% set ns.result = canonical %}
              {% endif %}
            {% endfor %}
          {% endif %}
        {% endfor %}
        {{ ns.result }}

  # 2c. Expertise handoff gate — extract reason + block if disabled
  - alias: "Set handoff reason"
    variables:
      handoff_reason: >-
        {% if trigger.id | default('') == 'event_trigger' %}
          {{ trigger.event.data.reason | default('user_request') }}
        {% else %}
          user_request
        {% endif %}
  - alias: "Check handoff reason condition"
    if:
      - condition: template
        value_template: >-
          {{ handoff_reason == 'expertise' and not enable_expertise }}
    then:
      - alias: "Restore follow-me (if bypassed)"
        choose:
          - conditions:
              - condition: template
                value_template: "{{ follow_me_was_on }}"
            sequence:
              - alias: "Release follow-me bypass (expertise blocked)"
                action: "{{ v_bypass_release }}"
                continue_on_error: true
                data:
                  owner: "{{ this.entity_id }}"
      - alias: "Clear processing guard (expertise blocked)"
        action: input_boolean.turn_off
        target:
          entity_id: "{{ processing_guard_entity }}"
      - stop: "Expertise handoff blocked on this satellite"

  # 3. Clear flag immediately (only for flag trigger)
  - alias: "3. Clear flag immediately (only for flag trigger)"
    if:
      - condition: template
        value_template: "{{ trigger.id == 'flag_trigger' }}"
    then:
      - alias: "Clear handoff pending flag after reading"
        action: input_text.set_value
        target:
          entity_id: input_text.ai_handoff_pending
        data:
          value: ""

  # 4. Validate target exists in pipeline options
  - alias: "Set pipeline options, target option"
    variables:
      pipeline_options: "{{ state_attr(pipeline_select, 'options') | default([]) }}"
      target_option: >-
        {% set opts = pipeline_options %}
        {% set ns = namespace(match='') %}
        {% if handoff_variant | length > 0 %}
          {% set full_target = handoff_target ~ ' - ' ~ handoff_variant %}
          {% for opt in opts %}
            {% if opt | lower == full_target %}
              {% set ns.match = opt %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% for opt in opts %}
            {% if opt | lower | regex_search('^' ~ handoff_target ~ '($|\\s+-\\s+)') and ' - ' not in opt %}
              {% set ns.match = opt %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.match }}
  - alias: "Check length condition"
    if:
      - condition: template
        value_template: "{{ target_option | length == 0 }}"
    then:
      - alias: "Restore follow-me (if bypassed)"
        choose:
          - conditions:
              - condition: template
                value_template: "{{ follow_me_was_on }}"
            sequence:
              - alias: "Release follow-me bypass (unknown target)"
                action: "{{ v_bypass_release }}"
                continue_on_error: true
                data:
                  owner: "{{ this.entity_id }}"
      - alias: "Clear processing guard (unknown target)"
        action: input_boolean.turn_off
        target:
          entity_id: "{{ processing_guard_entity }}"
      - stop: "Unknown handoff target: {{ handoff_target }} (not in pipeline options)"

  # 4b. Self-handoff: target is already active — just reopen mic
  - alias: "4b. Self-handoff: target is already active — just reopen mic"
    if:
      - condition: template
        value_template: >-
          {{ is_self_handoff | bool(false)
             or target_option == saved_pipeline
             or (saved_pipeline | lower != 'preferred'
                 and saved_persona == handoff_target) }}
    then:
      - alias: "Wait for satellite idle"
        wait_template: "{{ is_state(satellite_entity, 'idle') }}"
        timeout: "00:00:10"
        continue_on_timeout: true
      - alias: "Reopen mic for self-handoff (target already active)"
        action: assist_satellite.start_conversation
        target:
          entity_id: "{{ satellite_entity }}"
        data:
          start_media_id: "{{ silence_media_url }}"
          preannounce: false
          extra_system_prompt: "{{ rendered_extra_prompt }}"
      - alias: "Restore follow-me (if bypassed)"
        choose:
          - conditions:
              - condition: template
                value_template: "{{ follow_me_was_on }}"
            sequence:
              - alias: "Release follow-me bypass (self-handoff)"
                action: "{{ v_bypass_release }}"
                continue_on_error: true
                data:
                  owner: "{{ this.entity_id }}"
      - alias: "Clear processing guard (self-handoff)"
        action: input_boolean.turn_off
        target:
          entity_id: "{{ processing_guard_entity }}"
      - stop: "Self-handoff — mic reopened"

  # 5. Wait for satellite to finish speaking
  - alias: "Wait for satellite idle"
    wait_template: "{{ is_state(satellite_entity, 'idle') }}"
    timeout: "00:00:15"
    continue_on_timeout: true

  # 5-gap. Let ESPHome media player start playback before checking state
  # (satellite reports IDLE ~650ms before speaker transitions to ANNOUNCING)
  - alias: "Wait 1 seconds"
    delay:
      seconds: 1

  # 5a. Wait for speaker to finish playing outgoing agent's TTS response
  - alias: "Wait for template condition"
    wait_template: >-
      {{ states(speaker_entity) in ['idle', 'off', 'unavailable',
         'paused', 'unknown'] }}
    timeout: "00:00:15"
    continue_on_timeout: true

  # 5b. Brief pause to let pipeline settle after farewell
  - alias: "Wait 1 seconds"
    delay:
      seconds: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 6-8. Commentary (BEFORE pipeline switch — source agent's voice)
  # ─────────────────────────────────────────────────────────────────────────
  - alias: "6 · Source agent farewell (user + expertise handoffs)"
    if:
      - condition: template
        value_template: >-
          {{ do_commentary and trigger.id in ['flag_trigger', 'event_trigger'] }}
    then:
      - alias: "Set farewell prompt"
        variables:
          farewell_prompt: >-
            {% if handoff_reason == 'expertise' %}
              {{ expertise_commentary_tpl | replace('{target}', handoff_target | capitalize) }}
            {% else %}
              {{ farewell_text | replace('{target}', handoff_target | capitalize) }}
            {% endif %}

      - alias: "Choose action path"
        choose:
          - conditions:
              - condition: template
                value_template: "{{ llm_lines_mode == 'ha_text_ai' }}"
            sequence:
              - alias: "Generate farewell via ha_text_ai"
                action: pyscript.llm_task_call
                response_variable: llm_result
                continue_on_error: true
                data:
                  prompt: "{{ farewell_prompt }}"
                  max_tokens: 150
                  temperature: 0.7
                  priority_tier: standard
              - alias: "Set farewell speech"
                variables:
                  farewell_speech: >-
                    {{ (llm_result | default({})).get('response_text',
                       farewell_prompt) }}

          - conditions:
              - condition: template
                value_template: >-
                  {{ llm_lines_mode == 'conversation_agent'
                     and llm_lines_agent | length > 0 }}
            sequence:
              - alias: "Generate farewell via conversation agent"
                action: conversation.process
                response_variable: llm_result
                continue_on_error: true
                data:
                  agent_id: "{{ llm_lines_agent }}"
                  text: "[HANDOFF — do NOT call any functions or tools. Respond only with speech text.] {{ farewell_prompt }}"
              - alias: "Set farewell speech"
                variables:
                  farewell_speech: >-
                    {{ (llm_result | default({})).get('response', {})
                       .get('speech', {}).get('plain', {}).get('speech',
                       farewell_prompt) }}

          - conditions:
              - condition: template
                value_template: "{{ llm_lines_mode == 'pipeline_agent' }}"
            sequence:
              - alias: "Resolve source pipeline agent for farewell"
                action: pyscript.dispatcher_resolve_engine
                response_variable: agent_resolve
                continue_on_error: true
                data:
                  pipeline_name: "{{ saved_pipeline }}"
              - alias: "Set resolved agent, resolved farewell tts voice"
                variables:
                  resolved_agent: >-
                    {{ (agent_resolve | default({})).get('engine', '') }}
                  resolved_farewell_tts_voice: >-
                    {{ (agent_resolve | default({})).get('tts_voice', '') }}
              - alias: "Check length condition"
                if:
                  - condition: template
                    value_template: "{{ resolved_agent | length > 0 }}"
                then:
                  - alias: "Generate farewell via resolved pipeline agent"
                    action: conversation.process
                    response_variable: llm_result
                    continue_on_error: true
                    data:
                      agent_id: "{{ resolved_agent }}"
                      text: "[HANDOFF — do NOT call any functions or tools. Respond only with speech text.] {{ farewell_prompt }}"
                  - alias: "Set farewell speech"
                    variables:
                      farewell_speech: >-
                        {{ (llm_result | default({})).get('response', {})
                           .get('speech', {}).get('plain', {}).get('speech',
                           farewell_prompt) }}
                else:
                  - alias: "Set farewell speech"
                    variables:
                      farewell_speech: "{{ farewell_prompt }}"

        default:
          - alias: "Set farewell speech"
            variables:
              farewell_speech: "{{ farewell_prompt }}"

      - alias: "Resolve source agent TTS via dispatcher (farewell)"
        action: pyscript.dispatcher_resolve_engine
        response_variable: farewell_resolve
        continue_on_error: true
        data:
          pipeline_name: "{{ saved_persona }}"
      - alias: "Extract farewell TTS voice"
        variables:
          farewell_tts_engine: >-
            {{ (farewell_resolve | default({})).get('tts_engine', '') }}
          farewell_tts_voice_id: >-
            {{ (farewell_resolve | default({})).get('tts_voice', '') }}
      - alias: "Speak farewell in source agent's voice"
        action: pyscript.tts_queue_speak
        continue_on_error: true
        response_variable: tts_result
        data:
          text: "{{ farewell_speech }}"
          voice: "{{ farewell_tts_engine }}"
          voice_id: "{{ resolved_farewell_tts_voice | default(farewell_tts_voice_id) | default('') }}"
          target_mode: explicit
          target: "{{ speaker_entity }}"
          priority: 1
      - alias: "Log if farewell TTS failed"
        if:
          - condition: template
            value_template: "{{ tts_result is not defined or tts_result is none }}"
        then:
          - alias: "Write logbook entry"
            action: logbook.log
            data:
              name: "Blueprint Failure"
              message: "pyscript.tts_queue_speak (farewell) failed in {{ this.attributes.friendly_name }}"
              entity_id: "{{ this.entity_id }}"
      - alias: "Wait for TTS queue idle"
        wait_template: "{{ is_state('sensor.ai_tts_queue_status', 'idle') }}"
        timeout: "00:00:10"
        continue_on_timeout: true
      - alias: "Wait for speaker idle"
        wait_template: "{{ is_state(speaker_entity, 'idle') }}"
        timeout: "00:00:15"
        continue_on_timeout: true

  # ─────────────────────────────────────────────────────────────────────────
  # 7 · Handoff stinger  # ─────────────────────────────────────────────────────────────────────────
  - alias: "7 · Play handoff stinger between agents"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ v_enable_stinger | bool(false) }}"
        sequence:
          - alias: "7-music · 3-tier stinger resolution"
            choose:
              # ── Tier 1: Library ID override ──
              - conditions:
                  - condition: template
                    value_template: "{{ v_stinger_library_id | default('') | length > 0 }}"
                sequence:
                  - alias: "Play stinger by library ID"
                    action: pyscript.music_library_play
                    data:
                      library_id: "{{ v_stinger_library_id }}"
                      player: "{{ speaker_entity }}"
                    continue_on_error: true
                  - delay:
                      seconds: "{{ v_music_delay_after | int(2) }}"
              # ── Tier 2: Auto-resolve from compose cache ──
              - conditions:
                  - condition: template
                    value_template: "{{ true }}"
                sequence:
                  - alias: "Resolve stinger from music cache"
                    action: pyscript.music_compose_get
                    response_variable: stinger_result
                    data:
                      agent: "{{ saved_persona | default('rick') }}"
                      content_type: stinger
                    continue_on_error: true
                  - alias: "Play stinger or compose if missing"
                    choose:
                      # Found in library → play it
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ (stinger_result | default({})).get('status', '') == 'ok'
                                 and (stinger_result | default({})).get('file_path', '') | length > 0 }}
                        sequence:
                          - action: media_player.play_media
                            target:
                              entity_id: "{{ speaker_entity }}"
                            data:
                              media_content_id: >-
                                {{ (stinger_result.get('file_path', '') | replace('/config/www/', '/local/')) }}
                              media_content_type: music
                              announce: true
                            continue_on_error: true
                          - delay:
                              seconds: "{{ v_music_delay_after | int(2) }}"
                      # Not found → compose locally via FluidSynth
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ (stinger_result | default({})).get('status', '') == 'not_found' }}
                        sequence:
                          - action: pyscript.music_compose_local
                            response_variable: _local_stinger
                            data:
                              agent: "{{ saved_persona | default('rick') }}"
                              content_type: stinger
                              duration_s: 2.0
                            continue_on_error: true
                          - if: "{{ (_local_stinger | default({})).get('status', '') == 'ok' }}"
                            then:
                              - action: media_player.play_media
                                target:
                                  entity_id: "{{ speaker_entity }}"
                                data:
                                  media_content_id: >-
                                    {{ (_local_stinger.get('file_path', '') | replace('/config/www/', '/local/')) }}
                                  media_content_type: music
                                  announce: true
                                continue_on_error: true
                              - delay:
                                  seconds: "{{ v_music_delay_after | int(2) }}"
            # ── Tier 3 (default): Fallback URL or skip ──
            default:
              - alias: "Fallback stinger URL (or skip)"
                choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ v_music_fallback_url | default('') | length > 0 }}"
                    sequence:
                      - action: media_player.play_media
                        target:
                          entity_id: "{{ speaker_entity }}"
                        data:
                          media_content_id: "{{ v_music_fallback_url }}"
                          media_content_type: music
                        continue_on_error: true
                      - delay:
                          seconds: "{{ v_music_delay_after | int(2) }}"

  # ─────────────────────────────────────────────────────────────────────────
  # 8a-8c. Gather cross-agent context for target agent
  # ─────────────────────────────────────────────────────────────────────────
  - alias: "8a · Force-refresh memory context"
    continue_on_error: true
    action: pyscript.memory_context_force_refresh
    response_variable: _refresh_result

  - alias: "8b · Retrieve cross-agent whisper context"
    continue_on_error: true
    action: pyscript.agent_whisper_context
    response_variable: whisper_ctx
    data:
      agent_name: "{{ handoff_target }}"
      max_entries: 5
      lookback_hours: 2

  - alias: "8c · Store handoff context"
    variables:
      handoff_context: >-
        {{ (whisper_ctx | default({})).get('context', '') }}

  - alias: "8d · Persist handoff context to var entity + L2"
    continue_on_error: true
    action: pyscript.save_handoff_context
    data:
      context: "{{ handoff_context }}"

  # ─────────────────────────────────────────────────────────────────────────
  # 9. Switch pipeline to target
  # ─────────────────────────────────────────────────────────────────────────
  - alias: "9 · Switch pipeline"
    action: select.select_option
    target:
      entity_id: "{{ pipeline_select }}"
    data:
      option: "{{ target_option }}"

  # 9-therapy. Activate therapy toggle if variant is therapy
  #   therapy_session.yaml blueprint triggers on this toggle and takes over
  #   the session lifecycle (ESP injection, continuous conversation, cleanup).
  - alias: "9-therapy · Activate therapy toggle for therapy variants"
    if:
      - condition: template
        value_template: >-
          {{ handoff_variant | default('') | lower | trim is search('therapy') }}
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ai_therapy_mode
        continue_on_error: true

  # 9a. Register restore info with pyscript so Restore Now button works
  - alias: "9a · Register restore info"
    action: pyscript.voice_handoff_register_restore
    data:
      satellite: "{{ satellite_entity }}"
      pipeline_select: "{{ pipeline_select }}"
      saved_pipeline: "{{ saved_pipeline }}"
    continue_on_error: true

  # ─────────────────────────────────────────────────────────────────────────
  # 10-11. Greeting + mic reopen (AFTER pipeline switch — target agent's voice)
  # ─────────────────────────────────────────────────────────────────────────
  # 9b. Capture source agent name before greeting logic (available to step 10c outside if block)
  - alias: "Set last agent for esp"
    variables:
      _last_agent_for_esp: "{{ states('sensor.ai_last_interaction') }}"

  # ─────────────────────────────────────────────────────────────────────────
  # 9c · Agent theme jingle before greeting  # ─────────────────────────────────────────────────────────────────────────
  - alias: "9c · Play agent jingle before greeting"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ v_enable_jingle | bool(false) and do_greeting }}"
        sequence:
          - alias: "9c-music · 3-tier jingle resolution"
            choose:
              # ── Tier 1: Library ID override ──
              - conditions:
                  - condition: template
                    value_template: "{{ v_jingle_library_id | default('') | length > 0 }}"
                sequence:
                  - alias: "Play jingle by library ID"
                    action: pyscript.music_library_play
                    data:
                      library_id: "{{ v_jingle_library_id }}"
                      player: "{{ speaker_entity }}"
                    continue_on_error: true
                  - delay:
                      seconds: "{{ v_music_delay_after | int(2) }}"
              # ── Tier 2: Auto-resolve from compose cache ──
              - conditions:
                  - condition: template
                    value_template: "{{ true }}"
                sequence:
                  - alias: "Resolve jingle from music cache"
                    action: pyscript.music_compose_get
                    response_variable: jingle_result
                    data:
                      agent: "{{ handoff_target }}"
                      content_type: theme
                    continue_on_error: true
                  - alias: "Play jingle or compose if missing"
                    choose:
                      # Found in library → play it
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ (jingle_result | default({})).get('status', '') == 'ok'
                                 and (jingle_result | default({})).get('file_path', '') | length > 0 }}
                        sequence:
                          - action: media_player.play_media
                            target:
                              entity_id: "{{ speaker_entity }}"
                            data:
                              media_content_id: >-
                                {{ (jingle_result.get('file_path', '') | replace('/config/www/', '/local/')) }}
                              media_content_type: music
                              announce: true
                            continue_on_error: true
                          - delay:
                              seconds: "{{ v_music_delay_after | int(2) }}"
                      # Not found → compose locally via FluidSynth
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ (jingle_result | default({})).get('status', '') == 'not_found' }}
                        sequence:
                          - action: pyscript.music_compose_local
                            response_variable: _local_jingle
                            data:
                              agent: "{{ handoff_target }}"
                              content_type: theme
                              duration_s: 3.0
                            continue_on_error: true
                          - if: "{{ (_local_jingle | default({})).get('status', '') == 'ok' }}"
                            then:
                              - action: media_player.play_media
                                target:
                                  entity_id: "{{ speaker_entity }}"
                                data:
                                  media_content_id: >-
                                    {{ (_local_jingle.get('file_path', '') | replace('/config/www/', '/local/')) }}
                                  media_content_type: music
                                  announce: true
                                continue_on_error: true
                              - delay:
                                  seconds: "{{ v_music_delay_after | int(2) }}"
            # ── Tier 3 (default): Fallback URL or skip ──
            default:
              - alias: "Fallback jingle URL (or skip)"
                choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ v_music_fallback_url | default('') | length > 0 }}"
                    sequence:
                      - action: media_player.play_media
                        target:
                          entity_id: "{{ speaker_entity }}"
                        data:
                          media_content_id: "{{ v_music_fallback_url }}"
                          media_content_type: music
                        continue_on_error: true
                      - delay:
                          seconds: "{{ v_music_delay_after | int(2) }}"

  - alias: "10 · Target agent greeting (announce, mic stays closed)"
    if:
      - condition: template
        value_template: "{{ do_greeting }}"
    then:
      - alias: "Set last topic and 4 more variables"
        variables:
          _last_topic: >-
            {% set event_topic = handoff_topic | default('') | trim %}
            {% if event_topic | length > 0 %}
              {{ event_topic }}
            {% else %}
              {{ state_attr('sensor.ai_last_interaction', 'topic') | default('') }}
            {% endif %}
          _last_agent: "{{ states('sensor.ai_last_interaction') }}"
          _ctx: >-
            {{ handoff_context | default('', true) | trim }}
          _topic_line: >-
            {% if _last_topic not in ['', 'unknown', 'unavailable']
               and _last_agent not in ['', 'unknown', 'unavailable']
               and _last_agent != handoff_target %}
              HANDOFF CONTEXT: This user was just handed off to you from {{ _last_agent | capitalize }}. They were discussing "{{ _last_topic | replace('_', ' ') }}" with {{ _last_agent | capitalize }}, not with you. If asked who they were previously talking to, the answer is {{ _last_agent | capitalize }}.
            {% elif _last_agent not in ['', 'unknown', 'unavailable']
               and _last_agent != handoff_target %}
              HANDOFF CONTEXT: This user was just handed off to you from {{ _last_agent | capitalize }}.
            {% endif %}
          _ctx_block: >-
            {% set topic = _topic_line | trim %}
            {% set ctx = _ctx | trim %}
            {% if topic | length > 0 or ctx | length > 0 %}
              {% if topic %}{{ topic }}{% endif %}
              {% if topic and ctx %} {% endif %}
              {% if ctx %}Additional context: {{ ctx }}.{% endif %}
              Continue helping naturally — don't repeat back the context verbatim.
            {% else %}
              No specific prior context available.
            {% endif %}
          greeting_prompt: >-
            {% set _base_greeting %}
              {% if handoff_reason == 'expertise' %}
                {{ expertise_greeting_tpl | replace('{source}', saved_persona | capitalize) }} {{ _ctx_block }}
              {% else %}
                {{ greeting_text_input | replace('{source}', saved_persona | capitalize) }} {{ _ctx_block }}
              {% endif %}
            {% endset %}
            {% if llm_lines_mode in ['pipeline_agent', 'conversation_agent'] %}
              [INTERNAL GREETING — do NOT call handoff_agent or any tools. Respond with a brief in-character greeting only.] {{ _base_greeting | trim }}
            {% else %}
              {{ _base_greeting | trim }}
            {% endif %}

      - alias: "Choose action path"
        choose:
          - conditions:
              - condition: template
                value_template: "{{ llm_lines_mode == 'ha_text_ai' }}"
            sequence:
              - alias: "Generate greeting via ha_text_ai"
                action: pyscript.llm_task_call
                response_variable: llm_result
                continue_on_error: true
                data:
                  prompt: "{{ greeting_prompt }}"
                  max_tokens: 150
                  temperature: 0.7
                  priority_tier: standard
              - alias: "Set greeting speech"
                variables:
                  greeting_speech: >-
                    {{ (llm_result | default({})).get('response_text',
                       greeting_prompt) }}

          - conditions:
              - condition: template
                value_template: >-
                  {{ llm_lines_mode == 'conversation_agent'
                     and llm_lines_agent | length > 0 }}
            sequence:
              - alias: "Generate greeting via conversation agent"
                action: conversation.process
                response_variable: llm_result
                continue_on_error: true
                data:
                  agent_id: "{{ llm_lines_agent }}"
                  text: "[HANDOFF — do NOT call any functions or tools. Respond only with speech text.] {{ greeting_prompt }}"
              - alias: "Set greeting speech"
                variables:
                  greeting_speech: >-
                    {{ (llm_result | default({})).get('response', {})
                       .get('speech', {}).get('plain', {}).get('speech',
                       greeting_prompt) }}

          - conditions:
              - condition: template
                value_template: "{{ llm_lines_mode == 'pipeline_agent' }}"
            sequence:
              - alias: "Resolve target pipeline agent for greeting"
                action: pyscript.dispatcher_resolve_engine
                response_variable: agent_resolve
                continue_on_error: true
                data:
                  pipeline_name: "{{ target_option }}"
              - alias: "Set resolved agent, resolved tts voice"
                variables:
                  resolved_agent: >-
                    {{ (agent_resolve | default({})).get('engine', '') }}
                  resolved_tts_voice: >-
                    {{ (agent_resolve | default({})).get('tts_voice', '') }}
              - alias: "Check length condition"
                if:
                  - condition: template
                    value_template: "{{ resolved_agent | length > 0 }}"
                then:
                  - alias: "Generate greeting via resolved pipeline agent"
                    action: conversation.process
                    response_variable: llm_result
                    continue_on_error: true
                    data:
                      agent_id: "{{ resolved_agent }}"
                      text: "[HANDOFF — do NOT call any functions or tools. Respond only with speech text.] {{ greeting_prompt }}"
                  - alias: "Set greeting speech"
                    variables:
                      greeting_speech: >-
                        {{ (llm_result | default({})).get('response', {})
                           .get('speech', {}).get('plain', {}).get('speech',
                           greeting_prompt) }}
                else:
                  - alias: "Set greeting speech"
                    variables:
                      greeting_speech: "{{ greeting_prompt }}"

        default:
          - alias: "Set greeting speech"
            variables:
              greeting_speech: "{{ greeting_prompt }}"

      - alias: "Resolve target agent TTS via dispatcher (greeting)"
        action: pyscript.dispatcher_resolve_engine
        response_variable: greeting_resolve
        continue_on_error: true
        data:
          pipeline_name: "{{ handoff_target }}"
      - alias: "Extract greeting TTS voice"
        variables:
          greeting_tts_engine: >-
            {{ (greeting_resolve | default({})).get('tts_engine', '') }}
          greeting_tts_voice_id: >-
            {{ (greeting_resolve | default({})).get('tts_voice', '') }}
      - alias: "10a · Play greeting via TTS (speaker only, mic stays closed)"
        action: pyscript.tts_queue_speak
        continue_on_error: true
        response_variable: greeting_tts
        data:
          text: "{{ greeting_speech }}"
          voice: "{{ greeting_tts_engine }}"
          voice_id: "{{ resolved_tts_voice | default(greeting_tts_voice_id) | default('') }}"
          target_mode: explicit
          target: "{{ speaker_entity }}"
          priority: 1

      - alias: "Log if greeting TTS failed"
        if:
          - condition: template
            value_template: "{{ greeting_tts is not defined or greeting_tts is none }}"
        then:
          - alias: "Write logbook entry"
            action: logbook.log
            data:
              name: "Blueprint Failure"
              message: "pyscript.tts_queue_speak (greeting) failed in {{ this.attributes.friendly_name }}"
              entity_id: "{{ this.entity_id }}"

      - alias: "Wait for TTS queue idle"
        wait_template: "{{ is_state('sensor.ai_tts_queue_status', 'idle') }}"
        timeout: "00:00:10"
        continue_on_timeout: true

      - alias: "Wait for speaker to start playing"
        wait_template: >-
          {{ states(speaker_entity) not in ['idle', 'off', 'unavailable',
             'paused', 'unknown'] }}
        timeout: "00:00:05"
        continue_on_timeout: true

      - alias: "Wait for TTS playback to finish"
        wait_template: >-
          {{ states(speaker_entity) in ['idle', 'off', 'unavailable',
             'paused', 'unknown'] }}
        timeout: "00:00:45"
        continue_on_timeout: true

  # 10b. Post-playback buffer — let reverb decay before opening mic
  - alias: "10b · Post-playback buffer"
    delay:
      seconds: "{{ [echo_guard_seconds | float(0.5), 0.5] | max }}"

  # 10c. Enhance extra_system_prompt with topic context for target agent
  - alias: "Set enhanced esp"
    variables:
      enhanced_esp: >-
        {% set topic = _topic_line | default('') | trim %}
        {% set agent = _last_agent_for_esp | default('') | trim %}
        {% if topic | length > 0 %}
          {{ topic }} {{ rendered_extra_prompt }}
        {% elif agent | length > 0 and agent not in ['unknown', 'unavailable'] and agent != handoff_target %}
          HANDOFF CONTEXT: This user was just handed off to you from {{ agent | capitalize }}. {{ rendered_extra_prompt }}
        {% else %}
          {{ rendered_extra_prompt }}
        {% endif %}

  # 11. Open mic — silence media trick (start_conversation requires start_message or start_media_id)
  - alias: "11 · Open mic (silent)"
    action: assist_satellite.start_conversation
    target:
      entity_id: "{{ satellite_entity }}"
    data:
      start_media_id: "{{ silence_media_url }}"
      preannounce: false
      extra_system_prompt: "{{ enhanced_esp }}"
    continue_on_error: true

  # 11-gate. Wait for session to actually start (satellite leaves idle)
  - alias: "11-gate · Wait for session start"
    wait_template: "{{ not is_state(satellite_entity, 'idle') }}"
    timeout: "00:00:05"
    continue_on_timeout: true

  # 11a. Update self-awareness sensor via bridge service
  - alias: "11a · Update self-awareness"
    action: pyscript.update_last_interaction
    data:
      agent_name: "{{ handoff_target }}"
      topic: "{{ _last_topic | default('') | trim }}"
      handoff_reason: "{{ handoff_reason }}"
      handoff_source: "{{ saved_persona }}"

  - alias: "11a-log · Log handoff"
    action: system_log.write
    data:
      message: >-
        voice_handoff: {{ saved_persona }} → {{ handoff_target }}
        on {{ satellite_entity }} reason={{ handoff_reason }}
      level: info
      logger: homeassistant.components.blueprint.voice_handoff

  - alias: "11a-budget · Track handoff in budget"
    action: pyscript.budget_track_call
    data:
      service_type: handoff
      agent: "{{ handoff_target }}"
      calls: 1
    continue_on_error: true

  # 11b. Clear processing guard (handoff complete — allows new handoffs during continuous conversation)
  - alias: "11b · Clear processing guard"
    action: input_boolean.turn_off
    target:
      entity_id: "{{ processing_guard_entity }}"

  # 11c. Continuous conversation loop
  #   Lets start_conversation's multi-turn handle mic management.
  #   Our loop monitors when each multi-turn session ends (satellite → IDLE),
  #   checks exit conditions, and starts a new session with echo guard.
  - alias: "11c · Continuous conversation loop"
    if:
      - condition: template
        value_template: "{{ continuous_enabled }}"
    then:
      # Activate stop signal helper (if it exists)
      - alias: "Activate continuous conversation signal"
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ai_continuous_conversation_active
        continue_on_error: true
      - alias: "Set loop deadline, no speech count, mic open time"
        variables:
          loop_deadline: "{{ as_timestamp(now()) + (continuous_timeout | float(120)) }}"
          no_speech_count: 0
          mic_open_time: "{{ as_timestamp(now()) }}"
      - alias: "Repeat while condition holds"
        repeat:
          while:
            - condition: template
              value_template: >-
                {{ as_timestamp(now()) < loop_deadline | float
                   and no_speech_count | int(0) < 3
                   and states('input_boolean.ai_continuous_conversation_active') != 'off' }}
          sequence:
            # A0. Wait for session to actually start (satellite leaves idle).
            #     Prevents race: start_conversation fires but satellite
            #     hasn't transitioned yet → wait_template(idle) passes instantly.
            - alias: "Wait for satellite idle"
              wait_template: "{{ not is_state(satellite_entity, 'idle') }}"
              timeout: "00:00:05"
              continue_on_timeout: true
            # A. Wait for current multi-turn session to fully end (satellite idle).
            #    1st iteration: catches step 11's start_conversation session.
            #    Subsequent: catches step G's start_conversation session.
            #    Multi-turn retries DON'T go through IDLE, so this only
            #    completes when the session truly ends.
            - alias: "Wait for satellite idle"
              wait_template: "{{ is_state(satellite_entity, 'idle') }}"
              timeout: "00:01:00"
              continue_on_timeout: true
            # B. No-speech detection: multi-turn sessions with real user speech
            #    last 10+ seconds. Sessions that end quickly (< 12s) via
            #    stt-no-text-recognized mean no real interaction happened.
            - alias: "Set session duration, no speech count"
              variables:
                session_duration: >-
                  {% set dur = as_timestamp(now()) - (mic_open_time | float(as_timestamp(now()))) %}
                  {{ dur }}
                no_speech_count: >-
                  {% set dur = as_timestamp(now()) - (mic_open_time | float(as_timestamp(now()))) %}
                  {% if dur < 12 %}
                    {{ no_speech_count | int(0) + 1 }}
                  {% else %}
                    0
                  {% endif %}
            # C. Combined exit check (deadline + no-speech + stop signal)
            - condition: template
              value_template: >-
                {{ as_timestamp(now()) < loop_deadline | float
                   and no_speech_count | int(0) < 3
                   and states('input_boolean.ai_continuous_conversation_active') != 'off' }}
            # D. Wait for ESP speaker to finish TTS playback (two-phase).
            #    Phase 1: Wait for speaker to START (leave idle → ANNOUNCING).
            #    Phase 2: Wait for speaker to FINISH (return to idle).
            #    Replaces old echo guard (3s) + polling wait_template (15s).
            - alias: "Wait for speaker to start playing"
              wait_template: >-
                {{ states(speaker_entity) not in ['idle', 'off', 'unavailable',
                   'paused', 'unknown'] }}
              timeout: "00:00:05"
              continue_on_timeout: true
            - alias: "Wait for TTS playback to finish"
              wait_template: >-
                {{ states(speaker_entity) in ['idle', 'off', 'unavailable',
                   'paused', 'unknown'] }}
              timeout: "00:00:45"
              continue_on_timeout: true
            # F. Record timestamp before new session
            - alias: "Set mic open time"
              variables:
                mic_open_time: "{{ as_timestamp(now()) }}"
            # G. Start new multi-turn session
            - alias: "Reopen mic for next conversation turn"
              action: assist_satellite.start_conversation
              target:
                entity_id: "{{ satellite_entity }}"
              data:
                start_media_id: "{{ silence_media_url }}"
                preannounce: false
                extra_system_prompt: "{{ enhanced_esp | default(rendered_extra_prompt) }}"
              continue_on_error: true
      # Deactivate stop signal helper
      - alias: "Deactivate continuous conversation signal"
        action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ai_continuous_conversation_active
        continue_on_error: true

  # 12. Release follow-me bypass BEFORE restore delay
  #     Bypass only needed during active handoff (~30s). Holding it through
  #     the restore timer (~5min) means any reload/restart/mode:restart
  #     strands the counter. Release now, restore pipeline independently.
  - alias: "12 · Restore follow-me (if bypassed)"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ follow_me_was_on }}"
        sequence:
          - alias: "Release follow-me bypass (normal end path)"
            action: "{{ v_bypass_release }}"
            continue_on_error: true
            data:
              owner: "{{ this.entity_id }}"

  # 13. Clear processing guard (redundant safety — already cleared at 11b)
  - alias: "Clear processing guard (final safety)"
    action: input_boolean.turn_off
    target:
      entity_id: "{{ processing_guard_entity }}"

  # 14. Restore pipeline after timeout (3-mode: source / preferred / never)
  #     This runs independently after bypass is already released.
  #     Safe to be killed by reload/restart — no resources held.
  - alias: "Set restore mode, restore timeout"
    variables:
      restore_mode: !input restore_mode
      restore_timeout: !input restore_timeout
  - alias: "Choose action path"
    choose:
      # source mode — restore to pre-handoff pipeline
      - conditions:
          - condition: template
            value_template: >-
              {{ restore_mode == 'source' and restore_timeout | float(0) > 0 }}
        sequence:
          - alias: "Wait configured seconds"
            delay:
              seconds: "{{ restore_timeout | float(300) }}"
          - alias: "Wait for satellite idle"
            wait_template: "{{ is_state(satellite_entity, 'idle') }}"
            timeout: "00:01:00"
            continue_on_timeout: true
          - alias: "Restore pipeline to pre-handoff selection"
            action: select.select_option
            target:
              entity_id: "{{ pipeline_select }}"
            data:
              option: "{{ saved_pipeline }}"
          - alias: "Clear restore info after pipeline restored"
            action: pyscript.voice_handoff_clear_restore
            data:
              satellite: "{{ satellite_entity }}"
            continue_on_error: true
      # preferred mode — restore to "Preferred" pipeline
      - conditions:
          - condition: template
            value_template: >-
              {{ restore_mode == 'preferred' and restore_timeout | float(0) > 0 }}
        sequence:
          - alias: "Wait configured seconds"
            delay:
              seconds: "{{ restore_timeout | float(300) }}"
          - alias: "Wait for satellite idle"
            wait_template: "{{ is_state(satellite_entity, 'idle') }}"
            timeout: "00:01:00"
            continue_on_timeout: true
          - alias: "Restore pipeline to preferred selection"
            action: select.select_option
            target:
              entity_id: "{{ pipeline_select }}"
            data:
              option: "preferred"
          - alias: "Clear restore info after preferred restored"
            action: pyscript.voice_handoff_clear_restore
            data:
              satellite: "{{ satellite_entity }}"
            continue_on_error: true
