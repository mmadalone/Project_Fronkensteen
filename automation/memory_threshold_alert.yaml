# =============================================================================
# Memory Threshold Alert (v1.0.0)
# =============================================================================
# Scheduled monitor + notification for L2 memory lifecycle (Phase 1).
#
# Dual-trigger:
#   1. Daily time trigger — calls pyscript.memory_health_check
#   2. Event trigger — fires persistent notification when thresholds breached
#
# Thresholds are controlled by helpers in packages/ai_embedding.yaml:
#   input_number.ai_memory_record_limit  (default 5000)
#   input_number.ai_memory_db_max_mb     (default 100 MB)
# =============================================================================

blueprint:
  name: "Memory Threshold Alert (v1.0.0)"
  author: madalone
  description: >
    # Memory Threshold Alert


    Scheduled daily health check for L2 memory. Calls
    `pyscript.memory_health_check` at the configured time, which compares
    record count and DB file size against configurable thresholds. If any
    threshold is breached, a persistent notification appears in the HA sidebar.


    **Thresholds** are controlled via helpers (Settings → Helpers):

    - `AI Memory - Record Limit` (default 5000 records)

    - `AI Memory - DB Max Size` (default 100 MB)


    **Schedule:** Default 04:00 — after the nightly summarizer (03:00) and
    embedding batch (03:30) complete.


    Part of Memory Lifecycle Policy (Phase 1 — monitoring).

  domain: automation
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/memory_threshold_alert.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    # ===========================================================================
    # ① SCHEDULE
    # ===========================================================================
    schedule:
      name: "① Schedule"
      icon: mdi:clock-outline
      collapsed: false
      input:
        check_time:
          name: "Daily check time"
          description: >
            When to run the daily health check. Recommended: after nightly
            batch jobs complete (default 04:00).
          default: "04:00:00"
          selector:
            time: {}

    # ===========================================================================
    # ② NOTIFICATION
    # ===========================================================================
    notification:
      name: "② Notification"
      icon: mdi:bell-alert
      collapsed: true
      input:
        notification_title:
          name: "Notification title"
          description: "Title for the persistent notification."
          default: "Memory threshold exceeded"
          selector:
            text: {}

mode: single
max_exceeded: silent

triggers:
  # ── Scheduled health check ──────────────────────────────────────────────
  - trigger: time
    at: !input check_time
    id: scheduled_check

  # ── Threshold breach event (fired by pyscript.memory_health_check) ─────
  - trigger: event
    event_type: ai_memory_threshold_exceeded
    id: threshold_event

actions:
  - alias: "Branch on trigger"
    choose:
      # ── Scheduled check: call the health check service ──
      - conditions:
          - condition: trigger
            id: scheduled_check
        sequence:
          - alias: "Run memory health check"
            action: pyscript.memory_health_check
            response_variable: result
            continue_on_error: true

      # ── Threshold event: create persistent notification ──
      - conditions:
          - condition: trigger
            id: threshold_event
        sequence:
          - alias: "Create persistent notification"
            action: persistent_notification.create
            data:
              notification_id: ai_memory_threshold
              title: !input notification_title
              message: >-
                {% set metrics = trigger.event.data.get('metrics', []) %}
                {% set rows = trigger.event.data.get('rows', '?') %}
                {% set expired = trigger.event.data.get('expired', '?') %}
                {% set db_mb = trigger.event.data.get('db_size_mb', '?') %}
                {% set rec_limit = trigger.event.data.get('record_limit', '?') %}
                {% set db_limit = trigger.event.data.get('db_max_mb', '?') %}
                {% set breaches = [] %}
                {% for m in metrics %}
                  {% if m.metric == 'record_count' %}
                    {% set _ = breaches.append('Record count: ' ~ m.current ~ ' / ' ~ m.limit) %}
                  {% elif m.metric == 'db_size_mb' %}
                    {% set _ = breaches.append('DB size: ' ~ m.current ~ ' MB / ' ~ m.limit ~ ' MB') %}
                  {% endif %}
                {% endfor %}
                L2 memory has exceeded configured thresholds.

                **Breached:** {{ breaches | join(', ') if breaches else 'unknown' }}

                **Current stats:** {{ rows }} records ({{ expired }} expired), {{ db_mb }} MB on disk.

                Consider running `pyscript.memory_purge_expired` or adjusting thresholds in Settings → Helpers.
