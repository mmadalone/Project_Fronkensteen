# =============================================================================
# Project Sync Blueprint — Orchestrates project_promote.py
# =============================================================================
# Periodic sync of /config/projects/*.md → L2 memory → L1 helpers → hot context
# Thin orchestration wrapper — all logic lives in pyscript/project_promote.py
#
# Instance: automation.ai_project_sync
#
# Deployed: 2026-03-11
# =============================================================================

blueprint:
  name: "AI Project Sync"
  description: >
    Periodically syncs project files from /config/projects/ into L2 memory
    and L1 helpers for voice agent awareness. Fires persistent notifications
    on sync failure or project status changes.
  domain: automation
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/automation/project_sync.yaml
  author: madalone

  input:
    # ===========================================================================
    # ① Core
    # ===========================================================================
    core:
      name: "① Core"
      icon: mdi:folder-sync-outline
      description: Enable/disable sync and set the schedule.
      collapsed: false
      input:
        enable:
          name: Enable
          description: Kill switch for this automation instance.
          default: true
          selector:
            boolean:

        sync_interval_minutes:
          name: Sync interval (minutes)
          description: >
            How often to sync project files. The pyscript engine has a 5-min
            cache, so values under 5 are effectively 5.
          default: 30
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        manual_trigger:
          name: Manual trigger
          description: >
            Input boolean to trigger an immediate sync. Turns itself off after.
          default: input_boolean.ai_project_data_stale
          selector:
            entity:
              domain: input_boolean

    # ===========================================================================
    # ② Notifications & Paths
    # ===========================================================================
    notifications_paths:
      name: "② Notifications & Paths"
      icon: mdi:bell-cog-outline
      description: Project directory location and notification preferences.
      collapsed: true
      input:
        project_directory:
          name: Project directory
          description: >
            Path to the directory containing project .md files.
            Default: /config/projects
          default: "/config/projects"
          selector:
            text:
              multiline: false

        notify_on_stale:
          name: Notify on stale
          description: >
            Send a persistent notification when project sync fails.
          default: true
          selector:
            boolean:

        notify_on_status_change:
          name: Notify on status change
          description: >
            Send a notification when a project changes status (e.g. active → blocked).
          default: false
          selector:
            boolean:

mode: single
max_exceeded: silent

variables:
  v_enable: !input enable
  v_sync_interval: !input sync_interval_minutes
  v_notify_stale: !input notify_on_stale
  v_notify_status: !input notify_on_status_change
  v_manual_trigger: !input manual_trigger

trigger:
  # ── 1. Periodic sync (every N minutes) ──
  - id: periodic
    trigger: time_pattern
    minutes: !input sync_interval_minutes

  # ── 2. Manual trigger ──
  - id: manual
    trigger: state
    entity_id: !input manual_trigger
    to: "on"

  # ── 3. Startup ──
  - id: startup
    trigger: homeassistant
    event: start

condition:
  - condition: template
    value_template: "{{ v_enable }}"

action:
  # ── Step 1: Call pyscript engine ──
  - alias: "Sync project files to L2 memory and L1 helpers"
    action: pyscript.project_promote_now
    data:
      force: "{{ trigger.id == 'manual' }}"
    response_variable: promote_result

  # ── Step 2: Turn off manual trigger if it was used ──
  - alias: "Step 2: Turn off manual trigger if it was used"
    if:
      - condition: template
        value_template: "{{ trigger.id == 'manual' }}"
    then:
      - alias: "Reset manual trigger boolean after sync"
        action: input_boolean.turn_off
        target:
          entity_id: !input manual_trigger

  # ── Step 3: Stale notification ──
  - alias: "Step 3: Stale notification"
    if:
      - condition: template
        value_template: >-
          {{ v_notify_stale and promote_result is defined
             and promote_result.get('stale', false) }}
    then:
      - alias: "Notify about stale project sync failure"
        action: persistent_notification.create
        data:
          title: "Project Sync: Data Stale"
          message: >-
            Project file sync failed. Check that /config/projects/ is
            accessible. Consecutive failures:
            {{ promote_result.get('consecutive_failures', '?') }}
          notification_id: ai_project_sync_stale
