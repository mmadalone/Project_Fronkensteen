# ai_focus_guard — Focus Guard
# ═══════════════════════════════════════════════════════════════════
# Last meal timestamp. Updated by voice command ("I just ate") or
# pyscript.focus_guard_mark_meal service.
last_meal_time:
  name: "Last Meal Time"
  has_date: true
  has_time: true
  icon: mdi:food-apple

# Snooze expiry. Set by voice command ("remind me in 30 minutes")
# or pyscript.focus_guard_snooze. Calendar P1 (critical) nudges bypass snooze.
focus_guard_snooze_until:
  name: "Focus Guard - Snooze Until"
  has_date: true
  has_time: true
  icon: mdi:alarm-snooze

