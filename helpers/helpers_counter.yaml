# =============================================================================
# Counter Helpers
# =============================================================================
# HA-native atomic counters — increment/decrement/reset with minimum floor.
# Single-threaded asyncio = effectively atomic. No JSON parsing needed.
# =============================================================================

########################################
# Notification Follow-Me — Bypass Refcount (I-45b v2)
########################################
# Replaces the fragile JSON owner list (BRP-WATCHDOG-001).
# Incremented on claim, decremented on release.
# First claim (0→1) turns OFF follow-me. Last release (1→0) restores ON.
# Watchdog resets to 0 if counter > 0 and stale (last_changed > TTL).

notification_follow_me_bypass_refcount:
  name: Follow-Me Bypass Refcount
  icon: mdi:counter
  initial: 0
  minimum: 0
  step: 1

########################################
# Away Patterns — Daily Trip Counter (I-40b)
########################################
# Per-person daily trip counter. Incremented on each valid arrival
# (duration >= MIN_AWAY_DURATION_SEC). Reset at daily rebuild (04:15).
# Used by away_patterns.py for ordinal-aware prediction.

ai_away_trip_count_miquel:
  name: "AI Away Trip Count - Miquel"
  icon: mdi:counter
  initial: 0
  minimum: 0
  step: 1
  restore: true

ai_away_trip_count_jessica:
  name: "AI Away Trip Count - Jessica"
  icon: mdi:counter
  initial: 0
  minimum: 0
  step: 1
  restore: true
