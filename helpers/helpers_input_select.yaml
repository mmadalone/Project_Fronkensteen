# ═══════════════════════════════════════════════════════════════════
# ai_duck_manager — Unified Volume Ducking
# ═══════════════════════════════════════════════════════════════════

# I-39: Duck behavior — volume only, pause media, or both
ai_duck_behavior:
  name: "Duck Behavior"
  options:
    - volume
    - pause
    - both
  icon: mdi:motion-pause

# ═══════════════════════════════════════════════════════════════════
# ai_email_promotion — Email Priority Filter
# ═══════════════════════════════════════════════════════════════════

# Filter mode:
#   whitelist — only contacts + keywords get through; everything else filtered
#   blacklist — everything promoted EXCEPT blocked senders/keywords
#   hybrid   — contacts + keywords promoted, blocked filtered, unknown filtered
# Urgent keyword detection applies in all modes.
ai_email_filter_mode:
  name: "AI Email Filter Mode"
  options:
    - whitelist
    - blacklist
    - hybrid
  initial: blacklist
  icon: mdi:filter-variant

# ═══════════════════════════════════════════════════════════════════
# ai_llm_budget — LLM Cost Control
# ═══════════════════════════════════════════════════════════════════

# C5: Budget cost source — which cost figure the budget gate uses
ai_budget_cost_source:
  name: "AI Budget - Cost Source"
  options:
    - estimated
    - actual
    - hybrid
  initial: hybrid
  icon: mdi:scale-balance

# I-33: Budget metric selector (display preference — all limits are enforced)
ai_budget_metric:
  name: "AI Budget - Display Metric"
  options:
    - cost
    - calls
    - tokens
  icon: mdi:chart-bar

# I-33: Currency display label (does NOT convert — user must update rates)
ai_budget_currency:
  name: "AI Budget - Currency"
  options:
    - "€"
    - "$"
    - "£"
  icon: mdi:currency-sign

# I-33 Phase 2: Per-agent budget view level
ai_budget_view_level:
  name: "AI Budget - View Level"
  options:
    - engine
    - agent
    - model
    - provider
  icon: mdi:eye

