# ═══════════════════════════════════════════════════════════════════
# ai_email_promotion — Email Priority Filter
# ═══════════════════════════════════════════════════════════════════

# Filter mode:
#   whitelist — only contacts + keywords get through; everything else filtered
#   blacklist — everything promoted EXCEPT blocked senders/keywords
#   hybrid   — contacts + keywords promoted, blocked filtered, unknown filtered
# Urgent keyword detection applies in all modes.
ai_email_filter_mode:
  name: "AI Email Filter Mode"
  options:
    - whitelist
    - blacklist
    - hybrid
  initial: blacklist
  icon: mdi:filter-variant

