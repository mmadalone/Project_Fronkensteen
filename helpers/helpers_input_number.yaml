# ═══════════════════════════════════════════════════════════════════
# ai_predictive_schedule — Predictive Scheduling
# ═══════════════════════════════════════════════════════════════════

# Target sleep hours. Used by bedtime advisor to compute target sleep time.
# sleep_time = wake_time - target_sleep_hours
ai_target_sleep_hours:
  name: "AI Target Sleep Hours"
  min: 5
  max: 10
  step: 0.5
  unit_of_measurement: "h"
  icon: mdi:sleep

# Morning preparation buffer. Minutes from waking up to being ready to
# leave / start the first commitment of the day.
# wake_time = first_event_time - morning_prep_buffer
ai_morning_prep_buffer:
  name: "AI Morning Prep Buffer"
  min: 15
  max: 90
  step: 5
  unit_of_measurement: "min"
  icon: mdi:coffee-outline


