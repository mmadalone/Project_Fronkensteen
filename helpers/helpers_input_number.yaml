# ai_llm_budget — LLM/TTS/STT Budget Tracking
# ═══════════════════════════════════════════════════════════════════

# Manual budget scale factor. 100 = normal day, 50 = half-budget.
# Reserved for future blueprint throttling (not used in gate math yet).
ai_llm_daily_budget:
  name: "AI LLM - Daily Budget"
  min: 0
  max: 200
  step: 1
  mode: slider
  unit_of_measurement: "%"
  icon: mdi:cash-multiple

# ai_llm_calls_today removed — migrated to sensor.ai_llm_calls_today (state.set, Session 3)

# The denominator for budget % calculation. Adjust via UI or automation.
ai_llm_daily_limit:
  name: "AI LLM - Daily Call Limit"
  min: 10
  max: 100000
  step: 10
  mode: box
  icon: mdi:speedometer

# I-33: Extended budget tracking
ai_tts_daily_limit:
  name: "AI TTS - Daily Call Limit"
  min: 10
  max: 5000
  step: 10
  mode: box
  icon: mdi:message-text-clock

# ai_llm_tokens_today removed — migrated to sensor.ai_llm_tokens_today (state.set, Session 3)

ai_llm_daily_token_limit:
  name: "AI LLM - Daily Token Limit"
  min: 10000
  max: 1000000
  step: 10000
  mode: box
  icon: mdi:speedometer-slow

# ai_tts_chars_today, ai_stt_calls_today removed — migrated to sensors (state.set, Session 3)

ai_budget_daily_cost_limit:
  name: "AI Budget - Daily Cost Limit (€)"
  min: 0.50
  max: 50
  step: 0.50
  mode: box
  unit_of_measurement: "€"
  icon: mdi:cash-lock

# I-33: Per-service pricing helpers (user-configurable rates)
ai_cost_per_1k_llm_tokens:
  name: "AI Cost - per 1K LLM Tokens"
  min: 0
  max: 0.10
  step: 0.001
  initial: 0.001
  mode: box
  unit_of_measurement: "€"
  icon: mdi:brain

ai_cost_per_1k_tts_chars:
  name: "AI Cost - per 1K TTS Characters"
  min: 0
  max: 1.00
  step: 0.01
  initial: 0.30
  mode: box
  unit_of_measurement: "€"
  icon: mdi:account-voice

ai_cost_per_stt_call:
  name: "AI Cost - per STT Call"
  min: 0
  max: 0.50
  step: 0.005
  initial: 0.02
  mode: box
  unit_of_measurement: "€"
  icon: mdi:microphone

# I-46: ElevenLabs credit floor (TTS swaps to HA Cloud below this)
ai_elevenlabs_credit_floor:
  name: "ElevenLabs - Credit Floor"
  min: -100000
  max: 100000
  step: 1000
  initial: 5000
  mode: box
  unit_of_measurement: "chars"
  icon: mdi:account-voice

# I-33 Phase 2: ElevenLabs credit cap (0 = use API value, >0 = override)
ai_elevenlabs_credit_cap:
  name: "ElevenLabs - Credit Cap (chars)"
  min: 0
  max: 10000000
  step: 1000
  initial: 0
  mode: box
  unit_of_measurement: "chars"
  icon: mdi:account-voice

# Rolling window for OpenRouter usage aggregation (budget_history table)
ai_budget_rolling_months:
  name: "AI Budget - Rolling Window (months)"
  min: 1
  max: 24
  step: 1
  mode: box
  unit_of_measurement: "months"
  icon: mdi:calendar-range

# ai_openrouter_usage_midnight, ai_elevenlabs_chars_midnight, ai_serper_credits_midnight,
