  name: "AI Memory - DB Max Size"
  min: 50
  max: 500
  step: 10
  initial: 100
  mode: slider
  unit_of_measurement: "MB"
  icon: mdi:harddisk

# ── Auto-archive (I-42 Phase 2) ──────────────────────────────────
# Archive down to this % of record_limit when threshold exceeded.
