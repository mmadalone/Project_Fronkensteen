# ai_embedding — Semantic Search & Memory Lifecycle
# ═══════════════════════════════════════════════════════════════════

# Vector dimensions. Changing this triggers a full reindex via the automation below.
# 512 is the sweet spot for ~400 records: cheapest, fastest, minimal quality loss.
ai_embedding_dimensions:
  name: "AI Embedding - Dimensions"
  min: 128
  max: 1536
  step: 128
  initial: 512
  mode: box
  icon: mdi:vector-square

# Max records to embed per nightly batch run.
ai_embedding_batch_size:
  name: "AI Embedding - Batch Size"
  min: 10
  max: 200
  step: 10
  initial: 50
  mode: box
  icon: mdi:package-variant

# Default number of results for semantic search.
ai_semantic_search_results:
  name: "AI Semantic - Search Results"
  min: 1
  max: 20
  step: 1
  initial: 5
  mode: box
  icon: mdi:text-search

# Minimum cosine similarity threshold (0.0–1.0).
# Results below this are filtered out.
ai_semantic_similarity_threshold:
  name: "AI Semantic - Similarity Threshold"
  min: 0
  max: 1
  step: 0.05
  initial: 0.7
  mode: slider
  icon: mdi:target

# Blend weight for hybrid search (0 = FTS5 only, 100 = semantic only).
# At 50, both FTS5 and semantic scores contribute equally.
ai_semantic_blend_weight:
  name: "AI Semantic - Blend Weight"
  min: 0
  max: 100
  step: 5
  initial: 50
  mode: slider
  unit_of_measurement: "%"
  icon: mdi:scale-balance

