# ═══════════════════════════════════════════════════════════════════
# ai_away_patterns — Away Pattern Prediction
# ═══════════════════════════════════════════════════════════════════

ai_away_pattern_lookback_days:
  name: "AI Away Patterns - Lookback Days"
  min: 7
  max: 90
  step: 1
  mode: slider
  unit_of_measurement: "days"
  icon: mdi:calendar-range

ai_away_pattern_min_samples:
  name: "AI Away Patterns - Min Samples"
  min: 3
  max: 30
  step: 1
  mode: slider
  icon: mdi:counter

ai_away_travel_buffer_minutes:
  name: "AI Away Patterns - Travel Buffer"
  min: 10
  max: 60
  step: 5
  mode: slider
  unit_of_measurement: "min"
  icon: mdi:car-clock

# I-40a G14: WiFi flap debounce
ai_away_flap_debounce_seconds:
  name: "AI Away - WiFi Flap Debounce"
  # How long device_tracker must stay 'not_home' before departure triggers.
  # Prevents false departures from WiFi drops, router reboots, mesh roaming.
  # Higher values = fewer false triggers but slower departure detection.
  initial: 300
  min: 60
  max: 600
  step: 30
  mode: slider
  unit_of_measurement: "s"
  icon: mdi:wifi-alert

# I-40a G8: Prediction update interval
ai_away_prediction_update_minutes:
  name: "AI Away - Prediction Update Interval"
  # How often predictions re-run while someone is away.
  # Lower = more responsive (prediction sharpens faster) but more HA load.
  # Higher = less responsive but lighter on system.
  initial: 15
  min: 5
  max: 60
  step: 5
  mode: slider
  unit_of_measurement: "min"
  icon: mdi:update

# I-40b: Ordinal filtering threshold
ai_away_ordinal_min_samples:
  name: "AI Away - Ordinal Min Samples"
  # Minimum ordinal-specific samples before ordinal filtering is used.
  # Below this threshold, prediction falls back to all-ordinal data.
  initial: 5
  min: 3
  max: 20
  step: 1
  mode: slider
  icon: mdi:counter


