# Entries accessed within N days are protected from archiving.
ai_memory_archive_recency_days:
  name: "AI Memory - Archive Recency Days"
  min: 7
  max: 365
  step: 1
  initial: 30
  mode: box
  unit_of_measurement: "days"
  icon: mdi:calendar-clock

# ── Search-time enrichment (auto-relationships Option A) ────────
# Maximum related entries appended per search.
ai_memory_search_enrich_max:
  name: "AI Memory - Search Enrich Max"
  min: 0
  max: 10
  step: 1
  initial: 3
  mode: box
  icon: mdi:graph-outline

# Minimum relationship weight for search enrichment (0.0-1.0).
# Higher values = stricter filtering, only strong connections surface.
ai_memory_search_enrich_min_weight:
  name: "AI Memory - Search Enrich Min Weight"
  min: 0
  max: 1
  step: 0.05
  initial: 0.15
  mode: slider
  icon: mdi:weight

# ── Semantic autolink (vec0 content_match) ──────────────────────
# Minimum cosine similarity for content_match edges.
ai_memory_semantic_autolink_threshold:
  name: "AI Memory - Semantic Autolink Threshold"
  min: 0.5
  max: 1
  step: 0.05
  initial: 0.7
  mode: slider
  icon: mdi:vector-link

# Maximum keys to process per semantic autolink run.
ai_memory_semantic_autolink_batch:
  name: "AI Memory - Semantic Autolink Batch"
  min: 10
  max: 200
  step: 10
  initial: 50
  mode: box
  icon: mdi:vector-link


