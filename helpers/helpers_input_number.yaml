# ═══════════════════════════════════════════════════════════════════
# ai_presence_patterns — Presence Pattern Recognition
# ═══════════════════════════════════════════════════════════════════

# How many days of recorder history to query for pattern extraction.
# More days = more data = better predictions, but slower extraction.
# 30 days is a good balance; increase after system has been running longer.
ai_presence_pattern_lookback_days:
  name: "AI Presence - Lookback Days"
  min: 7
  max: 90
  step: 1
  mode: slider
  unit_of_measurement: "days"
  icon: mdi:calendar-range

# Minimum number of transitions before a pattern is considered valid.
# Below this threshold, predictions return "insufficient" confidence.
# Lower = more aggressive predictions from less data.
# Higher = more conservative, requires more history.
ai_presence_pattern_min_samples:
  name: "AI Presence - Min Samples"
  min: 3
  max: 50
  step: 1
  mode: slider
  icon: mdi:counter

# Maximum seconds between zone OFF and zone ON to count as a transition.
# Larger = more lenient transition detection (catches slow walks).
# Smaller = stricter (only rapid zone changes count).
ai_presence_transition_window:
  name: "AI Presence - Transition Window"
  min: 60
  max: 600
  step: 30
  unit_of_measurement: "s"
  icon: mdi:timer-marker
  mode: slider


