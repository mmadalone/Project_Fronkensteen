blueprint:
  name: "Voice – Wake Guard TTS Router (helper script)"
  description: |
    ## Version 1.0

    HELPER SCRIPT: Routes TTS between ElevenLabs Custom (with voice_profile)
    and standard tts.speak. Called by the wake-up-guard blueprint to avoid
    duplicating TTS logic across pass 1 and pass 2.

    The ElevenLabs Custom entity ID is configurable — change it if you use
    a different custom TTS integration that supports voice_profile options.

  domain: script
  author: Madalone + Assistant
  source_url: https://github.com/mmadalone/HA-Master-Repo/blob/main/script/voice_wake_guard_tts_router.yaml

  input:
    core:
      name: "① Configuration"
      icon: mdi:account-voice
      collapsed: false
      input:
        elevenlabs_entity:
          name: "ElevenLabs Custom TTS entity"
          description: |
            The TTS entity that triggers the voice_profile code path.
            Change this if your custom TTS integration has a different entity ID.
          default: "tts.elevenlabs_custom_tts"
          selector:
            entity:
              domain: tts

fields:
  tts_engine:
    name: TTS entity
    description: TTS entity ID (e.g. tts.google_en or tts.elevenlabs_custom_tts)
    required: true
    selector:
      entity:
        domain: tts
  tts_output_player:
    name: Media player
    description: Speaker entity where TTS audio plays
    required: true
    selector:
      entity:
        domain: media_player
  message:
    name: Message text
    description: The wake-up message to speak
    required: true
    selector:
      text:
        multiline: true
  tts_voice_profile:
    name: ElevenLabs voice profile
    description: Only used when tts_engine matches the ElevenLabs entity
    default: ""
    selector:
      text: {}

mode: parallel
max: 5

variables:
  elevenlabs_entity: !input elevenlabs_entity

sequence:
  - alias: "Route TTS: ElevenLabs Custom vs standard"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ tts_engine == elevenlabs_entity }}"
        sequence:
          - alias: "TTS via ElevenLabs Custom (with voice_profile)"
            action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ tts_output_player }}"
              message: "{{ message }}"
              options:
                voice_profile: "{{ tts_voice_profile }}"
    default:
      - alias: "TTS via standard engine"
        action: tts.speak
        target:
          entity_id: "{{ tts_engine }}"
        data:
          media_player_entity_id: "{{ tts_output_player }}"
          message: "{{ message }}"
