blueprint:
  name: "Media Play at Volume (helper script)"
  description: |
    ## Version 1.0

    SCRIPT: Set volume on a media player and play a specific media item.
    Useful for routines like morning radio, background music, or podcast
    playback at a predetermined volume.

  domain: script
  author: Madalone + Assistant
  source_url: https://github.com/mmadalone/HA-Master-Repo/blob/main/script/media_play_at_volume.yaml

  input:
    core:
      name: "① Configuration"
      icon: mdi:play-circle
      collapsed: false
      input:
        media_player:
          name: "Media player"
          description: "The player to set volume on and play media through."
          selector:
            entity:
              domain: media_player

        volume_level:
          name: "Volume level"
          description: "Volume to set before playback (0.0 - 1.0)."
          default: 0.4
          selector:
            number:
              min: 0
              max: 1
              step: 0.05

        media_content_id:
          name: "Media content ID"
          description: "The media ID to play (e.g. library://radio/4, a URL, etc.)."
          selector:
            text: {}

        media_content_type:
          name: "Media content type"
          description: "The type of media content."
          default: "music"
          selector:
            select:
              options:
                - music
                - radio
                - audiobook
                - playlist
                - podcast

    # =========================================================================
    # ② INFRASTRUCTURE
    # =========================================================================
    infrastructure:
      name: "② Infrastructure"
      icon: mdi:cog
      collapsed: true
      description: "Shared entity references for the duck guard system."
      input:
        ducking_flag:
          name: "Ducking flag entity"
          description: "Boolean indicating audio ducking is active."
          default: input_boolean.ducking_flag
          selector:
            entity:
              domain: input_boolean
        duck_guard_enabled:
          name: "Duck guard enabled entity"
          description: "Boolean that enables the duck guard system."
          default: input_boolean.ai_duck_guard_enabled
          selector:
            entity:
              domain: input_boolean

mode: single
max_exceeded: silent

variables:
  media_player: !input media_player
  volume_level: !input volume_level
  media_content_id: !input media_content_id
  media_content_type: !input media_content_type
  v_ducking_flag: !input ducking_flag
  v_duck_guard: !input duck_guard_enabled

sequence:
  - alias: "Set volume"
    action: media_player.volume_set
    target:
      entity_id: "{{ media_player }}"
    data:
      volume_level: "{{ volume_level }}"

  - alias: "Update duck snapshot if active"
    if:
      - condition: template
        value_template: >-
          {{ is_state(v_duck_guard, 'on')
             and is_state(v_ducking_flag, 'on') }}
    then:
      - alias: "Sync duck snapshot with new playback volume"
        action: pyscript.duck_manager_update_snapshot
        data:
          entity_id: "{{ media_player }}"
          volume_level: "{{ volume_level }}"
        continue_on_error: true

  - alias: "Play media"
    action: media_player.play_media
    target:
      entity_id: "{{ media_player }}"
    data:
      media_content_id: "{{ media_content_id }}"
      media_content_type: "{{ media_content_type }}"
