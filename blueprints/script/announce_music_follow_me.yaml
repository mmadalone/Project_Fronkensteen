blueprint:
  name: Announce Music Follow Me – TTS (v2.0)
  description: |
    ![Announce Music Follow Me](https://raw.githubusercontent.com/mmadalone/HA-Master-Repo/main/images/header/announce-music-follow-me-header.jpeg)

    ## Announce Music Follow Me – TTS

    Announces via TTS where the music was moved for the
    "Music Assistant – Follow Me" automation.

    ### Features
    - Works with any TTS entity (Piper, ElevenLabs, etc.).
    - Editable random Rick/Quark-style messages (one per list entry).
    - Optional single default message for non-random mode.
    - ElevenLabs-friendly options:
      - Official: `voice` (via options.voice).
      - Custom: `voice_profile` (via options.voice_profile).
      - If voice_profile is set, voice is NOT sent.

    ### Placeholders
    - `{player_name}`   → Friendly name of the target player
    - `{target_player}` → Entity ID of the target player

    ### Version / Changelog
    - **v2.0** — Full style-guide compliance: collapsible sections, `action:` syntax,
      aliases, `continue_on_error`, template safety, DRY fallback, header image,
      version tagging.
    - **v1.0** — Initial release.

  domain: script
  source_url: https://github.com/mmadalone/HA-Master-Repo/blob/main/script/announce_music_follow_me.yaml
  homeassistant:
    min_version: 2024.6.0

  input:
    dispatcher_settings:
      name: "🤖 Dispatcher & Voice Assistant"
      icon: mdi:robot-outline
      collapsed: false
      input:
        use_dispatcher:
          name: Use Dispatcher
          description: >-
            When enabled, the AI dispatcher selects the persona dynamically
            (ignoring the Voice Assistant selection below). When disabled, the
            Voice Assistant you selected above is used directly.
          default: true
          selector:
            boolean:

        conversation_agent:
          name: Voice Assistant (manual fallback)
          description: >-
            Assist Pipeline used when the dispatcher is disabled. When
            dispatcher is enabled, the persona is selected automatically.
          default: "Rick"
          selector:
            text:

        tts_output_volume:
          name: TTS output volume (optional)
          description: >-
            Volume level (0.0–1.0) to set on the target speaker before
            TTS. Set to 0 to disable — the speaker plays at whatever
            volume it is already at.
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.05
              mode: slider

    message_settings:
      name: "💬 Message Settings"
      icon: mdi:message-text
      collapsed: true
      input:
        use_random_messages:
          name: Use random fun messages
          description: >
            If enabled, the script will use a random message from the list
            below. If disabled, it will use the "Default message template".
          default: true
          selector:
            boolean: {}

        custom_random_messages:
          name: Random messages (editable list)
          description: >
            YAML list of messages. Used when "Use random fun messages" is
            enabled. Use {player_name} and/or {target_player} as placeholders.
            If you clear this list, a built-in set of Rick-style defaults
            is used.
          default:
            - "Rick here. Moving the music to {player_name}. Try to keep up."
            - "Quark here. I moved your music to {player_name}. Your latinum is in good hands."
            - "Music transferred to {player_name}. Don't screw this up."
            - "Yo! Your tunes are now blasting in {player_name}."
            - "Portal opened. Music jumped to {player_name}."
          selector:
            object: {}

        default_message:
          name: Default message template (non-random mode)
          description: >
            Used when "Use random fun messages" is OFF.
            Use {player_name} and/or {target_player} as placeholders.
          default: "Moving the music to {player_name}."
          selector:
            text:
              multiline: true

    infrastructure:
      name: "③ Infrastructure"
      icon: mdi:cog
      collapsed: true
      description: "Shared entity references for the dispatcher system."
      input:
        dispatcher_enabled:
          name: "Dispatcher enabled entity"
          description: "Boolean that enables the AI agent dispatcher."
          default: input_boolean.ai_dispatcher_enabled
          selector:
            entity:
              domain: input_boolean

mode: queued
max_exceeded: silent

fields:
  target_player:
    name: Target player
    description: >
      Media player where the music was moved, or where to play this test
      announcement when running the script manually.
    example: media_player.workshop
    selector:
      entity:
        domain: media_player

variables:
  v_pipeline_name: !input conversation_agent
  use_dispatcher: !input use_dispatcher
  v_dispatcher_enabled: !input dispatcher_enabled
  tts_output_vol: !input tts_output_volume
  random_mode: !input use_random_messages
  custom_msgs: !input custom_random_messages
  default_msg_template: !input default_message
  fallback_messages:
    - "Rick here. Moving the music to {player_name}. Try to keep up."
    - "Quark here. I moved your music to {player_name}. Your latinum is in good hands."
    - "Music transferred to {player_name}. Don't screw this up."
    - "Yo! Your tunes are now blasting in {player_name}."
    - "Portal opened. Music jumped to {player_name}."

sequence:
  # ── Agent selection — dispatcher > manual ──
  - alias: "Agent selection — dispatcher > manual"
    choose:
      - alias: "Dispatcher path"
        conditions:
          - condition: template
            value_template: >-
              {{ use_dispatcher and is_state(v_dispatcher_enabled, 'on') }}
        sequence:
          - alias: "Dispatch agent for music announcement"
            action: pyscript.agent_dispatch
            response_variable: dispatch
            data:
              wake_word: ""
              intent_text: "announce music follow me"
              skip_continuity: true
            continue_on_error: true
          - alias: "Set dispatch voice, dispatch tts voice, dispatch persona"
            variables:
              dispatch_voice: "{{ (dispatch | default({})).get('tts_engine', '') }}"
              dispatch_tts_voice: "{{ (dispatch | default({})).get('tts_voice', '') }}"
              dispatch_persona: "{{ (dispatch | default({})).get('persona', 'rick') }}"
    default:
      - alias: "Resolve pipeline for manual agent selection"
        action: pyscript.agent_dispatch
        response_variable: pipeline_resolve
        data:
          pipeline_name: "{{ v_pipeline_name }}"
        continue_on_error: true
      - alias: "Set dispatch voice, dispatch tts voice, dispatch persona"
        variables:
          dispatch_voice: "{{ (pipeline_resolve | default({})).get('tts_engine', '') }}"
          dispatch_tts_voice: "{{ (pipeline_resolve | default({})).get('tts_voice', '') }}"
          dispatch_persona: "{{ (pipeline_resolve | default({})).get('persona', 'rick') }}"

  - alias: "Resolve announcement message"
    variables:
      tts_message: >-
        {{
          (
            custom_msgs
            if (random_mode | bool)
            else [default_msg_template | default('Moving the music to {player_name}.', true)]
          )
          | default(fallback_messages, true)
          | random
          | replace(
              '{player_name}',
              state_attr(target_player, 'friendly_name')
                | default(target_player, true)
            )
          | replace('{target_player}', target_player)
        }}

  - alias: "Announce music follow-me via TTS queue"
    action: pyscript.tts_queue_speak
    response_variable: _tts
    continue_on_error: true
    data:
      text: "{{ tts_message }}"
      voice: "{{ dispatch_voice }}"
      voice_id: "{{ dispatch_tts_voice }}"
      priority: 4
      target_mode: explicit
      target: "{{ target_player }}"
      volume_level: "{{ tts_output_vol | float(0) if tts_output_vol | float(0) > 0 else none }}"

  - alias: "Post-interaction whisper"
    action: pyscript.agent_whisper
    data:
      agent_name: "{{ dispatch_persona }}"
      user_query: "announce music follow me — {{ target_player }}"
      agent_response: "{{ (tts_message | default(''))[:200] }}"
      source: "automation"
    continue_on_error: true
