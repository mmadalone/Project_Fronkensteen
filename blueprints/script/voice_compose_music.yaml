blueprint:
  name: "Voice — Compose Music (agent tool)"
  description: >
    LLM tool wrapper: composes original music via ElevenLabs API or FluidSynth
    local MIDI rendering. The voice agent passes prompt, player, and options at
    runtime via fields. Instantiate once, register as an LLM tool.
  author: madalone
  source_url: https://github.com/mmadalone/HA-Master-Repo/blob/main/script/voice_compose_music.yaml
  domain: script
  homeassistant:
    min_version: "2024.10.0"

  input:
    # ── ① Defaults ──────────────────────────────────────────────
    section_defaults:
      name: "① Defaults"
      icon: mdi:tune
      collapsed: false
      input:
        default_source:
          name: Default source
          description: >
            Generation engine when the agent doesn't specify.
            auto = try ElevenLabs first, fall back to FluidSynth.
          default: auto
          selector:
            select:
              options:
                - auto
                - elevenlabs
                - fluidsynth

        default_soundfont:
          name: Default SoundFont
          description: >
            SoundFont filename for FluidSynth (in /config/soundfonts/).
            Leave empty for the system default (FluidR3 GM).
          default: ""
          selector:
            text: {}

        default_duration:
          name: Default duration (seconds)
          description: >
            Fallback duration when the agent doesn't specify.
          default: 30
          selector:
            number:
              min: 3
              max: 300
              step: 1
              unit_of_measurement: "s"

        default_volume:
          name: Default volume
          description: >
            Volume for playback (0.0–1.0). 0 = keep current.
          default: 0.5
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.05
              mode: slider

        default_content_type:
          name: Default content type
          description: >
            Composition type when the agent doesn't specify one.
          default: theme
          selector:
            select:
              options:
                - theme
                - chime
                - handoff
                - expertise
                - thinking
                - stinger
                - wake_melody
                - bedtime
                - ambient

    # ── ② Playback ─────────────────────────────────────────────
    section_playback:
      name: "② Playback"
      icon: mdi:play-circle
      collapsed: true
      input:
        staging:
          name: Stage compositions
          description: >
            When true, new compositions go to staging for review.
            When false, they go directly to production.
          default: false
          selector:
            boolean: {}

        enable_feedback_mic:
          name: Enable feedback mic
          description: >
            When true, plays the composition after your response ends and
            reopens the mic for the user's feedback (iterative refinement).
          default: true
          selector:
            boolean: {}

    # ── ③ Smart Routing ────────────────────────────────────────
    section_routing:
      name: "③ Smart Routing"
      icon: mdi:swap-horizontal
      collapsed: true
      input:
        routing_mode:
          name: Routing mode
          description: >
            user_choice = always use default_source.
            budget_aware = check budget, fall back to local if over threshold.
          default: user_choice
          selector:
            select:
              options:
                - user_choice
                - budget_aware

        budget_threshold_pct:
          name: Budget threshold (%)
          description: >
            When budget_aware, switch to FluidSynth if daily budget
            usage exceeds this percentage.
          default: 80
          selector:
            number:
              min: 10
              max: 100
              step: 5
              unit_of_measurement: "%"

    # ── ④ Infrastructure ───────────────────────────────────────
    section_infrastructure:
      name: "④ Infrastructure"
      icon: mdi:cog
      collapsed: true
      input:
        kill_switch:
          name: Kill switch
          description: "Master enable/disable for music composition."
          default: input_boolean.ai_music_composer_enabled
          selector:
            entity:
              domain: input_boolean

        ducking_flag:
          name: "Ducking flag entity"
          description: "Boolean indicating audio ducking is active."
          default: input_boolean.ducking_flag
          selector:
            entity:
              domain: input_boolean

        duck_guard_enabled:
          name: "Duck guard enabled entity"
          description: "Boolean that enables the duck guard system."
          default: input_boolean.ai_duck_guard_enabled
          selector:
            entity:
              domain: input_boolean

fields:
  prompt:
    name: Prompt
    description: "Natural language description of the music to compose."
    required: true
    selector:
      text:
        multiline: true
  duration_seconds:
    name: Duration (seconds)
    description: "Duration override. 0 = use blueprint default."
    required: false
    default: 0
    selector:
      number:
        min: 0
        max: 300
  soundfont:
    name: SoundFont
    description: "SoundFont filename override. Empty = use default."
    required: false
    default: ""
    selector:
      text: {}
  source:
    name: Source
    description: "Force source: elevenlabs / fluidsynth / auto. Empty = blueprint decides."
    required: false
    default: ""
    selector:
      text: {}
  reference_taste:
    name: Reference Taste
    description: "Enrich prompt with user's music taste profile."
    required: false
    default: false
    selector:
      boolean: {}
  player:
    name: Player
    description: "Media player entity to play on."
    required: true
    selector:
      entity:
        domain: media_player
  agent:
    name: Agent
    description: "Agent persona name (rick/quark/deadpool/kramer/portuondo)."
    required: false
    default: "rick"
    selector:
      text: {}
  content_type:
    name: Content Type
    description: >
      Override content type at runtime (theme/chime/handoff/expertise/thinking/
      stinger/wake_melody/bedtime/ambient). Empty = use blueprint default.
    required: false
    default: ""
    selector:
      text: {}

variables:
  v_default_source: !input default_source
  v_default_soundfont: !input default_soundfont
  v_default_duration: !input default_duration
  v_default_volume: !input default_volume
  v_staging: !input staging
  v_enable_feedback: !input enable_feedback_mic
  v_routing_mode: !input routing_mode
  v_budget_threshold: !input budget_threshold_pct
  v_kill_switch: !input kill_switch
  v_ducking_flag: !input ducking_flag
  v_duck_guard: !input duck_guard_enabled
  v_default_content_type: !input default_content_type
  # Resolve field overrides
  effective_source: >-
    {%- set s = source | default('') | string | trim -%}
    {%- if s in ['elevenlabs', 'fluidsynth', 'auto'] -%}
      {{ s }}
    {%- else -%}
      {{ v_default_source }}
    {%- endif -%}
  effective_duration_ms: >-
    {%- set d = duration_seconds | default(0) | int(0) -%}
    {{ (d * 1000) if d > 0 else (v_default_duration | int(30) * 1000) }}
  effective_soundfont: >-
    {%- set sf = soundfont | default('') | string | trim -%}
    {{ sf if sf else v_default_soundfont }}
  effective_agent: >-
    {%- set a = agent | default('rick') | string | trim | lower -%}
    {{ a if a in ['rick','quark','deadpool','kramer','portuondo'] else 'rick' }}
  effective_content_type: >-
    {%- set ct = content_type | default('') | string | trim | lower -%}
    {%- set valid = ['theme','chime','handoff','expertise','thinking','stinger','wake_melody','bedtime','ambient'] -%}
    {{ ct if ct in valid else v_default_content_type }}
  effective_taste: "{{ reference_taste | default(false) | bool }}"
  effective_volume: "{{ v_default_volume | float(0.5) }}"

sequence:
  # ── 1. Kill switch gate ────────────────────────────────────────
  - alias: "Kill switch gate"
    condition: state
    entity_id: !input kill_switch
    state: "on"

  # ── 2. Smart routing — resolve final source ────────────────────
  - alias: "Resolve final source via routing mode"
    variables:
      final_source: >-
        {%- if v_routing_mode == 'budget_aware' and effective_source != 'fluidsynth' -%}
          {%- set budget = state_attr('sensor.ai_music_generation_budget', 'used_today') | int(0) -%}
          {%- set limit = state_attr('sensor.ai_music_generation_budget', 'daily_limit') | int(10) -%}
          {%- set pct = (budget / limit * 100) if limit > 0 else 0 -%}
          {{ 'fluidsynth' if pct >= (v_budget_threshold | int(80)) else effective_source }}
        {%- else -%}
          {{ effective_source }}
        {%- endif -%}

  # ── 3. Route to generation service ─────────────────────────────
  - alias: "Generate composition"
    choose:
      - alias: "FluidSynth local path"
        conditions:
          - condition: template
            value_template: "{{ final_source == 'fluidsynth' }}"
        sequence:
          - alias: "Compose via FluidSynth"
            action: pyscript.music_compose_local
            response_variable: compose_result
            data:
              agent: "{{ effective_agent }}"
              content_type: "{{ effective_content_type }}"
              duration_s: "{{ (effective_duration_ms | int(30000)) / 1000 }}"
              soundfont: "{{ effective_soundfont }}"
              prompt_hint: "{{ prompt }}"
            continue_on_error: true

      - alias: "ElevenLabs API path"
        conditions:
          - condition: template
            value_template: "{{ final_source == 'elevenlabs' }}"
        sequence:
          - alias: "Compose via ElevenLabs"
            action: pyscript.music_compose
            response_variable: compose_result
            data:
              agent: "{{ effective_agent }}"
              content_type: "{{ effective_content_type }}"
              prompt_override: "{{ prompt }}"
              duration_ms: "{{ effective_duration_ms | int(30000) }}"
              staging: "{{ v_staging }}"
              reference_taste: "{{ effective_taste }}"
            continue_on_error: true

    default:
      # Auto mode: try ElevenLabs first, fall back to FluidSynth
      - alias: "Auto — try ElevenLabs first"
        action: pyscript.music_compose
        response_variable: compose_result
        data:
          agent: "{{ effective_agent }}"
          content_type: "{{ effective_content_type }}"
          prompt_override: "{{ prompt }}"
          duration_ms: "{{ effective_duration_ms | int(30000) }}"
          staging: "{{ v_staging }}"
          reference_taste: "{{ effective_taste }}"
        continue_on_error: true

      - alias: "Auto — fall back to FluidSynth if API failed"
        if:
          - condition: template
            value_template: >-
              {{ (compose_result | default({})).get('status', 'error') not in ['ok', 'cached'] }}
        then:
          - alias: "FluidSynth fallback"
            action: pyscript.music_compose_local
            response_variable: compose_result
            data:
              agent: "{{ effective_agent }}"
              content_type: "{{ effective_content_type }}"
              duration_s: "{{ (effective_duration_ms | int(30000)) / 1000 }}"
              soundfont: "{{ effective_soundfont }}"
              prompt_hint: "{{ prompt }}"
            continue_on_error: true

  # ── 4. Extract file path ───────────────────────────────────────
  - alias: "Extract composition file path"
    variables:
      compose_status: "{{ (compose_result | default({})).get('status', 'error') }}"
      compose_file: "{{ (compose_result | default({})).get('file_path', '') }}"

  # ── 5. Queue post-pipeline playback + feedback mic ─────────────
  - alias: "Queue voice session for playback and feedback"
    if:
      - condition: template
        value_template: >-
          {{ compose_status in ['ok', 'cached']
             and compose_file | length > 0
             and v_enable_feedback }}
    then:
      - alias: "Write voice session pending flag"
        action: pyscript.voice_session_request
        data:
          session_type: "music_feedback"
          file_path: "{{ compose_file }}"
          player: "{{ player }}"
          agent: "{{ effective_agent }}"
          volume: "{{ effective_volume }}"
          continuous: true
          continuous_timeout: 120
        continue_on_error: true

  # ── 6. Return result ───────────────────────────────────────────
  - alias: "Return result to caller"
    stop: ""
    response_variable: compose_result

mode: queued
max_exceeded: silent
