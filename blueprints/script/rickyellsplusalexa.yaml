blueprint:
  name: Rick wake-up helper – TTS + Alexa music (v2.0)
  description: |
    ![Rick wake-up helper](https://raw.githubusercontent.com/mmadalone/HA-Master-Repo/main/images/header/rickyellsplusalexa-header.jpeg)

    ## Rick wake-up helper – TTS + Alexa music

    A reusable **script blueprint** that does two things in sequence:

    1. Uses your ElevenLabs (or other) TTS entity to make "Rick" speak on a
       chosen media player.
    2. After a configurable delay, sends two text commands to a chosen Alexa
       device — one to set volume, one to start a song / playlist / station.

    Call this script from any automation: morning routines, pomodoro overruns,
    idle-too-long reminders, bedtime nudges, etc.

    ### Requirements
    - A TTS entity that supports `tts.speak` (e.g. ElevenLabs).
    - A `media_player` where Rick should speak.
    - **Alexa Devices** integration exposing `alexa_devices.send_text_command`.

    ### Version / Changelog
    - **v2.0** — Full style-guide compliance rewrite: collapsible sections,
      `action:` syntax, aliases, `continue_on_error`, device selector filter,
      header image, version tagging.
    - **v1.0** — Initial release.

  domain: script
  source_url: https://github.com/mmadalone/HA-Master-Repo/blob/main/script/rickyellsplusalexa.yaml

  input:
    dispatcher_settings:
      name: "🤖 Dispatcher & Voice Assistant"
      icon: mdi:robot-outline
      collapsed: false
      input:
        use_dispatcher:
          name: Use Dispatcher
          description: >-
            When enabled, the AI dispatcher selects the persona dynamically
            (ignoring the Voice Assistant selection below). When disabled, the
            Voice Assistant you selected above is used directly.
          default: true
          selector:
            boolean:

        conversation_agent:
          name: Voice Assistant (manual fallback)
          description: >-
            Assist Pipeline used when the dispatcher is disabled. When
            dispatcher is enabled, the persona is selected automatically.
          default: "Rick"
          selector:
            text:

    tts_settings:
      name: "🎙️ TTS Settings"
      icon: mdi:account-voice
      collapsed: false
      input:
        tts_output_player:
          name: Media player for Rick's voice
          description: >
            Media player where Rick should yell at you.
          default:
          selector:
            entity:
              domain: media_player

        tts_output_volume:
          name: TTS output volume (optional)
          description: >-
            Volume level (0.0–1.0) to set on the target speaker before
            TTS. Set to 0 to disable — the speaker plays at whatever
            volume it is already at.
          default: 0.0
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.05
              mode: slider

        tts_message:
          name: Rick's message
          description: >
            The text Rick will shout. Customize freely per script instance.
          default: >
            Hey Miquel, it's after eight. Get your lazy carbon-based ass out of bed
            before I start charging you rent for lying there. Come on, I know you
            hate your job but get up! Come on, get up and start your day! Come on
            Come on Come on Come on!
          selector:
            text:
              multiline: true

    alexa_settings:
      name: "📻 Alexa Configuration"
      icon: mdi:speaker-wireless
      collapsed: true
      input:
        alexa_delay_after_tts:
          name: Delay before Alexa commands (seconds)
          description: >
            How long to wait after Rick finishes yelling before sending the
            Alexa commands (volume + song).
          default: 40
          selector:
            number:
              min: 0
              max: 600
              unit_of_measurement: s
              mode: slider

        alexa_device:
          name: Alexa device
          description: >
            Alexa device that should receive the text commands. Must be
            supported by `alexa_devices.send_text_command`.
          default:
          selector:
            device:
              integration: alexa_devices

        alexa_volume_command:
          name: Alexa volume command
          description: >
            Text command to set the volume before music starts.
          default: "set volume to 10"
          selector:
            text:
              multiline: false

        alexa_song_command:
          name: Alexa play command
          description: >
            Text command to start your wake-up song / playlist.
          default: "play Mark on the bus by the Beastie Boys"
          selector:
            text:
              multiline: false

    infrastructure:
      name: "④ Infrastructure"
      icon: mdi:cog
      collapsed: true
      description: "Shared entity references for the dispatcher system."
      input:
        dispatcher_enabled:
          name: "Dispatcher enabled entity"
          description: "Boolean that enables the AI agent dispatcher."
          default: input_boolean.ai_dispatcher_enabled
          selector:
            entity:
              domain: input_boolean

mode: single

variables:
  v_pipeline_name: !input conversation_agent
  use_dispatcher: !input use_dispatcher
  v_dispatcher_enabled: !input dispatcher_enabled
  tts_output_vol: !input tts_output_volume

sequence:
  # ── Agent selection — dispatcher > manual ──
  - alias: "Agent selection — dispatcher > manual"
    choose:
      - alias: "Dispatcher path"
        conditions:
          - condition: template
            value_template: >-
              {{ use_dispatcher and is_state(v_dispatcher_enabled, 'on') }}
        sequence:
          - alias: "Dispatch agent for wake-up yell"
            action: pyscript.agent_dispatch
            response_variable: dispatch
            data:
              wake_word: ""
              intent_text: "rick wake-up yell"
              skip_continuity: true
            continue_on_error: true
          - alias: "Set dispatch voice, dispatch tts voice, dispatch persona"
            variables:
              dispatch_voice: "{{ (dispatch | default({})).get('tts_engine', '') }}"
              dispatch_tts_voice: "{{ (dispatch | default({})).get('tts_voice', '') }}"
              dispatch_persona: "{{ (dispatch | default({})).get('persona', 'rick') }}"
    default:
      - alias: "Resolve pipeline for manual agent selection"
        action: pyscript.agent_dispatch
        response_variable: pipeline_resolve
        data:
          pipeline_name: "{{ v_pipeline_name }}"
        continue_on_error: true
      - alias: "Set dispatch voice, dispatch tts voice, dispatch persona"
        variables:
          dispatch_voice: "{{ (pipeline_resolve | default({})).get('tts_engine', '') }}"
          dispatch_tts_voice: "{{ (pipeline_resolve | default({})).get('tts_voice', '') }}"
          dispatch_persona: "{{ (pipeline_resolve | default({})).get('persona', 'rick') }}"

  - alias: "Rick TTS speak via queue"
    action: pyscript.tts_queue_speak
    response_variable: _tts
    data:
      text: !input tts_message
      voice: "{{ dispatch_voice }}"
      voice_id: "{{ dispatch_tts_voice }}"
      priority: 1
      target_mode: explicit
      target: !input tts_output_player
      volume_level: "{{ tts_output_vol | float(0) if tts_output_vol | float(0) > 0 else none }}"
    continue_on_error: true

  - alias: "Post-interaction whisper"
    action: pyscript.agent_whisper
    data:
      agent_name: "{{ dispatch_persona }}"
      user_query: "rick wake-up yell"
      agent_response: "Delivered Rick wake-up TTS + Alexa music"
      source: "automation"
    continue_on_error: true

  - alias: "Delay before Alexa commands"
    delay:
      seconds: !input alexa_delay_after_tts

  - alias: "Alexa set volume"
    action: alexa_devices.send_text_command
    data:
      device_id: !input alexa_device
      text_command: !input alexa_volume_command
    continue_on_error: true

  - alias: "Alexa play wake-up music"
    action: alexa_devices.send_text_command
    data:
      device_id: !input alexa_device
      text_command: !input alexa_song_command
    continue_on_error: true
