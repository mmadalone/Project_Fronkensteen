substitutions:
  name: home-assistant-voice-0a0109
  friendly_name: HA Living Room

packages:
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: WdHg+kIxPeedWAG19kSAtqGMF7nK57PHZ07JImVHKZw=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: light
  fast_connect: true

globals:
  - id: dup_wake_retries
    type: int
    initial_value: '0'

voice_assistant:
  noise_suppression_level: 3
  auto_gain: 31 dbfs

  # ── Self-healing: duplicate_wake_up recovery ───────────────────
  on_error:
    - homeassistant.event:
        event: esphome.voice_error
        data:
          satellite: ${name}
          error_code: !lambda 'return code;'
          error_message: !lambda 'return message;'
    - if:
        condition:
          lambda: 'return code == "duplicate_wake_up_detected" && id(dup_wake_retries) < 3;'
        then:
          - lambda: 'id(dup_wake_retries)++;'
          - delay: 2s
          - voice_assistant.start_continuous:

  # ── Reset retry counter on successful pipeline ─────────────────
  on_start:
    - lambda: 'id(dup_wake_retries) = 0;'

  # ── "Speaker done" signal (best available on Voice PE) ──────────
  on_idle:
    - homeassistant.event:
        event: esphome.voice_tts_done
        data:
          satellite: ${name}

micro_wake_word:
  models:
    - id: hey_quark
      model: hey_quark.json
    - id: yo_quark
      model: yo_quark.json

debug:
  update_interval: 5s

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Largest Free Block"
    loop_time:
      name: "Loop Time"
