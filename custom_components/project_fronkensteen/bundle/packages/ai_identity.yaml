# =============================================================================
# AI Identity Confidence Package — Identity Layer of Voice Context Architecture
# =============================================================================
# Architecture spec: voice_context_architecture.md § "Identity Layer & Multi-User"
# Provides:
#   sensor.identity_confidence_miquel       — 0–100 confidence score (clamped)
#   sensor.identity_confidence_jessica      — 0–100 confidence score (current max 70)
#   sensor.occupancy_mode                   — solo_{slug} | dual | away | guest (Task 22: dynamic)
#   input_boolean.ai_guest_mode                — manual override, forces all scores to 0
#   sensor.ai_sustained_solo_zone           — set by automation after 10 min sustained (Session 8 migration)
#   input_boolean.ai_wifi_stale_jessica     — WiFi stale flag (zeroes Jessica WiFi signal)
#   input_number.ai_wifi_stale_timeout      — tunable timeout for WiFi staleness (5-60 min)
#   binary_sensor.ai_wifi_stale_condition_jessica — WiFi home + no FP2 presence
#
# Signal sources:
#   WiFi MAC (GL.iNet)    — device_tracker.oppo_a60 (Miquel, MAC 8E:9C:A3:8F:A1:69)
#                         — device_tracker.oppo_a38 (Jessica, MAC 46:21:C5:F7:F4:72)
#   GPS Companion App     — device_tracker.madoppo (Miquel only; Jessica TBD)
#   FP2 mmWave zones      — 7 binary_sensors (anonymous, inferred via solo occupancy)
#
# Scoring (weights configurable via input_number.ai_wifi_score_* helpers):
#   WiFi home              = primary pts   (Jessica: zeroed when WiFi stale flag is on)
#   GPS home               = secondary pts (Miquel only)
#   FP2 solo infer         = tertiary pts  (single phone on WiFi + any FP2 zone active)
#   Sustained solo zone    = quaternary pts (solo WiFi + exactly 1 FP2 zone for 10+ min)
#   WiFi stale (Jessica)   =  0 pts  (WiFi home + no FP2 for N min → zero WiFi signal)
#   Guest mode ON          =  0 pts  (hard override, no exceptions)
#
# Thresholds (applied by consumers):
#   ≥70 pts  → full_personal    — name, preferences, memories, bedtime routines
#   30–69    → limited_personal — name greeting, no sensitive data
#   <30      → guest            — generic responses, no personal context
#
# Deployed: 2026-03-01 | Updated: 2026-03-06 (WiFi staleness decay for Jessica)
# =============================================================================

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)

# input_number: moved to helpers_input_number.yaml (C6 consolidation)

# ── TEMPLATE SENSORS ──────────────────────────────────────────────────────────

template:
  - binary_sensor:
      # True when exactly one person's phone is on WiFi and exactly one
      # FP2 zone is occupied. Used by the sustained zone automation.
      - name: "AI Solo Single Zone"
        unique_id: ai_solo_single_zone
        icon: mdi:account-eye
        state: >-
          {%- set m_wifi = is_state('device_tracker.oppo_a60', 'home') -%}
          {%- set j_wifi = is_state('device_tracker.oppo_a38', 'home') -%}
          {%- set solo = (m_wifi and not j_wifi) or (j_wifi and not m_wifi) -%}
          {%- set fp2_count =
            (is_state('binary_sensor.fp2_presence_sensor_living_room', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_bed', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_workshop', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_kitchen', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_lobby', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_bathroom', 'on') | int)
          + (is_state('binary_sensor.fp2_presence_sensor_shower', 'on') | int) -%}
          {{ solo and fp2_count == 1 }}

      # True when Jessica's WiFi says home but NO FP2 zone detects a body.
      # Used by the WiFi stale automation pair (on/off).
      - name: "AI WiFi Stale Condition Jessica"
        unique_id: ai_wifi_stale_condition_jessica
        icon: mdi:wifi-alert
        state: >-
          {%- set j_wifi = is_state('device_tracker.oppo_a38', 'home') -%}
          {%- set fp2_on =
            is_state('binary_sensor.fp2_presence_sensor_living_room', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_bed', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_workshop', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_kitchen', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_lobby', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_bathroom', 'on')
            or is_state('binary_sensor.fp2_presence_sensor_shower', 'on') -%}
          {{ j_wifi and not fp2_on }}

  - sensor:
      # ── MIQUEL CONFIDENCE ─────────────────────────────────────────────────
      #   WiFi 30 + GPS 50 + FP2 solo 15 + sustained 5 = max 100 pts (clamped)
      #   Dual occupancy: WiFi 40 + GPS 50 = max 90 pts (FP2 ambiguous)
      #   GPS-only (WiFi off): 50 pts — meets default 50 pt identity gate
      - name: "Identity Confidence Miquel"
        unique_id: identity_confidence_miquel
        icon: mdi:account-check
        unit_of_measurement: "pts"
        state_class: measurement
        availability: >-
          {{ states('device_tracker.oppo_a60')
             not in ['unavailable', 'unknown'] }}
        state: >-
          {%- if is_state('input_boolean.ai_guest_mode', 'on') -%}
          0
          {%- else -%}
          {%- set m_wifi = is_state('device_tracker.oppo_a60', 'home') -%}
          {%- set m_gps  = is_state('device_tracker.madoppo', 'home') -%}
          {%- set j_wifi = is_state('device_tracker.oppo_a38', 'home') -%}
          {%- set fp2_on =
          is_state('binary_sensor.fp2_presence_sensor_living_room', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_bed', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_workshop', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_kitchen', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_lobby', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_bathroom', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_shower', 'on') -%}
          {%- set solo = m_wifi and not j_wifi -%}
          {%- set sustained = is_state('sensor.ai_sustained_solo_zone', 'on') -%}
          {%- set w1 = states('input_number.ai_wifi_score_primary') | int(30) -%}
          {%- set w2 = states('input_number.ai_wifi_score_secondary') | int(50) -%}
          {%- set w3 = states('input_number.ai_wifi_score_tertiary') | int(15) -%}
          {%- set w4 = states('input_number.ai_wifi_score_quaternary') | int(5) -%}
          {{ [(w1 if m_wifi else 0)
          + (w2 if m_gps else 0)
          + (w3 if solo and fp2_on else 0)
          + (w4 if solo and sustained else 0), 100] | min }}
          {%- endif -%}

      # ── JESSICA CONFIDENCE ────────────────────────────────────────────────
      #   WiFi 30 + FP2 solo 15 + sustained 5 = max 50 pts (clamped, no companion app yet)
      #   Dual occupancy: WiFi 40 = max 40 pts (FP2 ambiguous, no GPS)
      - name: "Identity Confidence Jessica"
        unique_id: identity_confidence_jessica
        icon: mdi:account-check-outline
        unit_of_measurement: "pts"
        state_class: measurement
        availability: >-
          {{ states('device_tracker.oppo_a38')
             not in ['unavailable', 'unknown'] }}
        state: >-
          {%- if is_state('input_boolean.ai_guest_mode', 'on') -%}
          0
          {%- else -%}
          {%- set j_wifi = is_state('device_tracker.oppo_a38', 'home') -%}
          {%- set stale = is_state('input_boolean.ai_wifi_stale_jessica', 'on') -%}
          {%- set m_wifi = is_state('device_tracker.oppo_a60', 'home') -%}
          {%- set fp2_on =
          is_state('binary_sensor.fp2_presence_sensor_living_room', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_bed', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_workshop', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_kitchen', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_lobby', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_bathroom', 'on')
          or is_state('binary_sensor.fp2_presence_sensor_shower', 'on') -%}
          {%- set solo = j_wifi and not m_wifi -%}
          {%- set sustained = is_state('sensor.ai_sustained_solo_zone', 'on') -%}
          {%- set w1 = states('input_number.ai_wifi_score_primary') | int(30) -%}
          {%- set w3 = states('input_number.ai_wifi_score_tertiary') | int(15) -%}
          {%- set w4 = states('input_number.ai_wifi_score_quaternary') | int(5) -%}
          {{ [(w1 if j_wifi and not stale else 0)
          + (w3 if solo and fp2_on else 0)
          + (w4 if solo and sustained else 0), 100] | min }}
          {%- endif -%}

      # ── OCCUPANCY MODE (Task 22: dynamic from person.* entities) ──────────
      #   Derived from person.* state + WiFi stale flags + guest toggle.
      #   States: solo_{slug} | dual | away | guest
      - name: "Occupancy Mode"
        unique_id: occupancy_mode
        icon: mdi:home-account
        availability: >-
          {{ states.person | list | length > 0 }}
        state: >-
          {%- if is_state('input_boolean.ai_guest_mode', 'on') -%}
          guest
          {%- else -%}
          {%- set ns = namespace(home=[]) -%}
          {%- for p in states.person -%}
            {%- set slug = p.object_id -%}
            {%- set is_home = (p.state == 'home') -%}
            {%- if is_home and is_state('input_boolean.ai_wifi_stale_' ~ slug, 'on') -%}
              {%- set is_home = false -%}
            {%- endif -%}
            {%- if is_home -%}
              {%- set ns.home = ns.home + [slug] -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if ns.home | length == 0 -%}away
          {%- elif ns.home | length == 1 -%}solo_{{ ns.home[0] }}
          {%- else -%}dual
          {%- endif -%}
          {%- endif -%}

# ── SUSTAINED SOLO ZONE AUTOMATION ────────────────────────────────────────────

automation:
  - id: ai_sustained_solo_zone_on
    alias: "AI Identity - Sustained Solo Zone On"
    description: >-
      When solo WiFi + exactly 1 FP2 zone has been active for 10 minutes,
      set the sustained solo zone boolean. Adds 10 pts to identity confidence.
    triggers:
      - trigger: state
        entity_id: binary_sensor.ai_solo_single_zone
        to: "on"
        for: "00:10:00"
    actions:
      - action: pyscript.set_sensor_value
        data:
          entity_id: sensor.ai_sustained_solo_zone
          value: "on"
          icon: "mdi:account-clock"
          friendly_name: "AI Sustained Solo Zone"

  - id: ai_sustained_solo_zone_off
    alias: "AI Identity - Sustained Solo Zone Off"
    description: >-
      When solo single zone condition breaks (second person arrives, zone
      changes, or phone leaves WiFi), clear the sustained flag immediately.
    triggers:
      - trigger: state
        entity_id: binary_sensor.ai_solo_single_zone
        to: "off"
    actions:
      - action: pyscript.set_sensor_value
        data:
          entity_id: sensor.ai_sustained_solo_zone
          value: "off"
          icon: "mdi:account-clock"
          friendly_name: "AI Sustained Solo Zone"

# ── WIFI STALE DETECTION (JESSICA) ──────────────────────────────────────────

  - id: ai_wifi_stale_jessica_on
    alias: "AI Identity - WiFi Stale Jessica On"
    description: >-
      When Jessica's WiFi says home but no FP2 zone has been active for
      the configured timeout, mark WiFi as stale. Zeroes her 40-pt WiFi signal.
    triggers:
      - trigger: state
        entity_id: binary_sensor.ai_wifi_stale_condition_jessica
        to: "on"
        for:
          minutes: "{{ states('input_number.ai_wifi_stale_timeout') | int(20) }}"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ai_wifi_stale_jessica

  - id: ai_wifi_stale_jessica_off
    alias: "AI Identity - WiFi Stale Jessica Off"
    description: >-
      When FP2 detects presence again or WiFi goes not_home, clear the
      stale flag immediately so confidence score recovers.
    triggers:
      - trigger: state
        entity_id: binary_sensor.ai_wifi_stale_condition_jessica
        to: "off"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ai_wifi_stale_jessica
