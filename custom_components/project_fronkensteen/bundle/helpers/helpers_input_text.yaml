# Comma-separated trusted senders and domains.
# Full emails: "mom@gmail.com, boss@work.com"
# Domains: "amazon.com, paypal.com" (matches any sender from that domain)
# Domain suffix: "amazon.com" also matches "email.amazon.com"
ai_email_known_contacts:
  name: "AI Email Known Contacts"
  initial: ""
  max: 255
  icon: mdi:account-group

# Comma-separated custom priority keywords (checked against subject).
# Added to the built-in list: shipping, delivery, appointment, urgent,
# invoice, confirmation, password reset, security alert, payment, receipt.
ai_email_priority_keywords:
  name: "AI Email Priority Keywords"
  initial: ""
  max: 255
  icon: mdi:tag-text

# Comma-separated senders/domains to BLOCK in blacklist mode.
# Same format as known contacts: "spam@example.com, newsletter.com"
# Seeded from existing email_follow_me blueprint blocked list.
ai_email_blocked_senders:
  name: "AI Email Blocked Senders"
  initial: "bingo@patreon.com, no-reply@revolut.com"
  max: 255
  icon: mdi:account-cancel

# Comma-separated keywords to BLOCK in blacklist mode.
# If any keyword appears in the subject, email is filtered out.
# Seeded from existing email_follow_me blueprint keyword_list.
ai_email_blocked_keywords:
  name: "AI Email Blocked Keywords"
  initial: "continua con la configuración de tu cuenta, vacantes nuevas que coinciden"
  max: 255
  icon: mdi:tag-off

