blueprint:
  name: "Voice — Play bedtime audiobook (Music Assistant)"
  description: >
    ![Header](https://raw.githubusercontent.com/mmadalone/Project_Fronkensteen/main/images/header/voice_play_bedtime_audiobook.jpeg)


    LLM tool wrapper: plays an audiobook (or other media type) via Music Assistant
    on a designated player at a configurable volume. Designed as a voice-agent
    tool script — the LLM passes title, player, and optional volume at runtime
    via fields.


    Instantiate once per use-case (e.g. one for audiobooks, one for podcasts)
    with different defaults, then register each instance as an LLM tool.
  author: madalone
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/script/voice_play_bedtime_audiobook.yaml
  domain: script
  homeassistant:
    min_version: "2024.10.0"

  input:
    # ── ① Playback defaults ─────────────────────────────────
    section_defaults:
      name: "① Playback defaults"
      icon: mdi:tune
      collapsed: false
      input:
        default_volume:
          name: Default volume
          description: >
            Fallback volume when the caller doesn't specify one (0.0–1.0).
          default: 0.35
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.05
              mode: slider

        default_player:
          name: Default player
          description: >
            Fallback media player when the caller doesn't specify one.
          default: ""
          selector:
            entity:
              domain: media_player

        media_type:
          name: Default media type
          description: >
            Default media type sent to Music Assistant. The caller can
            override this at runtime. Change to 'podcast', 'track', etc.
            if you want a non-audiobook variant of this tool.
          default: audiobook
          selector:
            select:
              options:
                - audiobook
                - podcast
                - track
                - album
                - artist
                - playlist
                - radio

        enqueue:
          name: Enqueue mode
          description: >
            'replace' clears the queue and starts fresh; 'add' appends to it.
          default: replace
          selector:
            select:
              options:
                - replace
                - add

        restart_playback:
          name: Restart from beginning
          description: >
            When enabled, seeks to position 0 after starting playback
            instead of resuming where it left off.
          default: false
          selector:
            boolean: {}

    # ── ② Infrastructure ──────────────────────────────────
    section_infrastructure:
      name: "② Infrastructure"
      icon: mdi:cog
      collapsed: true
      input:
        ducking_flag:
          name: "Ducking flag entity"
          description: "Sensor indicating audio ducking is active."
          default: sensor.ai_ducking_flag
          selector:
            entity:
        volume_sync_speakers:
          name: "Volume-sync group speakers"
          description: >
            Other media players in the same volume-sync group as the
            target player. Their volume will be set to match so the
            sync automation sees equilibrium and has nothing to
            propagate. Leave empty if no volume-sync is configured.
          default: []
          selector:
            entity:
              domain: media_player
              multiple: true

fields:
  title:
    name: Title
    description: "Media title (or URI) to search for and play."
    required: true
    selector:
      text: {}
  media_type:
    name: Media type
    description: >
      Type of media to search for. If omitted, uses the blueprint default.
    required: false
    selector:
      select:
        options:
          - track
          - album
          - artist
          - playlist
          - audiobook
          - podcast
          - radio
  player:
    name: Player
    description: >
      Media player entity to play on. If omitted, uses the blueprint default.
    required: false
    selector:
      entity:
        domain: media_player
  artist:
    name: Artist
    description: "Artist filter for Music Assistant search. Optional."
    required: false
    selector:
      text: {}
  album:
    name: Album
    description: "Album filter for Music Assistant search. Optional."
    required: false
    selector:
      text: {}
  radio_mode:
    name: Radio mode
    description: "Enable radio mode (continuous playback). Optional."
    required: false
    selector:
      boolean: {}
  volume:
    name: Volume
    description: >
      Playback volume (0.0–1.0). If omitted, uses the blueprint default.
    required: false
    selector:
      number:
        min: 0.0
        max: 1.0
        step: 0.05
        mode: slider

mode: single

sequence:
  - alias: "Resolve inputs and field overrides into local variables"
    variables:
      _version: "1.8.0"
      v_ducking_flag: !input ducking_flag
      _sync_speakers: !input volume_sync_speakers
      _default_volume: !input default_volume
      _default_player: !input default_player
      _default_media_type: !input media_type
      _enqueue: !input enqueue
      _restart: !input restart_playback
      _volume: "{{ volume | default(_default_volume) | float(_default_volume) }}"
      _player: "{{ player | default(_default_player, true) }}"
      _media_type: "{{ media_type | default(_default_media_type, true) }}"
      _title: "{{ title }}"
      _artist: "{{ artist | default('') }}"
      _album: "{{ album | default('') }}"
      _radio_mode: "{{ radio_mode | default('') }}"

  - alias: "Mark speakers as user-adjusted FIRST (before restore can race us)"
    if:
      - condition: template
        value_template: "{{ is_state(v_ducking_flag, 'on') }}"
    then:
      - action: pyscript.duck_manager_mark_user_adjusted
        data:
          entity_id: "{{ _player }}"
        response_variable: _duck_result
        continue_on_error: true
      - repeat:
          for_each: "{{ _sync_speakers }}"
          sequence:
            - action: pyscript.duck_manager_mark_user_adjusted
              data:
                entity_id: "{{ repeat.item }}"
              response_variable: _duck_result
              continue_on_error: true

  - alias: "Play media via Music Assistant"
    action: music_assistant.play_media
    target:
      entity_id: "{{ _player }}"
    data:
      media_id: "{{ _title }}"
      media_type: "{{ _media_type }}"
      artist: "{{ _artist }}"
      album: "{{ _album }}"
      enqueue: "{{ _enqueue }}"

  - alias: "Let MA initialize playback before setting volume"
    delay:
      seconds: 2

  - alias: "Set playback volume on target player"
    action: media_player.volume_set
    continue_on_error: true
    target:
      entity_id: "{{ _player }}"
    data:
      volume_level: "{{ _volume }}"

  - alias: "Set same volume on each sync-group speaker for equilibrium"
    repeat:
      for_each: "{{ _sync_speakers }}"
      sequence:
        - action: media_player.volume_set
          continue_on_error: true
          target:
            entity_id: "{{ repeat.item }}"
          data:
            volume_level: "{{ _volume }}"

  - alias: "Restart from beginning if configured"
    if:
      - condition: template
        value_template: "{{ _restart }}"
    then:
      - alias: "Seek to start"
        action: media_player.media_seek
        continue_on_error: true
        target:
          entity_id: "{{ _player }}"
        data:
          seek_position: 0
