      title: TTS Queue
      entities:
      - entity: input_select.ai_tts_conflict_mode
        name: Conflict Mode
      - entity: input_number.ai_tts_cache_static_max_days
        name: Static Cache Max Age (days)
      - entity: input_number.ai_tts_cache_max_size_mb
        name: Cache Size Cap (MB)
      - entity: input_number.ai_tts_cache_protect_hours
        name: Cache Protection Window (hours)
