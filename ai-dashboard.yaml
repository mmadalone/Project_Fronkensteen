      content: '### Conversation Sensor


        Captures agent responses for reactive banter and stores conversation
        history in L2 memory. Responses are summarized nightly via blueprint.


        **Retention** = days before raw conversation entries expire from L2.

        Summaries persist longer (configured in the blueprint instance).'
