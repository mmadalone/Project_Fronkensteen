title: AI Management
views:
- title: Overview
  path: overview
  icon: mdi:brain
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## System Overview


        Real-time health of all AI subsystems.

        Green = active, yellow = degraded, red = error.'
    - type: glance
      title: Subsystem Health
      state_color: true
      columns: 4
      entities:
      - entity: sensor.ai_dispatcher_status
        name: Dispatch
      - entity: sensor.ai_tts_queue_status
        name: TTS
      - entity: sensor.ai_whisper_status
        name: Whisper
      - entity: sensor.ai_dedup_status
        name: Dedup
      - entity: sensor.ai_calendar_promotion_status
        name: Calendar
      - entity: sensor.ai_email_promotion_status
        name: Email
      - entity: sensor.ai_predictive_schedule_status
        name: Schedule
      - entity: sensor.ai_presence_pattern_status
        name: Presence
      - entity: sensor.ai_proactive_briefing_status
        name: Briefing
      - entity: sensor.ai_routine_tracker_status
        name: Routine
      - entity: sensor.ai_focus_guard_status
        name: Focus Guard
      - entity: sensor.ai_duck_manager_status
        name: Duck Mgr
      - entity: sensor.ai_conversation_sensor_status
        name: Conv Sensor
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### LLM Budget & Counters


        Daily LLM API call budget. Resets at midnight.

        Below personality threshold, agents switch to stripped mode (no LLM reformulation).'
    - type: gauge
      title: LLM Budget Remaining
      entity: sensor.ai_llm_budget_remaining
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 20
        red: 0
    - type: entities
      title: Daily Counters
      entities:
      - entity: input_number.ai_llm_calls_today
        name: LLM Calls Today
      - entity: input_number.ai_llm_daily_limit
        name: LLM Daily Limit
      - entity: sensor.ai_dedup_blocked_today
        name: Dedup Blocked Today
      - entity: sensor.ai_email_priority_count
        name: Priority Emails
    - type: gauge
      title: TTS Budget Remaining
      entity: sensor.ai_tts_budget_remaining
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 20
        red: 0
    - type: entities
      title: Extended Counters
      entities:
      - entity: input_button.ai_budget_manual_reset
        name: Reset Budget Now
      - entity: input_number.ai_llm_tokens_today
        name: LLM Tokens Today
      - entity: input_number.ai_tts_chars_today
        name: TTS Characters Today
      - entity: input_number.ai_stt_calls_today
        name: STT Calls Today
      - entity: sensor.ai_total_daily_cost
        name: Total Daily Cost
      - entity: sensor.ai_llm_budget_remaining
        name: Budget Remaining (min of all)
      - entity: input_number.ai_budget_daily_cost_limit
        name: Daily Cost Limit
      - entity: input_number.ai_llm_daily_limit
        name: Daily Call Limit
      - entity: input_number.ai_llm_daily_token_limit
        name: Daily Token Limit
      - entity: input_select.ai_budget_view_level
        name: View Level
    - type: entities
      title: ElevenLabs Credits
      entities:
      - entity: sensor.elevenlabs_credits_remaining
        name: Credits Remaining
      - entity: sensor.elevenlabs_subscription
        name: API Remaining (chars)
      - entity: input_number.ai_elevenlabs_credit_cap
        name: Manual Cap
      - entity: sensor.elevenlabs_daily_usage
        name: Today's Usage
      - entity: input_number.ai_elevenlabs_credit_floor
        name: Credit Floor
    - type: entities
      title: OpenRouter Usage
      entities:
      - entity: sensor.ai_openrouter_rolling_usage
        name: Rolling Usage (€)
      - entity: sensor.openrouter_daily_usage
        name: Today's Usage (€)
      - entity: input_number.ai_budget_rolling_months
        name: Rolling Window
    - type: entities
      title: Serper Web Search
      entities:
      - entity: sensor.serper_account
        name: Credits Remaining
      - entity: sensor.serper_daily_usage
        name: Today's Usage
      - entity: sensor.ai_serper_rolling_usage
        name: Rolling Usage (credits)
      - type: attribute
        entity: sensor.ai_serper_rolling_usage
        attribute: total_cost_eur
        name: Rolling Cost
        suffix: "€"
      - entity: sensor.ai_cost_per_serper_credit
        name: Cost per Credit
      - entity: input_number.ai_budget_rolling_months
        name: Rolling Window
    - type: entities
      title: Budget Fallback
      entities:
      - entity: sensor.ai_budget_fallback_status
        name: Status
      - entity: input_boolean.ai_budget_fallback_active
        name: Fallback Active (manual override)
      - entity: input_text.ai_budget_fallback_agent
        name: Fallback Agent
    - type: markdown
      title: Per-Agent Breakdown
      content: >-
        {% set bd = state_attr('sensor.ai_budget_breakdown', 'breakdown') %}
        {% set level = states('input_select.ai_budget_view_level') %}
        {% set model_map = state_attr('sensor.ai_budget_breakdown', 'model_map') or {} %}
        {% if bd is not mapping %}
        *Waiting for data...*
        {% else %}
        {% set ns = namespace(rows=[]) %}
        {% for svc in ['llm', 'tts', 'stt'] %}
        {% set agents = bd.get(svc, {}) %}
        {% if agents %}
        {% if level == 'agent' %}
        {% for agent, data in agents.items() %}
        {% set ns.rows = ns.rows + [svc ~ ' | ' ~ agent ~ ' | ' ~ data.get('calls', 0)
           ~ ' | ' ~ data.get('tokens', 0) ~ ' | ' ~ data.get('chars', 0)] %}
        {% endfor %}
        {% elif level == 'model' %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set m = (model_map.get(svc, {}) or {}).get(agent, agent) %}
        {% set prev = grp.agg.get(svc ~ ':' ~ m, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{svc ~ ':' ~ m: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set parts = key.split(':') %}
        {% set ns.rows = ns.rows + [parts[0] ~ ' | ' ~ parts[1] ~ ' | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% elif level == 'provider' %}
        {% set pmap = state_attr('sensor.ai_budget_breakdown', 'provider_map') or {} %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set m = (model_map.get(svc, {}) or {}).get(agent, agent) %}
        {% set p = pmap.get(m, m) %}
        {% set key = svc ~ ':' ~ p %}
        {% set prev = grp.agg.get(key, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{key: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set parts = key.split(':') %}
        {% set ns.rows = ns.rows + [parts[0] ~ ' | ' ~ parts[1] ~ ' | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% else %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set prev = grp.agg.get(svc, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{svc: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set ns.rows = ns.rows + [key ~ ' | total | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% endif %}
        {% endif %}
        {% endfor %}
        Type | {{ level | title }} | Calls | Tokens | Chars

        :--- | :--- | ---: | ---: | ---:

        {% for row in ns.rows %}
        {{ row }}

        {% endfor %}
        {% endif %}
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Active Agent & Identity


        Which AI persona is active, dispatch mode, and who the system thinks

        is home based on WiFi + FP2 presence scoring.'
    - type: entities
      title: Active Agent
      entities:
      - entity: input_text.ai_last_agent_name
        name: Last Agent
      - entity: input_select.ai_dispatcher_mode
        name: Dispatch Mode
      - entity: input_text.ai_last_interaction_topic
        name: Last Topic
      - entity: input_datetime.ai_last_interaction_time
        name: Last Interaction
      - entity: input_button.ai_dispatcher_apply_config
        name: Apply Dispatcher Config
    - type: entities
      title: Identity Confidence
      entities:
      # ── Scores ──
      - entity: sensor.identity_confidence_miquel
        name: Miquel Confidence
      - entity: sensor.identity_confidence_jessica
        name: Jessica Confidence
      - entity: sensor.occupancy_mode
        name: Occupancy
      - type: divider
      # ── Raw Signals ──
      - entity: device_tracker.oppo_a60
        name: Miquel WiFi
      - entity: device_tracker.oppo_a38
        name: Jessica WiFi
      - entity: device_tracker.madoppo
        name: Miquel GPS
      - type: divider
      # ── Presence Inference ──
      - entity: binary_sensor.ai_solo_single_zone
        name: Solo Single Zone
      - entity: input_boolean.ai_sustained_solo_zone
        name: Sustained Solo Zone
      - entity: binary_sensor.ai_wifi_stale_condition_jessica
        name: WiFi Stale Condition (Jessica)
      - entity: input_boolean.ai_wifi_stale_jessica
        name: WiFi Stale (Jessica)
      - entity: input_number.ai_wifi_stale_timeout
        name: WiFi Stale Timeout
      - type: divider
      # ── Overrides ──
      - entity: input_boolean.ai_context_guests_present
        name: Guests Present
      - entity: input_boolean.ai_guest_mode
        name: Guest Mode
      - type: divider
      # ── House Mode ──
      - entity: input_boolean.ai_bedtime_active
        name: Bedtime Active
      - entity: input_boolean.ai_bedtime_global_lock
        name: Bedtime Lock
      - entity: input_boolean.ai_wake_up_snooze
        name: Wake-Up Snooze
      - entity: input_boolean.ai_wake_up_stop
        name: Wake-Up Stop
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### TTS & Voice


        Text-to-speech queue, daily call counts, and cache performance.

        Cache hits avoid redundant TTS API calls.

        TTS routes to your current FP2 zone''s assigned speaker.

        Configure zone→speaker mapping in the Configuration tab.'
    - type: entities
      title: TTS Stats
      entities:
      - entity: sensor.ai_tts_queue_status
        name: Queue Status
      - entity: input_number.ai_tts_calls_today
        name: TTS Calls Today
      - entity: input_number.ai_tts_cache_hits_today
        name: Cache Hits Today
      - entity: sensor.ai_tts_cache_hit_rate
        name: Cache Hit Rate
      - entity: input_text.ai_default_speaker
        name: Default Speaker
      - entity: input_text.ai_tts_zone_priority
        name: Zone Priority
    - type: horizontal-stack
      cards:
      - type: button
        name: Clear Queue
        icon: mdi:playlist-remove
        tap_action:
          action: perform-action
          perform_action: pyscript.tts_queue_clear
      - type: button
        name: Stop Queue
        icon: mdi:stop-circle
        tap_action:
          action: perform-action
          perform_action: pyscript.tts_queue_stop
    - type: entities
      title: Voice Handoff
      entities:
      - entity: input_boolean.ai_voice_handoff_enabled
        name: Handoff Enabled
      - entity: input_select.ai_handoff_restore_mode
        name: Restore Mode
      - entity: input_number.ai_handoff_restore_seconds
        name: Restore After (sec)
      - type: button
        name: Restore Now
        icon: mdi:restore
        action_name: Restore
        tap_action:
          action: perform-action
          perform_action: pyscript.voice_handoff_restore_now
      - entity: input_select.ai_expertise_routing_mode
        name: Expertise Routing
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Phone Status


        Battery level, charging state, and phone call detection.'
    - type: glance
      title: Phone
      state_color: true
      columns: 4
      entities:
      - entity: sensor.madaringer_battery_level
        name: Battery
      - entity: sensor.madaringer_battery_state
        name: State
      - entity: binary_sensor.madaringer_is_charging
        name: Charging
      - entity: input_boolean.ai_phone_call_active
        name: On Call
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Sleep Detection


        Current sleep state and last sleep timing.'
    - type: entities
      title: Sleep
      entities:
      - entity: input_boolean.ai_sleep_detected
        name: Sleep Detected
      - entity: input_datetime.ai_sleep_start
        name: Last Sleep Start
      - entity: input_datetime.ai_sleep_end
        name: Last Sleep End
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Focus Guards & Wellness


        Monitors work duration, meal timing, break patterns, and bedtime approach.

        Nudges escalate if ignored. Focus Mode (DND) suppresses non-critical interruptions.'
    - type: entities
      title: Focus Guards
      entities:
      - entity: input_boolean.ai_focus_mode
        name: Focus Mode (DND)
      - entity: sensor.workshop_hours_today
        name: Workshop Hours Today
      - entity: input_datetime.ai_last_meal_time
        name: Last Meal
      - entity: input_number.ai_focus_guard_threshold_hours
        name: Threshold Hours
      - entity: input_datetime.ai_focus_guard_snooze_until
        name: Snooze Until
      - entity: sensor.ai_focus_guard_status
      - entity: sensor.ai_duck_manager_status
        name: Guard Status
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Duck Manager


        Current ducking state and last duck event.'
    - type: entities
      title: Duck Manager
      entities:
      - entity: sensor.ai_duck_manager_status
        name: Status
      - entity: input_boolean.ai_ducking_flag
        name: Ducking Active
    - type: markdown
      content: '**Last duck:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_source'')
        | default(''none'') }} {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_detail'')
        | default('''') }} — {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_duration_s'')
        | default(''?'') }}s

        {% if state_attr(''sensor.ai_duck_manager_status'', ''last_duck_time'') %}

        **When:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_time'')
        }}

        **Sessions:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_sessions'')
        | default(''?'') }}

        {% endif %}

        **Last topic:** {{ states(''input_text.ai_last_interaction_topic'') | default(''none'')
        }}'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Schedule & Routine


        Predictive scheduling from historical presence patterns. Routine stage

        tracks daily progression (morning → work → evening → bedtime).'
    - type: markdown
      title: Schedule & Routine
      content: '{% set stage = states(''input_text.ai_routine_stage'') %}

        {% set pp = states(''sensor.ai_presence_pattern_status'') %}

        {% set rt = states(''sensor.ai_routine_tracker_status'') %}

        {% if stage in [''none'', '''', ''unknown'', ''unavailable''] %}

        {% if pp == ''ok'' and state_attr(''sensor.ai_presence_pattern_status'', ''cache_entries'')
        | int(0) > 0 %}

        _Presence data loaded. Routine fingerprints building — patterns refine daily
        at 04:15._

        {% else %}

        _Pipeline bootstrapping — presence extraction runs ~90s after startup. Full
        patterns build overnight at 04:00._

        {% endif %}

        {% endif %}


        | Field | Value |

        |-------|-------|

        | Routine Stage | {{ stage }} |

        | Routine ETA | {{ states(''sensor.ai_routine_eta'') }} |

        | Deviation | {{ states(''input_text.ai_routine_deviation'') }} |

        | Schedule Confidence | {{ states(''sensor.ai_schedule_confidence'') }} |

        | Predicted Next Zone | {{ states(''sensor.ai_predicted_next_zone'') }} |

        | Bedtime Recommendation | {{ states(''input_text.ai_bedtime_recommendation'')
        }} |'
    - type: horizontal-stack
      cards:
      - type: button
        name: Run Bedtime Advisor
        icon: mdi:bed-clock
        tap_action:
          action: perform-action
          perform_action: pyscript.schedule_bedtime_advisor
        icon_height: 40px
      - type: button
        name: Optimal Timing
        icon: mdi:clock-check
        tap_action:
          action: perform-action
          perform_action: pyscript.schedule_optimal_timing
          perform_action_data:
            event_description: dentist appointment
            event_time: '13:00'
            prep_minutes: 30
            travel_minutes: 20
        icon_height: 40px
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Calendar & Briefing


        Calendar sync, email priority filtering, and morning briefing status.

        Briefing triggers on presence in bathroom/kitchen after wake time.'
    - type: entities
      title: Calendar & Briefing
      entities:
      - entity: input_text.ai_calendar_today_summary
        name: Today's Calendar
      - entity: input_text.ai_calendar_tomorrow_summary
        name: Tomorrow's Calendar
      - entity: input_boolean.ai_calendar_stale
        name: Calendar Stale
      - entity: input_boolean.ai_briefing_delivered_morning
        name: Morning Briefing Delivered
      - entity: input_text.ai_email_last_priority
        name: Last Priority Email
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Kill Switches


        Master toggles for each subsystem. Turn off any without affecting others.'
    - type: entities
      title: Kill Switches
      show_header_toggle: false
      entities:
      - entity: input_boolean.ai_tts_queue_active
        name: TTS Queue
      - entity: input_boolean.ai_dispatcher_enabled
        name: Dispatcher
      - entity: input_boolean.ai_dedup_enabled
        name: Notification Dedup
      - entity: input_boolean.ai_calendar_promotion_enabled
        name: Calendar Sync
      - entity: input_boolean.ai_email_promotion_enabled
        name: Email Filter
      - entity: input_boolean.ai_proactive_briefing_enabled
        name: Proactive Briefing
      - entity: input_boolean.ai_routine_tracking_enabled
        name: Routine Tracking
      - entity: input_boolean.ai_presence_patterns_enabled
        name: Presence Patterns
      - entity: input_boolean.ai_focus_guard_enabled
        name: Focus Guard
      - entity: input_boolean.ai_duck_manager_enabled
        name: Duck Manager
      - entity: input_boolean.ai_sleep_detection_enabled
        name: Sleep Detection
      - entity: input_boolean.ai_auto_off_enabled
        name: Auto-Off
      - entity: input_boolean.ai_voice_handoff_enabled
        name: Voice Handoff
      - entity: input_boolean.ai_music_follow_me
        name: Music Follow-Me
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Blueprint Instances


        Status of all blueprint-managed automations. Toggle on/off directly.

        Tap an entity for last triggered time and full details.'
    - type: glance
      title: Sleep & Lights
      state_color: true
      columns: 3
      entities:
      - entity: automation.ai_sleep_detection
        name: Sleep Detect
      - entity: automation.ai_sleep_lights_out
        name: Sleep Lights
      - entity: automation.ai_meal_passive_detection
        name: Meal Detect
    - type: glance
      title: Charge & Phone
      state_color: true
      columns: 2
      entities:
      - entity: automation.phone_charge_reminder
        name: Charge Reminder
      - entity: automation.ai_email_priority_filter
        name: Email Filter
    - type: glance
      title: Auto-Off Zones
      state_color: true
      columns: 4
      entities:
      - entity: automation.ai_auto_off_workshop
        name: Workshop
      - entity: automation.ai_auto_off_living_room
        name: Living Room
      - entity: automation.ai_auto_off_kitchen
        name: Kitchen
      - entity: automation.ai_auto_off_bedroom
        name: Bedroom
    - type: glance
      title: Briefing
      state_color: true
      columns: 3
      entities:
      - entity: automation.ai_morning_briefing
        name: Morning
      - entity: automation.ai_afternoon_briefing
        name: Afternoon
      - entity: automation.ai_evening_briefing
        name: Evening
- title: Configuration
  path: configuration
  icon: mdi:cog
  cards:
  - type: markdown
    content: '## Configuration


      Tunable parameters for all AI subsystems. Changes take effect on next

      evaluation cycle — no restart needed.'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Keyword Manager


        Per-agent routing keywords. **[M]** = manual (sticky, survives auto-updates),

        **[A]** = auto (from whisper topics). Add keywords to steer conversations

        toward specific agents.'
    - type: entities
      entities:
      - entity: input_select.ai_keyword_agent_select
        name: Agent
      - entity: input_text.ai_keyword_add
        name: Add Keyword
      - entity: input_boolean.ai_keyword_manual
        name: Mark as Manual
      - entity: input_text.ai_keyword_remove
        name: Remove Keyword
    - type: horizontal-stack
      cards:
      - type: button
        name: Load
        icon: mdi:refresh
        tap_action:
          action: perform-action
          perform_action: pyscript.dispatcher_load_keywords
      - type: button
        name: Add
        icon: mdi:tag-plus
        tap_action:
          action: perform-action
          perform_action: pyscript.dispatcher_add_keyword
      - type: button
        name: Remove
        icon: mdi:tag-minus
        tap_action:
          action: perform-action
          perform_action: pyscript.dispatcher_remove_keyword
      - type: button
        name: Clear Auto
        icon: mdi:tag-off
        tap_action:
          action: perform-action
          perform_action: pyscript.dispatcher_clear_auto_keywords
    - type: markdown
      title: Current Keywords
      content: '{% if state_attr(''sensor.ai_keyword_display'', ''keywords_md'') %}

        {{ state_attr(''sensor.ai_keyword_display'', ''keywords_md'') }}

        {% else %}

        _Select an agent and tap Load._

        {% endif %}'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### LLM Budget


        **Daily Call Limit** = max LLM API calls per day.

        **Personality Threshold** = below this remaining %, agents use

        stripped mode (no LLM reformulation, raw TTS fallback).'
    - type: entities
      title: LLM Budget
      entities:
      - entity: input_number.ai_llm_daily_limit
        name: Daily Call Limit
      - entity: input_number.ai_llm_daily_budget
        name: Budget Scale (%)
      - entity: input_number.ai_llm_calls_today
        name: Calls Today
      - entity: input_number.ai_budget_personality_threshold
        name: Personality Threshold (%)
      - entity: input_select.ai_budget_metric
        name: Budget Metric (I-33)
      - entity: input_number.ai_tts_daily_limit
        name: TTS Daily Limit
      - entity: input_number.ai_llm_daily_token_limit
        name: LLM Token Limit
      - entity: input_number.ai_budget_daily_cost_limit
        name: Daily Cost Limit (€)
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Project Tracking


        Promotes `/config/projects/*.md` files to L1 hot context and L2 memory.

        Syncs every 30 minutes. Use **Promote Now** for an immediate refresh.'
    - type: entities
      title: Project Tracking
      entities:
      - entity: input_boolean.ai_project_tracking_enabled
        name: Enabled
      - entity: input_number.ai_project_hot_context_limit
        name: Hot Context Limit
      - entity: input_boolean.ai_project_data_stale
        name: Data Stale
      - entity: input_text.ai_project_last_sync
        name: Last Sync
      - entity: input_text.ai_project_hot_context_line
        name: Hot Context Line
      - entity: input_text.ai_active_projects_summary
        name: Active Summary
    - type: horizontal-stack
      cards:
      - type: button
        name: Promote Now
        icon: mdi:refresh
        tap_action:
