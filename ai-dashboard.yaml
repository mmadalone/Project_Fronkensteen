        {{ state_attr('sensor.ai_project_hot_context_line', 'full_text')
        or states('sensor.ai_project_hot_context_line') or 'None' }}

        ---

        **Active Summary**

        {{ state_attr('sensor.ai_active_projects_summary', 'full_text')
        or states('sensor.ai_active_projects_summary') or 'None' }}
