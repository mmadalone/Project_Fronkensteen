      title: Presence Patterns
      entities:
      - entity: input_number.ai_presence_pattern_lookback_days
        name: Lookback Days
      - entity: input_number.ai_presence_pattern_min_samples
        name: Min Samples
      - entity: input_number.ai_presence_transition_window
        name: Transition Window (sec)
    - type: entities
