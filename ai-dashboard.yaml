  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Presence Patterns


        **Lookback Days** = days of FP2 history for Markov chain analysis.

        **Min Samples** = transitions needed for reliable pattern.

        **Transition Window** = max seconds between zone OFF→ON to count as one transition.'
