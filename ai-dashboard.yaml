      title: General
      entities:
      - entity: input_text.ai_default_speaker
        name: Default Speaker (fallback)
      - entity: input_text.ai_tts_zone_priority
        name: Zone Scan Priority (CSV)
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Email Filters


        **whitelist** = only known contacts + priority keywords promoted.

        **blacklist** = everything promoted EXCEPT blocked senders/keywords.

        **hybrid** = blocked rejected first, then only contacts + keywords promoted.'
