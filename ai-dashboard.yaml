- title: Presence
  path: presence
  icon: mdi:account-search
  cards:
  - type: markdown
    content: '## Presence Confidence Scorecard

      Real-time identity scoring. Each signal contributes points.

      70+ = full personal features, 30-69 = limited, <30 = guest mode.'
  - type: horizontal-stack
    cards:
    - type: gauge
      entity: sensor.identity_confidence_miquel
      name: Miquel
      min: 0
      max: 100
      severity:
        green: 70
        yellow: 30
        red: 0
    - type: gauge
      entity: sensor.identity_confidence_jessica
      name: Jessica
      min: 0
      max: 100
      severity:
        green: 70
        yellow: 30
        red: 0
  - type: markdown
    title: Signal Breakdown
    content: >-
      {%- set m_wifi = is_state('device_tracker.oppo_a60', 'home') -%}
      {%- set j_wifi = is_state('device_tracker.oppo_a38', 'home') -%}
      {%- set j_stale = is_state('input_boolean.ai_wifi_stale_jessica', 'on') -%}
      {%- set m_gps = is_state('device_tracker.madoppo', 'home') -%}
      {%- set solo = is_state('binary_sensor.ai_solo_single_zone', 'on') -%}
      {%- set sust = is_state('sensor.ai_sustained_solo_zone', 'on') -%}
      {%- set w1 = states('input_number.ai_wifi_score_primary') | int(30) -%}
      {%- set w2 = states('input_number.ai_wifi_score_secondary') | int(50) -%}
      {%- set w3 = states('input_number.ai_wifi_score_tertiary') | int(15) -%}
      {%- set w4 = states('input_number.ai_wifi_score_quaternary') | int(5) -%}

      Signal | Miquel | Jessica | Weight

      :--- | :---: | :---: | ---:

      WiFi Home | {{ 'ON' if m_wifi else 'off' }} | {{ 'stale' if j_stale else ('ON' if j_wifi else 'off') }} | {{ w1 }}

      GPS Home | {{ 'ON' if m_gps else 'off' }} | _N/A_ | {{ w2 }}

      FP2 Solo Infer | {{ 'ON' if solo else 'off' }} | {{ 'ON' if solo else 'off' }} | {{ w3 }}

      Sustained Solo | {{ 'ON' if sust else 'off' }} | {{ 'ON' if sust else 'off' }} | {{ w4 }}

      **Total** | **{{ states('sensor.identity_confidence_miquel') }}** | **{{ states('sensor.identity_confidence_jessica') }}** | {{ w1 + w2 + w3 + w4 }}
