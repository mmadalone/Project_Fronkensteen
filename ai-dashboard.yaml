- title: Debug
  path: debug
  icon: mdi:bug
  cards:
  - type: markdown
    content: '## Debug


      Raw state, internals, and test harness. L1 Hot Context shows the full

      context blob injected into every LLM conversation.'
  - type: markdown
    title: L1 Hot Context
    content: >-
      {%- set ctx = state_attr('sensor.ai_hot_context', 'context') | default('No data', true) -%}
      {%- set icons = {
        'Time': '🕐', 'User': '👤', 'Household': '🏠', 'Presence': '📡',
        'Occupancy': '🚪', 'Media': '🎵', 'Music taste': '🎶',
        'Sonarr': '📺', 'Radarr': '🎬',
        'House mode': '🏡', 'Expertise routing': '🧭',
        'Weather': '🌤', "Tomorrow's weather": '🌤', 'Tomorrow weather': '🌤',
        'Next alarm': '⏰', 'Schedule': '📅', 'Projects': '📋', 'Focus': '🎯',
        'Privacy': '🔒', 'Guests': '👥',
        'Memory context': '🧠', 'Last interaction': '💬'
      } -%}
      {%- for line in ctx.split('\n') -%}
      {%- if line.startswith('- ') -%}
      {%- set clean = line[2:] | trim -%}
      {%- if clean[:1] == '[' -%}
      {%- set agent = clean.split(']')[0][1:] | title -%}
      {%- set rest = clean.split('] ', 1)[1] | default('') -%}
      {%- set rest = rest | regex_replace('^topic: *', '') -%}
      {%- set rest = rest | regex_replace(' *\\| *intent: *', ' — ') %}

      · {{ agent }}: {{ rest }}
      {%- else %}

      · {{ clean }}
      {%- endif -%}
      {%- elif line.startswith('Recent') %}

      📝 **Recent:**
      {%- else -%}
      {%- set parts = line.split(': ', 1) -%}
      {%- if parts | length > 1 -%}
      {%- set label = parts[0] | trim -%}
      {%- set icon = icons.get(label, '•') -%}
      {%- if label == 'Memory context' %}

      ---

      **{{ icon }} {{ label }}**
      {%- else %}

      {{ icon }} **{{ label }}:** {{ parts[1] }}
      {%- endif -%}
      {%- endif -%}
      {%- endif -%}
      {%- endfor -%}
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Last Briefing

        Most recent briefing text (before LLM reformulation).'
    - type: markdown
      title: Last Briefing
      content: '{{ states(''input_text.ai_last_briefing_summary'') }}'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Dispatcher Detail


        Last agent routing decision: which agent, why, and timing.'
    - type: markdown
      title: Dispatcher Detail
      content: '{% if state_attr(''sensor.ai_dispatcher_status'', ''agent'') %}

        **Agent:** {{ state_attr(''sensor.ai_dispatcher_status'', ''agent'') }}

        **Persona:** {{ state_attr(''sensor.ai_dispatcher_status'', ''persona'') }}

        **Verbosity:** {{ state_attr(''sensor.ai_dispatcher_status'', ''verbosity'')
        }}

        **Reason:** {{ state_attr(''sensor.ai_dispatcher_status'', ''reason'') }}

        **TTS Engine:** {{ state_attr(''sensor.ai_dispatcher_status'', ''tts_engine'')
        }}

        **Elapsed:** {{ state_attr(''sensor.ai_dispatcher_status'', ''elapsed_ms'')
        }}ms

        {% else %}

        _No dispatch yet — start a voice conversation to populate._

        {% endif %}'
