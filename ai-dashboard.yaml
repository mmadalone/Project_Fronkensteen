        tap_action:
          action: more-info
          entity: sensor.ai_project_promotion_status
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Focus Guard Tuning


        All thresholds configurable. **Meal Reminder** = hours since last meal.

        **Nudge Cooldown** = minutes between nudges.

        **Break Suggest** = hours in same zone before break nudge.

        **Bedtime Approach** = minutes before bedtime for wind-down nudges.'
    - type: entities
      title: Focus Guard Settings
      entities:
      - entity: input_number.ai_focus_guard_threshold_hours
        name: Workshop Threshold (hours)
      - entity: input_number.ai_focus_mode_max_hours
        name: Focus Mode Max Duration
      - entity: input_number.ai_focus_meal_reminder_hours
        name: Meal Reminder (hours)
      - entity: input_number.ai_focus_nudge_cooldown_minutes
        name: Nudge Cooldown (minutes)
      - entity: input_number.ai_focus_social_nudge_minutes
        name: Social Nudge (minutes)
      - entity: input_number.ai_focus_break_suggest_hours
        name: Break Suggest (hours)
      - entity: input_number.ai_focus_bedtime_approach_minutes
        name: Bedtime Approach (minutes)
    - type: entities
      title: Per-Nudge Toggles
      show_header_toggle: true
      entities:
      - entity: input_boolean.ai_focus_time_check_enabled
        name: Time Check
      - entity: input_boolean.ai_focus_meal_reminder_enabled
        name: Meal Reminder
      - entity: input_boolean.ai_focus_calendar_warn_enabled
        name: Calendar Warning
      - entity: input_boolean.ai_focus_social_nudge_enabled
        name: Social Nudge
      - entity: input_boolean.ai_focus_break_suggest_enabled
        name: Break Suggest
      - entity: input_boolean.ai_focus_bedtime_approach_enabled
        name: Bedtime Approach
      - entity: input_boolean.ai_focus_meal_ask_eaten
        name: Meal Ask-If-Eaten
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Duck Manager


        Unified volume ducking engine. First wake word or TTS play ducks

        all background media. Last session ending restores original volumes.

        Reference-counted — overlapping satellite + TTS plays are safe.


        **Duck Group** = CSV of media players to duck (short IDs without

        media_player. prefix, auto-added by code).

        **Announcement Players** = speakers to boost (Voice PE satellites).

        **Duck Satellites** = assist_satellite entities that trigger ducking.


        **Restore Mode**: Fixed = blind delay after audio.

        Dynamic = polls speaker state, restores when audio ends.

        **Watchdog** = force-restores stale sessions after timeout.'
    - type: entities
      title: Duck Manager
      entities:
      - entity: input_boolean.ai_duck_manager_enabled
        name: Engine Enabled
      - entity: sensor.ai_ducking_flag
        name: Ducking Active
      - entity: sensor.ai_duck_manager_status
        name: Engine Status
      - entity: input_number.ai_tts_duck_volume
        name: Duck Volume Level
      - entity: input_number.ai_tts_announcement_volume
        name: Announcement Volume
      - entity: input_select.ai_tts_restore_mode
        name: Restore Mode
      - entity: input_number.ai_tts_restore_fixed_delay
        name: Fixed Delay (s)
      - entity: input_number.ai_tts_restore_timeout
        name: Dynamic Timeout (s)
      - entity: input_text.ai_tts_restore_satellites
        name: Monitor Satellites
      - entity: input_number.ai_duck_watchdog_timeout
        name: Watchdog Timeout (s)
      - entity: input_select.ai_duck_behavior
        name: Duck Behavior (I-39)
      - entity: input_number.ai_duck_pre_delay_ms
        name: Pre-Delay ms (I-21)
      - entity: input_boolean.ai_duck_allow_manual_override
        name: Allow Manual Override (I-22)
