- title: Memory
  path: memory
  icon: mdi:database-search
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Semantic Search (sqlite-vec)


        Vector embeddings for meaning-based memory search. Nightly batch
        embeds new memories. Blend weight controls FTS5 vs semantic mix
        (0 = keywords only, 100 = meaning only, 50 = balanced).'
    - type: entities
      title: Embedding Configuration
      entities:
        - entity: input_text.ai_embedding_model
          name: Embedding Model
        - entity: input_number.ai_embedding_dimensions
          name: Dimensions
        - entity: input_number.ai_semantic_blend_weight
          name: Blend Weight (FTS5 ↔ Semantic)
        - entity: input_number.ai_semantic_similarity_threshold
          name: Similarity Threshold
        - entity: input_number.ai_semantic_search_results
          name: Max Search Results
        - entity: input_datetime.ai_embedding_batch_time
          name: Nightly Batch Time
        - entity: input_number.ai_embedding_batch_size
          name: Batch Size
        - entity: input_boolean.ai_embedding_reindex_needed
          name: Reindex Needed
    - type: entities
      title: LLM Task Instance
      entities:
        - entity: input_text.ai_task_instance
          name: ha_text_ai Entity
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## L2 Memory Browser


        Search the long-term memory store (SQLite + FTS5). Enter a query

        and tap Search to find matching entries.'
    - type: entities
      title: Search
      entities:
      - entity: input_text.ai_memory_search_query
        name: Search Query
    - type: button
      name: Search Memory
      icon: mdi:magnify
      tap_action:
        action: perform-action
        perform_action: pyscript.memory_browse
      icon_height: 40px
    - type: markdown
      title: Results
      content: '{% if state_attr(''sensor.ai_memory_browse'', ''results_md'') %}

        **Query:** {{ state_attr(''sensor.ai_memory_browse'', ''query'') }} | **Results:**
        {{ state_attr(''sensor.ai_memory_browse'', ''count'') }}


        {{ state_attr(''sensor.ai_memory_browse'', ''results_md'') }}

        {% else %}

        _Run a search to see results here._

        {% endif %}'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Memory Editor


        View, edit, or delete individual memory entries. Type a key and tap

        **Load** to populate fields. Edit values and tap **Save** to upsert.

        Tap **Delete** to remove the entry.'
    - type: entities
      title: Editor
      entities:
      - entity: input_text.ai_memory_edit_key
        name: Key
      - entity: input_text.ai_memory_edit_value
        name: Value
      - entity: input_text.ai_memory_edit_tags
        name: Tags
      - entity: input_text.ai_memory_edit_scope
        name: Scope
    - type: horizontal-stack
      cards:
      - type: button
        name: Load
        icon: mdi:download
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_load
      - type: button
        name: Save
        icon: mdi:content-save
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_edit
      - type: button
        name: Delete
        icon: mdi:delete
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_delete
  - type: vertical-stack
    cards:
    - type: markdown
      title: L1 Hot Context
      content: >-
        {%- set ctx = state_attr('sensor.ai_hot_context', 'context') | default('No data', true) -%}
        {%- set icons = {
          'Time': '🕐', 'User': '👤', 'Household': '🏠', 'Presence': '📡',
          'Occupancy': '🚪', 'Media': '🎵', 'Music taste': '🎶',
          'Sonarr': '📺', 'Radarr': '🎬',
          'House mode': '🏡', 'Expertise routing': '🧭',
          'Weather': '🌤', "Tomorrow's weather": '🌤', 'Tomorrow weather': '🌤',
          'Next alarm': '⏰', 'Schedule': '📅', 'Projects': '📋', 'Focus': '🎯',
          'Privacy': '🔒', 'Guests': '👥',
          'Memory context': '🧠', 'Last interaction': '💬'
        } -%}
        {%- for line in ctx.split('\n') -%}
        {%- if line.startswith('- ') -%}
        {%- set clean = line[2:] | trim -%}
        {%- if clean[:1] == '[' -%}
        {%- set agent = clean.split(']')[0][1:] | title -%}
        {%- set rest = clean.split('] ', 1)[1] | default('') -%}
        {%- set rest = rest | regex_replace('^topic: *', '') -%}
        {%- set rest = rest | regex_replace(' *\\| *intent: *', ' — ') %}

        · {{ agent }}: {{ rest }}
        {%- else %}

        · {{ clean }}
        {%- endif -%}
        {%- elif line.startswith('Recent') %}

        📝 **Recent:**
        {%- else -%}
        {%- set parts = line.split(': ', 1) -%}
        {%- if parts | length > 1 -%}
        {%- set label = parts[0] | trim -%}
        {%- set icon = icons.get(label, '•') -%}
        {%- if label == 'Memory context' %}

        ---

        **{{ icon }} {{ label }}**
        {%- else %}

        {{ icon }} **{{ label }}:** {{ parts[1] }}
        {%- endif -%}
        {%- endif -%}
        {%- endif -%}
        {%- endfor -%}
      card_mod:
        style: |
          ha-card {
            border-left: 4px solid #9999FF;
            border-radius: 0 12px 12px 0;
          }
          .card-header {
            color: #9999FF;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 4px;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #9999FF 40%, #CC6699 70%, #F1DF6F) 1;
          }
          .card-content {
            font-size: 13px;
            line-height: 1.6;
          }
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Memory Health


        Database statistics. Tap Health Check to refresh or Reindex FTS

        to rebuild the full-text search index.'
    - type: horizontal-stack
      cards:
      - type: button
        name: Health Check
        icon: mdi:database-check
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_health_check
        icon_height: 40px
      - type: button
        name: Reindex FTS
        icon: mdi:database-refresh
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_reindex_fts
        icon_height: 40px
      - type: button
        name: Sync Todo
        icon: mdi:checkbox-marked-outline
        tap_action:
          action: perform-action
          perform_action: pyscript.memory_todo_sync
          data:
            todo_entity: todo.ai_memory
        icon_height: 40px
    - type: entities
      title: L2 Memory Core
      show_header_toggle: false
      entities:
        - type: attribute
          entity: sensor.memory_result
          attribute: rows
          name: Entries
          icon: mdi:database
        - type: attribute
          entity: sensor.memory_result
          attribute: expired
          name: Expired
          icon: mdi:clock-alert-outline
        - type: attribute
          entity: sensor.memory_result
          attribute: fts_rows
          name: FTS Index
          icon: mdi:text-search
        - type: attribute
          entity: sensor.memory_result
          attribute: rel_count
          name: Relations
          icon: mdi:graph-outline
        - type: attribute
          entity: sensor.memory_result
          attribute: op
          name: Last Op
          icon: mdi:cog
        - entity: sensor.memory_result
          name: Status
          icon: mdi:check-circle
      card_mod:
        style: |
          ha-card {
            border-left: 4px solid #F1DF6F;
            border-radius: 0 12px 12px 0;
          }
          .card-header {
            color: #F1DF6F;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 4px;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #F1DF6F 40%, #CC6699 70%, #9999FF) 1;
          }
