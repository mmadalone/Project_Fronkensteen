        Configure in **Settings > Automations & Scenes > AI - Sleep Lights Out**.'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Meal Detection


        This feature is now managed by a blueprint instance.

        Configure in **Settings > Automations & Scenes > AI - Meal Passive Detection**.'
