      content: '### TTS Queue


        **Conflict Mode**: What to do when target speaker is already playing.

        override = play immediately, wait = brief delay, skip = drop item.


        **Cache Eviction**: Static entries expire after max age (days). LRU eviction
        kicks in when total cache exceeds size cap. Recent entries within the protection
        window are never evicted.'
