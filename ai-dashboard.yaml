  - type: vertical-stack
    cards:
    - type: markdown
      content: '### TTS Speaker Routing


        Select which speaker plays TTS for each FP2 zone. When you''re detected

        in a zone, TTS routes to that zone''s speaker. **Zone Priority** controls

        which zone wins when multiple zones detect presence simultaneously.'
