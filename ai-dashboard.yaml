    - type: markdown
      content: '### G13 Entropy Scoring

        Phase 1 observes entropy + predictability on predictions.

        Phase 1.5 logs per-arrival entropy+MAE to L2 and runs weekly

        correlation analysis (Pearson r). Dashboard shows live tier breakdown.'
