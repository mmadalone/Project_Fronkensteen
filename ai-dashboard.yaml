        {% if s %}
        {% set low = s.get('low', {}) %}
        {% set med = s.get('medium', {}) %}
        {% set high = s.get('high', {}) %}
        | Tier | Count | Mean MAE | Predictability |

        |------|------:|---------:|---------------:|

        | Low | {{ low.get('count', 0) }} | {{ low.get('mean_mae', 0) }} min | {{ low.get('mean_predictability', 0) }} |

        | Medium | {{ med.get('count', 0) }} | {{ med.get('mean_mae', 0) }} min | {{ med.get('mean_predictability', 0) }} |

        | High | {{ high.get('count', 0) }} | {{ high.get('mean_mae', 0) }} min | {{ high.get('mean_predictability', 0) }} |


        **Pearson r:** {{ state_attr('sensor.ai_entropy_correlation', 'pearson_r') | default('N/A') }}
        · **Entries:** {{ state_attr('sensor.ai_entropy_correlation', 'total_entries') | default(0) }}
        {% else %}
        *Awaiting data — correlation will appear after arrivals are logged.*
        {% endif %}
    - type: button
      name: Run Correlation Report
