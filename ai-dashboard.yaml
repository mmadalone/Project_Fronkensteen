title: AI Management
views:
- title: Overview
  path: overview
  icon: mdi:brain
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## System Overview


        Real-time health of all AI subsystems.

        Green = active, yellow = degraded, red = error.'
    - type: glance
      title: Subsystem Health
      state_color: true
      columns: 4
      entities:
      - entity: sensor.ai_system_health
        name: System
      - entity: sensor.ai_dispatcher_status
        name: Dispatch
      - entity: sensor.ai_tts_queue_status
        name: TTS
      - entity: sensor.ai_whisper_status
        name: Whisper
      - entity: sensor.ai_dedup_status
        name: Dedup
      - entity: sensor.ai_calendar_promotion_status
        name: Calendar
      - entity: sensor.ai_email_promotion_status
        name: Email
      - entity: sensor.ai_predictive_schedule_status
        name: Schedule
      - entity: sensor.ai_presence_pattern_status
        name: Presence
      - entity: sensor.ai_proactive_briefing_status
        name: Briefing
      - entity: sensor.ai_routine_tracker_status
        name: Routine
      - entity: sensor.ai_focus_guard_status
        name: Focus Guard
      - entity: sensor.ai_duck_manager_status
        name: Duck Mgr
      - entity: sensor.ai_conversation_sensor_status
        name: Conv Sensor
      - entity: sensor.ai_music_taste_status
        name: Music Taste
      - entity: sensor.ai_system_recovery_status
        name: Recovery
      - entity: sensor.ai_toggle_audit_status
        name: Audit
    - type: conditional
      conditions:
        - condition: state
          entity: sensor.ai_system_recovery_status
          state_not: idle
      card:
        type: markdown
        title: Recovery Engine
        content: >-
          **State:** {{ states('sensor.ai_system_recovery_status') }}


          **Active:** {{ state_attr('sensor.ai_system_recovery_status', 'active_recoveries') | default([]) | join(', ') or 'none' }}


          **Circuit broken:** {{ state_attr('sensor.ai_system_recovery_status', 'circuit_broken') | default([]) | join(', ') or 'none' }}


          **Attempts (1h):** {{ state_attr('sensor.ai_system_recovery_status', 'total_attempts_1h') | default(0) }}
    - type: conditional
      conditions:
        - condition: state
          entity: sensor.ai_system_health
          state_not: healthy
      card:
        type: markdown
        title: System Health Detail
        content: >-
          **State:** {{ states('sensor.ai_system_health') }}
          | **Score:** {{ state_attr('sensor.ai_system_health', 'score') | default(0) }}


          | Category | Grade |

          |----------|-------|

          | Sensors | {{ state_attr('sensor.ai_system_health', 'status_sensors_grade') | default('?') }} |

          | Services | {{ state_attr('sensor.ai_system_health', 'services_grade') | default('?') }} |

          | Helpers | {{ state_attr('sensor.ai_system_health', 'helpers_grade') | default('?') }} |

          | Pipelines | {{ state_attr('sensor.ai_system_health', 'pipeline_entities_grade') | default('?') }} |

          | Memory DB | {{ state_attr('sensor.ai_system_health', 'memory_db_grade') | default('?') }} |

          | JSON Configs | {{ state_attr('sensor.ai_system_health', 'json_configs_grade') | default('?') }} |

          | TTS Queue | {{ state_attr('sensor.ai_system_health', 'tts_queue_grade') | default('?') }} |


          {% if state_attr('sensor.ai_system_health', 'status_sensors_missing') | default(none) is not none %}
          **Missing sensors:** {{ state_attr('sensor.ai_system_health', 'status_sensors_missing') | join(', ') }}
          {% endif %}
          {% if state_attr('sensor.ai_system_health', 'services_potentially_missing') | default(none) is not none %}
          **Missing services:** {{ state_attr('sensor.ai_system_health', 'services_potentially_missing') | join(', ') }}
          {% endif %}
          {% if state_attr('sensor.ai_system_health', 'helpers_missing') | default(none) is not none %}
          **Missing helpers:** {{ state_attr('sensor.ai_system_health', 'helpers_missing') | join(', ') }}
          {% endif %}
          {% if state_attr('sensor.ai_system_health', 'pipeline_entities_missing') | default(none) is not none %}
          **Missing pipelines:** {{ state_attr('sensor.ai_system_health', 'pipeline_entities_missing') | join(', ') }}
          {% endif %}
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### LLM Budget & Counters


        Daily LLM API call budget. Resets at midnight.

        Below personality threshold, agents switch to stripped mode (no LLM reformulation).'
    - type: gauge
      title: LLM Budget Remaining
      entity: sensor.ai_llm_budget_remaining
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 20
        red: 0
    - type: entities
      title: Daily Counters
      entities:
      - entity: sensor.ai_llm_calls_today
        name: LLM Calls Today
      - entity: input_number.ai_llm_daily_limit
        name: LLM Daily Limit
      - entity: sensor.ai_dedup_blocked_count
        name: Dedup Blocked Today
      - entity: sensor.ai_email_priority_count
        name: Priority Emails
    - type: gauge
      title: TTS Budget Remaining
      entity: sensor.ai_tts_budget_remaining
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 20
        red: 0
    - type: entities
      title: Extended Counters
      entities:
      - entity: input_button.ai_budget_manual_reset
        name: Reset Budget Now
      - entity: sensor.ai_llm_tokens_today
        name: LLM Tokens Today
      - entity: sensor.ai_tts_chars_today
        name: TTS Characters Today
      - entity: sensor.ai_stt_calls_today
        name: STT Calls Today
      - entity: sensor.ai_total_daily_cost
        name: Total Daily Cost
      - entity: sensor.ai_llm_budget_remaining
        name: Budget Remaining (min of all)
      - entity: input_number.ai_budget_daily_cost_limit
        name: Daily Cost Limit
      - entity: input_number.ai_llm_daily_limit
        name: Daily Call Limit
      - entity: input_number.ai_llm_daily_token_limit
        name: Daily Token Limit
      - entity: input_select.ai_budget_view_level
        name: View Level
    - type: entities
      title: ElevenLabs Credits
      entities:
      - entity: sensor.elevenlabs_credits_remaining
        name: Credits Remaining
      - entity: sensor.elevenlabs_subscription
        name: API Remaining (chars)
      - entity: input_number.ai_elevenlabs_credit_cap
        name: Manual Cap
      - entity: sensor.elevenlabs_daily_usage
        name: Today's Usage
      - entity: input_number.ai_elevenlabs_credit_floor
        name: Credit Floor
    - type: entities
      title: OpenRouter Usage
      entities:
      - entity: sensor.ai_openrouter_rolling_usage
        name: Rolling Usage (€)
      - entity: sensor.openrouter_daily_usage
        name: Today's Usage (€)
      - entity: input_number.ai_budget_rolling_months
        name: Rolling Window
    - type: entities
      title: Serper Web Search
      entities:
      - entity: sensor.serper_account
        name: Credits Remaining
      - entity: sensor.serper_daily_usage
        name: Today's Usage
      - entity: sensor.ai_serper_rolling_usage
        name: Rolling Usage (credits)
      - type: attribute
        entity: sensor.ai_serper_rolling_usage
        attribute: total_cost_eur
        name: Rolling Cost
        suffix: "€"
      - entity: sensor.ai_cost_per_serper_credit
        name: Cost per Credit
      - entity: input_number.ai_budget_rolling_months
        name: Rolling Window
    - type: entities
      title: Budget Fallback
      entities:
      - entity: sensor.ai_budget_fallback_status
        name: Status
      - entity: input_boolean.ai_budget_fallback_active
        name: Fallback Active (manual override)
      - entity: input_text.ai_budget_fallback_agent
        name: Fallback Agent
    - type: markdown
      title: Per-Agent Breakdown
      content: >-
        {% set bd = state_attr('sensor.ai_budget_breakdown', 'breakdown') %}
        {% set level = states('input_select.ai_budget_view_level') %}
        {% set model_map = state_attr('sensor.ai_budget_breakdown', 'model_map') or {} %}
        {% if bd is not mapping %}
        *Waiting for data...*
        {% else %}
        {% set ns = namespace(rows=[]) %}
        {% for svc in ['llm', 'tts', 'stt'] %}
        {% set agents = bd.get(svc, {}) %}
        {% if agents %}
        {% if level == 'agent' %}
        {% for agent, data in agents.items() %}
        {% set ns.rows = ns.rows + [svc ~ ' | ' ~ agent ~ ' | ' ~ data.get('calls', 0)
           ~ ' | ' ~ data.get('tokens', 0) ~ ' | ' ~ data.get('chars', 0)] %}
        {% endfor %}
        {% elif level == 'model' %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set m = (model_map.get(svc, {}) or {}).get(agent, agent) %}
        {% set prev = grp.agg.get(svc ~ ':' ~ m, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{svc ~ ':' ~ m: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set parts = key.split(':') %}
        {% set ns.rows = ns.rows + [parts[0] ~ ' | ' ~ parts[1] ~ ' | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% elif level == 'provider' %}
        {% set pmap = state_attr('sensor.ai_budget_breakdown', 'provider_map') or {} %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set m = (model_map.get(svc, {}) or {}).get(agent, agent) %}
        {% set p = pmap.get(m, m) %}
        {% set key = svc ~ ':' ~ p %}
        {% set prev = grp.agg.get(key, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{key: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set parts = key.split(':') %}
        {% set ns.rows = ns.rows + [parts[0] ~ ' | ' ~ parts[1] ~ ' | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% else %}
        {% set grp = namespace(agg={}) %}
        {% for agent, data in agents.items() %}
        {% set prev = grp.agg.get(svc, {'calls': 0, 'tokens': 0, 'chars': 0}) %}
        {% set grp.agg = dict(grp.agg, **{svc: {'calls': prev.calls + data.get('calls', 0),
           'tokens': prev.tokens + data.get('tokens', 0), 'chars': prev.chars + data.get('chars', 0)}}) %}
        {% endfor %}
        {% for key, data in grp.agg.items() %}
        {% set ns.rows = ns.rows + [key ~ ' | total | ' ~ data.calls
           ~ ' | ' ~ data.tokens ~ ' | ' ~ data.chars] %}
        {% endfor %}
        {% endif %}
        {% endif %}
        {% endfor %}
        Type | {{ level | title }} | Calls | Tokens | Chars

        :--- | :--- | ---: | ---: | ---:

        {% for row in ns.rows %}
        {{ row }}

        {% endfor %}
        {% endif %}
    - type: markdown
      title: Cost Reconciliation
      content: |
        {% set source = states('input_select.ai_budget_cost_source') | default('hybrid') %}
        {% set estimated = states('sensor.ai_total_daily_cost') | float(0) %}
        {% set actual = state_attr('sensor.openrouter_daily_usage', 'daily_usage_eur') | float(0) %}
        {% set div = state_attr('sensor.ai_total_daily_cost', 'divergence_pct') | float(0) %}
        {% set color = 'green' if div < 20 else ('orange' if div < 50 else 'red') %}
        **Mode:** {{ source | upper }}

        | | Estimated | Actual (OR) |
        |:---|---:|---:|
        | Daily Cost | €{{ estimated | round(2) }} | €{{ actual | round(2) }} |

        **Divergence:** <font color="{{ color }}">{{ div | round(1) }}%</font>

        {% if source == 'hybrid' %}*Gate uses MAX(est, actual) = €{{ [estimated, actual] | max | round(2) }}*{% endif %}
    - type: markdown
      title: Per-Model Cost Breakdown
      content: >-
        {% set bd = state_attr('sensor.ai_budget_breakdown', 'breakdown') %}
        {% if bd is not mapping %}
        *Waiting for data...*
        {% else %}
        {% set ns = namespace(rows=[]) %}
        {% for svc in ['llm', 'handoff'] %}
        {% for agent, data in (bd.get(svc, {}) or {}).items() %}
        {% if data.get('model') and data.get('model_cost_eur', 0) > 0 %}
        {% set ns.rows = ns.rows + [data.get('model', '?') ~ ' | '
           ~ data.get('calls', 0) ~ ' | '
           ~ (data.get('input_tokens', 0) + data.get('output_tokens', 0)) ~ ' | €'
           ~ data.get('model_cost_eur', 0) | round(4)] %}
        {% endif %}
        {% endfor %}
        {% endfor %}
        {% if ns.rows | length > 0 %}
        Model | Calls | Tokens | Cost

        :--- | ---: | ---: | ---:

        {% for row in ns.rows %}
        {{ row }}

        {% endfor %}
        **Total model cost:** €{{ states('sensor.ai_model_cost_today') | float(0) | round(4) }}
        {% else %}
        *No per-model cost data yet. Costs are tracked when model + token data is available.*
        {% endif %}
        {% endif %}
    - type: entities
      title: Monthly Projection
      entities:
      - entity: sensor.ai_budget_daily_average
        name: Daily Average (€)
      - entity: sensor.ai_budget_monthly_projection
        name: Month Projection (€)
      - entity: sensor.ai_model_pricing_status
        name: Pricing Status
    - type: history-graph
      title: Cost Trend (7 days)
      hours_to_show: 168
      entities:
      - entity: sensor.ai_total_daily_cost
        name: Estimated
      - entity: sensor.openrouter_daily_usage
        name: Actual (OR)
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Active Agent & Identity


        Which AI persona is active, dispatch mode, and who the system thinks

        is home based on WiFi + FP2 presence scoring.'
    - type: entities
      title: Active Agent
      entities:
      - entity: sensor.ai_last_interaction
        name: Last Agent
      - entity: input_select.ai_dispatcher_mode
        name: Dispatch Mode
      - entity: sensor.ai_last_interaction
        name: Last Topic
        type: attribute
        attribute: topic
      - entity: input_datetime.ai_last_interaction_time
        name: Last Interaction
      - entity: input_button.ai_dispatcher_apply_config
        name: Apply Dispatcher Config
    - type: entities
      title: Identity Confidence
      entities:
      # ── Scores ──
      - entity: sensor.identity_confidence_miquel
        name: Miquel Confidence
      - entity: sensor.identity_confidence_jessica
        name: Jessica Confidence
      - entity: sensor.occupancy_mode
        name: Occupancy
      - type: divider
      # ── Raw Signals ──
      - entity: device_tracker.oppo_a60
        name: Miquel WiFi
      - entity: device_tracker.oppo_a38
        name: Jessica WiFi
      - entity: device_tracker.madoppo
        name: Miquel GPS
      - type: divider
      # ── Presence Inference ──
      - entity: binary_sensor.ai_solo_single_zone
        name: Solo Single Zone
      - entity: sensor.ai_sustained_solo_zone
        name: Sustained Solo Zone
      - entity: binary_sensor.ai_wifi_stale_condition_jessica
        name: WiFi Stale Condition (Jessica)
      - entity: input_boolean.ai_wifi_stale_jessica
        name: WiFi Stale (Jessica)
      - entity: input_number.ai_wifi_stale_timeout
        name: WiFi Stale Timeout
      - type: divider
      # ── Overrides ──
      - entity: input_boolean.ai_context_guests_present
        name: Guests Present
      - entity: input_boolean.ai_guest_mode
        name: Guest Mode
      - type: divider
      # ── House Mode ──
      - entity: sensor.ai_bedtime_active
        name: Bedtime Active
      - entity: input_boolean.ai_bedtime_global_lock
        name: Bedtime Lock
      - entity: sensor.ai_winddown_active
        name: Wind-Down Active
      - entity: input_boolean.ai_wake_up_snooze
        name: Wake-Up Snooze
      - entity: input_boolean.ai_wake_up_stop
        name: Wake-Up Stop
    - type: markdown
      title: Recent Topics
      content: >-
        {{ state_attr('sensor.ai_recent_topics', 'context')
           | default('No recent topics.', true) }}
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### TTS & Voice


        Text-to-speech queue, daily call counts, and cache performance.

        Cache hits avoid redundant TTS API calls.

        TTS routes to your current FP2 zone''s assigned speaker.

        Configure zone→speaker mapping in the Configuration tab.'
    - type: entities
      title: TTS Stats
      entities:
      - entity: sensor.ai_tts_queue_status
        name: Queue Status
      - entity: sensor.ai_tts_calls_today
        name: TTS Calls Today
      - entity: sensor.ai_tts_cache_hits_today
        name: Cache Hits Today
      - entity: sensor.ai_tts_cache_hit_rate
        name: Cache Hit Rate
      - entity: input_text.ai_default_speaker
        name: Default Speaker
      - entity: input_text.ai_tts_zone_priority
        name: Zone Priority
    - type: horizontal-stack
      cards:
      - type: button
        name: Clear Queue
        icon: mdi:playlist-remove
        tap_action:
          action: perform-action
          perform_action: pyscript.tts_queue_clear
      - type: button
        name: Stop Queue
        icon: mdi:stop-circle
        tap_action:
          action: perform-action
          perform_action: pyscript.tts_queue_stop
    - type: entities
      title: Voice Handoff
      entities:
      - entity: input_boolean.ai_handoff_processing
        name: Handoff In Progress
      - entity: input_select.ai_expertise_routing_mode
        name: Expertise Routing
      - type: button
        name: Restore Now
        icon: mdi:restore
        action_name: Restore
        tap_action:
          action: perform-action
          perform_action: pyscript.voice_handoff_restore_now
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Phone Status


        Battery level, charging state, and phone call detection.'
    - type: glance
      title: Phone
      state_color: true
      columns: 4
      entities:
      - entity: sensor.madaringer_battery_level
        name: Battery
      - entity: sensor.madaringer_battery_state
        name: State
      - entity: binary_sensor.madaringer_is_charging
        name: Charging
      - entity: sensor.ai_phone_call_active
        name: On Call
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Sleep Detection


        Current sleep state and last sleep timing.'
    - type: entities
      title: Sleep
      entities:
      - entity: sensor.ai_sleep_detected
        name: Sleep Detected
      - entity: input_datetime.ai_sleep_start
        name: Last Sleep Start
      - entity: input_datetime.ai_sleep_end
        name: Last Sleep End
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Focus Guards & Wellness


        Monitors work duration, meal timing, break patterns, and bedtime approach.

        Nudges escalate if ignored. Focus Mode (DND) suppresses non-critical interruptions.'
    - type: entities
      title: Focus Guards
      entities:
      - entity: input_boolean.ai_focus_mode
        name: Focus Mode (DND)
      - entity: sensor.workshop_hours_today
        name: Workshop Hours Today
      - entity: input_datetime.ai_last_meal_time
        name: Last Meal
      - entity: input_number.ai_focus_guard_threshold_hours
        name: Threshold Hours
      - entity: input_datetime.ai_focus_guard_snooze_until
        name: Snooze Until
      - entity: sensor.ai_focus_guard_status
      - entity: sensor.ai_duck_manager_status
        name: Guard Status
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Duck Manager


        Current ducking state and last duck event.'
    - type: entities
      title: Duck Manager
      entities:
      - entity: sensor.ai_duck_manager_status
        name: Status
      - entity: sensor.ai_ducking_flag
        name: Ducking Active
    - type: markdown
      content: '**Last duck:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_source'')
        | default(''none'') }} {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_detail'')
        | default('''') }} — {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_duration_s'')
        | default(''?'') }}s

        {% if state_attr(''sensor.ai_duck_manager_status'', ''last_duck_time'') %}

        **When:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_time'')
        }}

        **Sessions:** {{ state_attr(''sensor.ai_duck_manager_status'', ''last_duck_sessions'')
        | default(''?'') }}

        {% endif %}

        **Last topic:** {{ state_attr(''sensor.ai_last_interaction'', ''topic'') | default(''none'')
        }}'
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Schedule & Routine


        Predictive scheduling from historical presence patterns. Routine stage

        tracks daily progression (morning → work → evening → bedtime).'
    - type: markdown
      title: Schedule & Routine
      content: '{% set stage = states(''sensor.ai_routine_stage'') %}

        {% set pp = states(''sensor.ai_presence_pattern_status'') %}

        {% set rt = states(''sensor.ai_routine_tracker_status'') %}

        {% if stage in [''none'', '''', ''unknown'', ''unavailable''] %}

        {% if pp == ''ok'' and state_attr(''sensor.ai_presence_pattern_status'', ''cache_entries'')
        | int(0) > 0 %}

        _Presence data loaded. Routine fingerprints building — patterns refine daily
        at 04:15._

        {% else %}

        _Pipeline bootstrapping — presence extraction runs ~90s after startup. Full
        patterns build overnight at 04:00._

        {% endif %}

        {% endif %}


        | Field | Value |

        |-------|-------|

        | Routine Stage | {{ stage }} |

        | Routine ETA | {{ states(''sensor.ai_routine_eta'') }} |

        | Deviation | {{ states(''sensor.ai_routine_deviation'') }} |

        | Schedule Confidence | {{ states(''sensor.ai_schedule_confidence'') }} |

        | Predicted Next Zone | {{ states(''sensor.ai_predicted_next_zone'') }} |

        | Bedtime Recommendation | {{ state_attr(''sensor.ai_predictive_schedule_status'',
        ''bedtime_recommendation'') | default(''none'') }} |'
    - type: horizontal-stack
      cards:
      - type: button
        name: Run Bedtime Advisor
        icon: mdi:bed-clock
        tap_action:
          action: perform-action
          perform_action: pyscript.schedule_bedtime_advisor
        icon_height: 40px
      - type: button
        name: Optimal Timing
        icon: mdi:clock-check
        tap_action:
          action: perform-action
          perform_action: pyscript.schedule_optimal_timing
          perform_action_data:
            event_description: dentist appointment
            event_time: '13:00'
            prep_minutes: 30
            travel_minutes: 20
        icon_height: 40px
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Calendar & Briefing


        Calendar sync, email priority filtering, and morning briefing status.

        Briefing triggers on presence in bathroom/kitchen after wake time.'
    - type: entities
      title: Calendar & Briefing
      entities:
      - entity: sensor.ai_calendar_today_summary
        name: Today's Calendar
      - entity: sensor.ai_calendar_tomorrow_summary
        name: Tomorrow's Calendar
      - entity: sensor.ai_calendar_stale
        name: Calendar Stale
      - entity: sensor.ai_briefing_delivered_morning
        name: Morning Briefing Delivered
      - entity: sensor.ai_email_last_priority
        name: Last Priority Email
  - type: vertical-stack
    cards:
    - type: markdown
      content: '### Media & Music

        Music generation, taste extraction, and Sonarr/Radarr tracking.'
    - type: entities
      title: Media Tracking
      entities:
      - entity: input_boolean.ai_media_tracking_enabled
        name: Media Tracking
      - entity: sensor.ai_media_data_stale
        name: Data Stale
    - type: markdown
      content: >-
        **Upcoming (Sonarr)**

        {{ state_attr('sensor.ai_media_upcoming', 'sonarr') or 'None' }}

        ---

        **Upcoming (Radarr)**

        {{ state_attr('sensor.ai_media_upcoming', 'radarr') or 'None' }}

        ---

        **Recent Downloads**

        {{ state_attr('sensor.ai_media_upcoming', 'recent_downloads') or
