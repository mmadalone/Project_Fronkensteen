      title: Conversation Sensor
      entities:
      - entity: input_boolean.ai_conversation_sensor_enabled
        name: L2 History Enabled
      - entity: input_number.ai_conversation_history_retention_days
        name: History Retention (days)
      - entity: input_datetime.ai_conversation_summarizer_batch_time
        name: Summarizer Batch Time
      - entity: sensor.ai_conversation_sensor_config
        name: Config Status
      - entity: sensor.ai_conversation_sensor_status
        name: Pyscript Status
      - entity: sensor.ai_last_conversation_response
        name: Last Response
    - type: horizontal-stack
      cards:
      - type: button
