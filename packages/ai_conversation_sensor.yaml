# =============================================================================
# AI Conversation Sensor — Event-driven Response Capture + L2 History
# =============================================================================
# Pyscript (conversation_sensor.py) listens to conversation.finished events,
# writes sensor.ai_last_conversation_response for reactive banter blueprint,
# and stores responses in L2 memory for queryable history + batch
# summarization.
#
# Helpers:
#   input_boolean.ai_conversation_sensor_enabled          — master enable
#   input_number.ai_conversation_history_retention_days    — L2 raw entry TTL
#   input_datetime.ai_conversation_summarizer_batch_time   — summarizer schedule
#   sensor.ai_conversation_sensor_config                   — dashboard status
#
# Related blueprint:
#   conversation_summarizer.yaml — scheduled batch summarization (separate config)
# =============================================================================

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)
# input_number: moved to helpers_input_number.yaml (C6 consolidation)

template:
  - sensor:
      - name: "AI Conversation Sensor Config"
        unique_id: ai_conversation_sensor_config
        icon: mdi:message-text-clock
        state: >-
          {% if is_state('input_boolean.ai_conversation_sensor_enabled', 'on') %}active
          {% else %}disabled{% endif %}
        attributes:
          enabled: >-
            {{ is_state('input_boolean.ai_conversation_sensor_enabled', 'on') }}
          retention_days: >-
            {{ states('input_number.ai_conversation_history_retention_days') | int(7) }}
