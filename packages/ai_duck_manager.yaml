# =============================================================================
# AI Duck Manager — Unified Volume Ducking Helpers
# =============================================================================
# Central duck/restore engine for satellite wake words, TTS queue, and external.
# Duck group = media players to duck (short IDs, media_player. prefix auto-added).
# Announcement players = speakers to boost during voice events.
# Duck satellites = assist_satellite entities that trigger ducking on wake.
# Watchdog force-restores stale sessions.
#
# Reuses existing helpers from ai_tts_queue.yaml:
#   input_number.ai_tts_duck_volume / ai_tts_announcement_volume
#   input_select.ai_tts_restore_mode
#   input_number.ai_tts_restore_fixed_delay / ai_tts_restore_timeout
#   input_text.ai_tts_restore_satellites
#   input_boolean.ai_ducking_flag
# =============================================================================

# Pyscript-created sensor (duck_manager.py via state.set):
#   sensor.ai_duck_manager_status — ducking state, active sessions, snapshot info

