# =============================================================================
# AI Phone Call Detection — I-30 of P2 Integration
# =============================================================================
# Detects active phone calls via companion app sensor and defers TTS.
# When call ends, fires tts_queue_flush_deferred to play deferred items.
#
# Provides:
#   input_boolean.ai_phone_call_active      — auto-set by automation
#   input_boolean.ai_phone_call_defer_tts   — defer TTS during calls
#   automation.ai_phone_call_start          — detect call start
#   automation.ai_phone_call_end            — detect call end + flush
#
# Sensors: sensor.madaringer_phone_state (idle / ringing / offhook)
# Dependencies: pyscript/tts_queue.py (deferred queue + flush event)
# Deployed: 2026-03-04
# =============================================================================

# ── INPUT HELPERS ────────────────────────────────────────────────────────────

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)

# ── AUTOMATIONS ──────────────────────────────────────────────────────────────

automation:
  # ── CALL START ──────────────────────────────────────────────────────────
  - id: ai_phone_call_start
    alias: "AI - Phone Call Start"
    description: "Set phone call active when ringing or offhook"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.madaringer_phone_state
        to: "ringing"
      - trigger: state
        entity_id: sensor.madaringer_phone_state
        to: "offhook"
    conditions:
      - condition: state
        entity_id: input_boolean.ai_phone_call_active
        state: "off"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ai_phone_call_active

  # ── CALL END ────────────────────────────────────────────────────────────
  - id: ai_phone_call_end
    alias: "AI - Phone Call End"
    description: "Clear phone call active on idle, flush deferred TTS"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.madaringer_phone_state
        from:
          - "ringing"
          - "offhook"
        to: "idle"
    conditions:
      - condition: state
        entity_id: input_boolean.ai_phone_call_active
        state: "on"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ai_phone_call_active
      # Flush deferred TTS items
      - delay: "00:00:02"
      - continue_on_error: true
        action: pyscript.tts_queue_flush_deferred
