# =============================================================================
# AI Per-User Helpers — Household Customization (80 entities)
# =============================================================================
# Customize for your household: duplicate each person's block and change
# the suffix (_person1, _person2) to match your HA person slugs.
# Provides: 80 helpers (9 bool + 12 num + 2 select + 43 text + 12 datetime + 2 counter)
# Dependencies: user_interview.py, presence_identity.py, preference consumers
# =============================================================================

# ═══════════════════════════════════════════════════════════════════
# input_boolean — 9 entities
# ═══════════════════════════════════════════════════════════════════

input_boolean:
  # ── Per-User Context Flags ──
  ai_context_work_day_person1:
    name: "AI Context - Work Day (Person 1)"
    initial: true
    icon: mdi:briefcase
  ai_context_work_day_person2:
    name: "AI Context - Work Day (Person 2)"
    initial: false
    icon: mdi:briefcase-search

  # ── WiFi Stale Detection ──
  ai_wifi_stale_person2:
    name: "AI WiFi Stale Person 2"
    initial: false
    icon: mdi:wifi-alert

  # ── Per-Person Per-Tier State Booleans ──
  # Set by privacy_gate_hysteresis.yaml instances
  ai_privacy_gate_person1_t1_suppressed:
    name: "Privacy Gate — Person 1 T1 Suppressed"
    initial: false
    icon: mdi:bed-clock
  ai_privacy_gate_person1_t2_suppressed:
    name: "Privacy Gate — Person 1 T2 Suppressed"
    initial: false
    icon: mdi:email-lock
  ai_privacy_gate_person1_t3_suppressed:
    name: "Privacy Gate — Person 1 T3 Suppressed"
    initial: false
    icon: mdi:home-lightbulb
  ai_privacy_gate_person2_t1_suppressed:
    name: "Privacy Gate — Person 2 T1 Suppressed"
    initial: false
    icon: mdi:bed-clock
  ai_privacy_gate_person2_t2_suppressed:
    name: "Privacy Gate — Person 2 T2 Suppressed"
    initial: false
    icon: mdi:email-lock
  ai_privacy_gate_person2_t3_suppressed:
    name: "Privacy Gate — Person 2 T3 Suppressed"
    initial: false
    icon: mdi:home-lightbulb

