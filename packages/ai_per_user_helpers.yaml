# ═══════════════════════════════════════════════════════════════════
# input_datetime — 12 entities
# ═══════════════════════════════════════════════════════════════════

input_datetime:
  # ── Away Patterns ──
  ai_away_departed_miquel:
    name: "AI Away - Miquel Departed At"
    has_date: true
    has_time: true
    icon: mdi:exit-run
  ai_away_departed_jessica:
    name: "AI Away - Jessica Departed At"
    has_date: true
    has_time: true
    icon: mdi:exit-run
  ai_home_since_miquel:
    name: "AI Home Since - Miquel"
    has_date: true
    has_time: true
    icon: mdi:home-clock
  ai_home_since_jessica:
    name: "AI Home Since - Jessica"
    has_date: true
    has_time: true
    icon: mdi:home-clock

  # ── Per-User Schedule (Miquel) ──
  # Note: input_datetime has no 'initial' — set defaults via UI or automation.
  # Intended defaults: weekday 07:30, weekend 09:00, bedtime 22:30.
  ai_context_wake_time_weekday_miquel:
    name: "AI Context - Wake Time Weekday (Miquel)"
    has_date: false
    has_time: true
  ai_context_wake_time_weekend_miquel:
    name: "AI Context - Wake Time Weekend (Miquel)"
    has_date: false
    has_time: true
  ai_context_bed_time_miquel:
    name: "AI Context - Bedtime Target (Miquel)"
    has_date: false
    has_time: true

  # ── Per-User Schedule (Jessica) ──
  # Shares bedtime with Miquel. Set wake/bed times via UI.
  ai_context_wake_time_weekday_jessica:
    name: "AI Context - Wake Time Weekday (Jessica)"
    has_date: false
    has_time: true
  ai_context_wake_time_weekend_jessica:
    name: "AI Context - Wake Time Weekend (Jessica)"
    has_date: false
    has_time: true
  ai_context_bed_time_jessica:
    name: "AI Context - Bedtime Target (Jessica)"
    has_date: false
    has_time: true

  # ── Alt-Weekday Wake Time (Preference Consumption B1) ──
  ai_context_wake_time_alt_weekday_miquel:
    name: "AI Context - Alt Weekday Wake Time (Miquel)"
    has_date: false
    has_time: true
    icon: mdi:alarm-plus
  ai_context_wake_time_alt_weekday_jessica:
    name: "AI Context - Alt Weekday Wake Time (Jessica)"
