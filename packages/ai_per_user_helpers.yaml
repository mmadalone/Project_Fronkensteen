# input_datetime — 12 entities
# ═══════════════════════════════════════════════════════════════════

input_datetime:
  # ── Away Patterns ──
  ai_away_departed_person1:
    name: "AI Away - Person 1 Departed At"
    has_date: true
    has_time: true
    icon: mdi:exit-run
  ai_away_departed_person2:
    name: "AI Away - Person 2 Departed At"
    has_date: true
    has_time: true
    icon: mdi:exit-run
  ai_home_since_person1:
    name: "AI Home Since - Person 1"
    has_date: true
    has_time: true
    icon: mdi:home-clock
  ai_home_since_person2:
    name: "AI Home Since - Person 2"
    has_date: true
    has_time: true
    icon: mdi:home-clock

  # ── Per-User Schedule (Person 1) ──
  # Note: input_datetime has no 'initial' — set defaults via UI or automation.
  # Intended defaults: weekday 07:30, weekend 09:00, bedtime 22:30.
  ai_context_wake_time_weekday_person1:
    name: "AI Context - Wake Time Weekday (Person 1)"
    has_date: false
    has_time: true
  ai_context_wake_time_weekend_person1:
    name: "AI Context - Wake Time Weekend (Person 1)"
    has_date: false
    has_time: true
  ai_context_bed_time_person1:
    name: "AI Context - Bedtime Target (Person 1)"
    has_date: false
    has_time: true

  # ── Per-User Schedule (Person 2) ──
  # Shares bedtime with Person 1. Set wake/bed times via UI.
  ai_context_wake_time_weekday_person2:
    name: "AI Context - Wake Time Weekday (Person 2)"
    has_date: false
    has_time: true
  ai_context_wake_time_weekend_person2:
    name: "AI Context - Wake Time Weekend (Person 2)"
    has_date: false
    has_time: true
  ai_context_bed_time_person2:
    name: "AI Context - Bedtime Target (Person 2)"
    has_date: false
    has_time: true

  # ── Alt-Weekday Wake Time (Preference Consumption B1) ──
  ai_context_wake_time_alt_weekday_person1:
    name: "AI Context - Alt Weekday Wake Time (Person 1)"
    has_date: false
    has_time: true
