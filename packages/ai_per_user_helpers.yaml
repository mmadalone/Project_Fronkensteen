# =============================================================================
# AI Per-User Helpers — Household Customization (75 entities)
# =============================================================================
# Customize for your household: duplicate each person's block and change
# the suffix (_miquel, _jessica) to match your HA person slugs.
# Provides: 75 helpers (9 bool + 12 num + 2 select + 38 text + 12 datetime + 2 counter)
# Dependencies: user_interview.py, presence_identity.py, preference consumers
# =============================================================================

# ═══════════════════════════════════════════════════════════════════
# input_boolean — 9 entities
# ═══════════════════════════════════════════════════════════════════

input_boolean:
  # ── Per-User Context Flags ──
  ai_context_work_day_miquel:
    name: "AI Context - Work Day (Miquel)"
    initial: true
    icon: mdi:briefcase
  ai_context_work_day_jessica:
    name: "AI Context - Work Day (Jessica)"
    initial: false
    icon: mdi:briefcase-search

  # ── WiFi Stale Detection ──
  ai_wifi_stale_jessica:
    name: "AI WiFi Stale Jessica"
    initial: false
    icon: mdi:wifi-alert

  # ── Per-Person Per-Tier State Booleans ──
  # Set by privacy_gate_hysteresis.yaml instances
  ai_privacy_gate_miquel_t1_suppressed:
    name: "Privacy Gate — Miquel T1 Suppressed"
    initial: false
    icon: mdi:bed-clock
  ai_privacy_gate_miquel_t2_suppressed:
    name: "Privacy Gate — Miquel T2 Suppressed"
    initial: false
    icon: mdi:email-lock
  ai_privacy_gate_miquel_t3_suppressed:
    name: "Privacy Gate — Miquel T3 Suppressed"
    initial: false
    icon: mdi:home-lightbulb
  ai_privacy_gate_jessica_t1_suppressed:
    name: "Privacy Gate — Jessica T1 Suppressed"
    initial: false
    icon: mdi:bed-clock
  ai_privacy_gate_jessica_t2_suppressed:
    name: "Privacy Gate — Jessica T2 Suppressed"
    initial: false
    icon: mdi:email-lock
  ai_privacy_gate_jessica_t3_suppressed:
    name: "Privacy Gate — Jessica T3 Suppressed"
    initial: false
    icon: mdi:home-lightbulb

