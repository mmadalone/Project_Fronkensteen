# =============================================================================
# AI Music Composer Package — Item 10 of Integration Implementation Plan
# =============================================================================
# Architecture: Option C Hybrid — ElevenLabs Music/SFX API + FluidSynth local
#
# Provides:
#   sensor.ai_music_composer_status    — pyscript result entity (managed by music_composer.py)
#   sensor.ai_music_cache_stats        — cache inventory (managed by music_composer.py)
#   sensor.ai_music_generation_budget  — daily remaining (managed by music_composer.py)
#   automation.ai_music_midnight_reset — reset daily API generation counter
#
# Dependencies: pyscript/music_composer.py, helpers_input_boolean, helpers_input_number
# Deployed: 2026-03-17
# =============================================================================

# ── Shell command: install fluidsynth if missing (survives HA Core updates) ──
shell_command:
  ai_music_install_fluidsynth: >-
    which fluidsynth > /dev/null 2>&1 || apk add --no-cache fluidsynth > /dev/null 2>&1

automation:
  - id: ai_music_install_deps
    alias: "AI Music — Install FluidSynth on Startup"
    description: >
      Reinstalls fluidsynth binary after HA Core updates (apk packages
      are wiped on container rebuild). Python deps handled by pyscript requirements.
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - alias: "Install fluidsynth if missing"
        action: shell_command.ai_music_install_fluidsynth
        continue_on_error: true
      - alias: "Reload pyscript to pick up fluidsynth"
        delay:
          seconds: 10
      - action: pyscript.reload
        continue_on_error: true

  - id: ai_music_midnight_reset
    alias: "AI Music — Midnight Generation Counter Reset"
    description: "Reset the daily music API generation counter at midnight."
    mode: single
    trigger:
      - trigger: time
        at: "00:00:00"
    action:
      - alias: "Reset daily generation counter"
        action: input_number.set_value
        target:
          entity_id: input_number.ai_music_generations_today
        data:
          value: 0
      - alias: "Log to L2 (best-effort)"
        continue_on_error: true
        action: pyscript.memory_set
        data:
          key: >-
            music_daily:{{ (now() - timedelta(days=1)).strftime('%Y-%m-%d') }}
          value: >-
            generations={{ states('input_number.ai_music_generations_today') | int(0) }}
          scope: "system"
          tags: "budget,music,daily"
