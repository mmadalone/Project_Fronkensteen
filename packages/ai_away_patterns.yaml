# =============================================================================
# AI Away Patterns Package — I-40 of Voice Context Architecture
# =============================================================================
# Architecture spec: integration-implementation-plan.md § I-40
# Provides:
#   input_boolean.ai_away_patterns_enabled — kill switch (ON = active)
#   input_number.ai_away_pattern_lookback_days — recorder query window
#   input_number.ai_away_pattern_min_samples — minimum cycles for validity
#   input_number.ai_away_travel_buffer_minutes — calendar fusion buffer
#   input_number.ai_away_flap_debounce_seconds — WiFi flap debounce (G14)
#   input_number.ai_away_prediction_update_minutes — periodic update interval (G8)
#   input_number.ai_away_ordinal_min_samples — ordinal filtering threshold (I-40b)
#   input_number.ai_away_min_entropy_samples — min samples for entropy calc (G13)
#   input_number.ai_entropy_tier_low — G13 Phase 1.5 low entropy threshold
#   input_number.ai_entropy_tier_high — G13 Phase 1.5 high entropy threshold
#   input_boolean.ai_entropy_correlation_enabled — G13 Phase 1.5 kill switch
#   counter.ai_away_trip_count_{slug} — per-person daily trip counter (I-40b)
#   sensor.ai_away_prediction — pyscript sensor with full attributes (I-54)
#   sensor.ai_entropy_correlation — G13 Phase 1.5 correlation analysis result
#   sensor.ai_away_prediction_accuracy — rolling MAE (G12)
#   input_datetime.ai_away_departed_{slug} — per-person departure timestamp (Task 22)
#   sensor.ai_away_prediction — human-readable with range or "not_away"
#   sensor.ai_away_duration — minutes since departure (live-updating)
#   sensor.ai_away_pattern_status — created by pyscript (last op result)
#
# Services (pyscript):
#   pyscript.away_extract_cycles — extract from recorder, build tables
#   pyscript.away_predict_return — predict return time for absent person(s)
#   pyscript.away_rebuild_patterns — full rebuild (delete + extract + store)
#   pyscript.entropy_correlation_report — G13 Phase 1.5 on-demand analysis
#
# State trigger (pyscript):
#   device_tracker entities → log departure/arrival, update predictions
#   Departure debounced via ai_away_flap_debounce_seconds (G14)
#
# Time trigger (pyscript):
#   Daily rebuild at 04:15 AM (includes trip counter reset — I-40b)
#   Periodic prediction update while away (G8)
#
# Dependencies:
#   pyscript/away_patterns.py
#   pyscript/entropy_correlator.py (G13 Phase 1.5)
#   pyscript/memory.py (L2 memory)
#   packages/ai_identity.yaml (sensor.occupancy_mode)
#   packages/ai_test_harness.yaml (test mode toggle)
#   helpers_counter.yaml (trip counters — I-40b)
#
# I-40a hardening: G1–G12, G14 (2026-03-12)
# I-40b multi-trip: ordinal tracking, enriched samples, ordinal gate (2026-03-18)
# G13 Phase 1: entropy-based predictability — observe only (2026-03-26)
# G13 Phase 1.5: entropy-MAE correlation logger + weekly reporter (2026-03-26)
# Deployed: 2026-03-12
# =============================================================================

# ── INPUT HELPERS ────────────────────────────────────────────────────────────

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)

# input_number: moved to helpers_input_number.yaml (C6 consolidation)

# input_text: moved to helpers_input_text.yaml (C5 consolidation)

# ── TEMPLATE SENSORS ─────────────────────────────────────────────────────────

# I-54: sensor.ai_away_prediction is now created by pyscript state.set()
# (no 255-char limit, full attributes). Template sensor removed.

template:
  - sensor:
      - name: "AI Away Duration"
        unique_id: ai_away_duration
        icon: mdi:timer-outline
        unit_of_measurement: "min"
        state: >-
          {# Task 22: dynamic away duration from person.* entities #}
          {%- set occ = states('sensor.occupancy_mode') -%}
          {%- if occ == 'away' -%}
            {# All away — show longest duration across all persons #}
            {%- set ns = namespace(max_dur=0) -%}
            {%- for p in states.person -%}
              {%- set dep = states('input_datetime.ai_away_departed_' ~ p.object_id) -%}
              {%- if dep not in ['unknown', 'unavailable', ''] -%}
                {%- set dur = ((as_timestamp(now()) - as_timestamp(dep, 0)) / 60) | int -%}
                {%- if dur > ns.max_dur -%}{%- set ns.max_dur = dur -%}{%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.max_dur }}
          {%- elif occ.startswith('solo_') -%}
            {# Solo mode — show away duration for the person who is NOT home #}
            {%- set home_slug = occ[5:] -%}
            {%- set ns = namespace(dur=0) -%}
            {%- for p in states.person -%}
              {%- if p.object_id != home_slug -%}
                {%- set dep = states('input_datetime.ai_away_departed_' ~ p.object_id) -%}
                {%- if dep not in ['unknown', 'unavailable', ''] -%}
                  {%- set ns.dur = ((as_timestamp(now()) - as_timestamp(dep, 0)) / 60) | int -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.dur }}
          {%- else -%}0{%- endif -%}

