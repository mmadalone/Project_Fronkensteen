# =============================================================================
# AI Routine Tracker Package — Task 16 of Voice Context Architecture
# =============================================================================
# Architecture spec: voice_context_architecture.md § "Routine Fingerprinting"
#   and "Prediction Engine Build Path"
#
# Provides:
#   sensor.ai_routine_stage — current routine position (state.set, e.g.,
#     "evening_weekday_living_room_bed:step_3_of_4" or "none")
#   sensor.ai_routine_deviation — last deviation description (state.set, e.g.,
#     "expected:bathroom actual:living_room" or "none")
#   sensor.ai_routine_tracker_status attr eta_raw — JSON for ETA template sensor
#   input_boolean.ai_routine_tracking_enabled — kill switch (ON = active)
#   sensor.ai_bedtime_predicted — set "on" when a bed-ending routine
#     starts; arms bedtime automations for instant response (state.set)
#   sensor.ai_routine_eta — estimated minutes to routine completion
#   sensor.ai_routine_tracker_status — created by pyscript (last op result)
#
# Services (pyscript):
#   pyscript.routine_extract_fingerprints — build routine fingerprints
#     from Task 15 frequency tables
#   pyscript.routine_track_position — match transition against fingerprints,
#     update routine stage + ETA, detect deviations
#
# State trigger (pyscript):
#   FP2 binary sensors → detect transitions → position tracking
#
# Time trigger (pyscript):
#   Daily fingerprint refresh at 04:15 AM
#
# CREEP FACTOR GATE (hard design constraint):
#   Predictions are INVISIBLE. They arm automations, they NEVER announce
#   routine positions to the user. "Heading to bed soon?" is OK.
#   "I see you're in step 3 of your bedtime routine" is NOT.
#
# Dependencies:
#   pyscript/routine_fingerprint.py
#   pyscript/presence_patterns.py (Task 15 frequency tables)
#   pyscript/memory.py (L2 memory)
#   packages/ai_test_harness.yaml (test mode toggle)
#
# Deployed: 2026-03-02
# =============================================================================

# ── INPUT HELPERS ────────────────────────────────────────────────────────────

# input_text: moved to helpers_input_text.yaml (C5 consolidation)

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)

# ── TEMPLATE SENSORS ─────────────────────────────────────────────────────────

template:
  - sensor:
      # Estimated minutes remaining in the current routine. Shows 0 when
      # not tracking a routine. Computed from avg step dwell times of the
      # matched fingerprint.
      - name: "AI Routine ETA"
        unique_id: ai_routine_eta
        icon: mdi:timer-sand
        unit_of_measurement: "min"
        state: >-
          {%- set raw = state_attr('sensor.ai_routine_tracker_status', 'eta_raw') | default('', true) -%}
          {%- if raw not in ['', 'unknown', 'unavailable', 'None'] and '{' in raw -%}
            {{ (raw | from_json).eta_minutes | default(0) | round(0) | int }}
          {%- else -%}
            0
          {%- endif -%}
        attributes:
          fingerprint_id: >-
            {%- set raw = state_attr('sensor.ai_routine_tracker_status', 'eta_raw') | default('', true) -%}
            {%- if raw not in ['', 'unknown', 'unavailable', 'None'] and '{' in raw -%}
              {{ (raw | from_json).fingerprint_id | default('none') }}
            {%- else -%}
              none
            {%- endif -%}
          step: >-
            {%- set raw = state_attr('sensor.ai_routine_tracker_status', 'eta_raw') | default('', true) -%}
            {%- if raw not in ['', 'unknown', 'unavailable', 'None'] and '{' in raw -%}
              {{ (raw | from_json).step | default(0) }}
            {%- else -%}
              0
            {%- endif -%}
          total: >-
            {%- set raw = state_attr('sensor.ai_routine_tracker_status', 'eta_raw') | default('', true) -%}
            {%- if raw not in ['', 'unknown', 'unavailable', 'None'] and '{' in raw -%}
              {{ (raw | from_json).total | default(0) }}
            {%- else -%}
              0
            {%- endif -%}

