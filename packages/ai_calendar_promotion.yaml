# =============================================================================
# AI Calendar Promotion Package — Task 18a of Voice Context Architecture
# =============================================================================
# Architecture spec: voice_context_architecture.md § "Google Calendar — Detailed"
#
# Promotes Google Calendar events from L3 (API) to L2 (memory) for fast
# agent access. Near-real-time sync via midnight cron + state-change trigger.
#
# Provides:
#   input_boolean.ai_calendar_promotion_enabled — kill switch (default ON)
#   input_boolean.ai_calendar_stale — set when calendar API fails
#   input_text.ai_calendar_last_sync — ISO timestamp of last successful sync
#   input_text.ai_calendar_today_summary — today's events (L1 quick access)
#   input_text.ai_calendar_tomorrow_summary — tomorrow's events (L1)
#   automation.ai_calendar_pre_event_reminder — 15 min TTS reminder via dedup
#   sensor.ai_calendar_promotion_status — created by pyscript (last op status)
#
# Services (pyscript):
#   pyscript.calendar_promote_now — on-demand promotion (force=true bypasses cache)
#   pyscript.calendar_create_event — create calendar event + L2/L1 refresh (C8)
#   pyscript.calendar_find_events — search events with UIDs (C8b, via calendar_utils)
#   pyscript.calendar_delete_event — delete event by UID or summary match (C8b)
#   pyscript.calendar_edit_event — edit event via delete + recreate (C8b)
#
# Test mode:
#   When ai_test_mode=ON, pyscript uses mock data from
#   input_text.ai_test_calendar_event (defined in ai_predictive_schedule.yaml).
#   Pre-event reminder automation is gated: does not fire in test mode.
#
# Dependencies:
#   pyscript/calendar_promote.py
#   pyscript/notification_dedup.py (Task 14 — dedup_announce)
#   packages/ai_test_harness.yaml (ai_test_mode toggle)
#   packages/ai_predictive_schedule.yaml (ai_test_calendar_event helper)
#   calendar.miquel_angel_cano_gmail_com (Google Calendar integration)
#
# Deployed: 2026-03-02
# =============================================================================

# ── INPUT HELPERS ────────────────────────────────────────────────────────────

# input_boolean: moved to helpers_input_boolean.yaml (C3 consolidation)

