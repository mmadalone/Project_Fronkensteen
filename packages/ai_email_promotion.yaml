# =============================================================================
# AI Email Priority Filter — Task 18b of Voice Context Architecture
# =============================================================================
# Architecture spec: voice_context_architecture.md § "Gmail / Email — Detailed"
#
# Filters incoming IMAP emails and promotes only priority messages to L2 memory.
# High-volume inbox filtering: known contacts + keyword matches get through.
# Everything else is filtered out — never promoted.
#
# Provides:
#   input_boolean.ai_email_promotion_enabled — kill switch (default ON)
#   input_text.ai_email_known_contacts — comma-separated trusted senders/domains
#   input_text.ai_email_priority_keywords — comma-separated custom keywords
#   sensor.ai_email_last_priority — last priority email subject (state.set)
#   sensor.ai_email_priority_count — unread priority email count
#   automation.ai_email_priority_filter — IMAP trigger → pyscript filter
#   sensor.ai_email_promotion_status — created by pyscript (last op status)
#   sensor.ai_email_priority_count — template mirror of input_number for dashboard
#
# Services (pyscript):
#   pyscript.email_promote_process — process incoming email through filter
#   pyscript.email_clear_count — reset counter ("I've read my emails")
#
# Test mode:
#   When ai_test_mode=ON, pyscript logs filter decisions but does NOT write
#   to L2 or announce via TTS.
#
# Privacy:
#   - Email data is ALWAYS user-scoped (scope: "user", never "household")
#   - L2 keys include ":miquel:" for per-user enforcement
#   - Suppressed entirely when identity confidence < 70%
#   - Guest mode: email completely invisible
#
# Dependencies:
#   pyscript/email_promote.py
#   pyscript/notification_dedup.py (Task 14 — dedup_announce for urgent TTS)
#   pyscript/memory.py (L2 memory)
#   packages/ai_test_harness.yaml (ai_test_mode toggle)
#   packages/ai_identity.yaml (identity confidence sensors)
#   IMAP integration — entry_id: 01KJDGKRNXQVVSPH5NT7V5P87E
#
# Deployed: 2026-03-02
# =============================================================================

