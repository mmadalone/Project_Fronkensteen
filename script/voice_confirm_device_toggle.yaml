blueprint:
  name: "Voice – Confirm Device Toggle (tool script)"
  description: |
    ## Version 1.0

    SCRIPT TOOL: Ask for voice confirmation before toggling a device on or off.

    Uses `assist_satellite.ask_question` to confirm, then toggles the device
    and announces the result. Supports both on and off directions from a
    single blueprint — create one instance per direction.

    Designed to work with the `va_confirmation_dialog` automation blueprint,
    which routes voice commands to this script.

    HOW TO USE
    ----------
    1. Create one instance per action, e.g.:
         - script.confirm_turning_off_madteevee (direction: off)
         - script.confirm_turning_on_madteevee (direction: on)

    2. Pair with `va_confirmation_dialog` automation blueprint to trigger
       on voice commands like "turn off madteevee".

  domain: script
  author: Madalone + Assistant
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/script/voice_confirm_device_toggle.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    core:
      name: "① Core configuration"
      icon: mdi:toggle-switch
      collapsed: false
      input:
        target_entity:
          name: "Target device"
          description: "The switch/light/etc. entity to toggle."
          selector:
            entity: {}

        toggle_direction:
          name: "Toggle direction"
          description: "Whether to turn the device ON or OFF when confirmed."
          default: "off"
          selector:
            select:
              options:
                - "on"
                - "off"

        satellite_entity:
          name: "Assist Satellite"
          description: "The voice satellite to use for the confirmation dialog."
          selector:
            entity:
              domain: assist_satellite

    messages:
      name: "② Messages"
      icon: mdi:message-text
      collapsed: true
      input:
        question:
          name: "Confirmation question"
          description: "The question asked before toggling."
          default: "Are you sure?"
          selector:
            text: {}

        confirm_message:
          name: "Confirm announcement"
          description: "Announced when the user confirms."
          default: "Done."
          selector:
            text: {}

        cancel_message:
          name: "Cancel announcement"
          description: "Announced when the user cancels."
          default: "Okay, cancelled."
          selector:
            text: {}

mode: single
max_exceeded: silent

variables:
  target_entity: !input target_entity
  toggle_direction: !input toggle_direction
  satellite_entity: !input satellite_entity
  confirm_message: !input confirm_message
  cancel_message: !input cancel_message

sequence:
  - alias: "Ask for confirmation"
    action: assist_satellite.ask_question
    data:
      entity_id: "{{ satellite_entity }}"
      question: !input question
      answers:
        - id: "yes"
          sentences:
            - "yes"
            - "yeah"
            - "si"
            - "sí"
            - "affirmative"
            - "sure"
            - "go ahead"
            - "do it"
        - id: "no"
          sentences:
            - "no"
            - "nope"
            - "cancel"
            - "don't"
            - "never mind"
    response_variable: answer

  - alias: "Branch on answer"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ answer.id == 'yes' }}"
        sequence:
          - alias: "Toggle device"
            action: >-
              {{ 'homeassistant.turn_off' if toggle_direction == 'off' else 'homeassistant.turn_on' }}
            target:
              entity_id: "{{ target_entity }}"
          - alias: "Confirm announcement"
            action: assist_satellite.announce
            target:
              entity_id: "{{ satellite_entity }}"
            data:
              message: "{{ confirm_message }}"
    default:
      - alias: "Cancel announcement"
        action: assist_satellite.announce
        target:
          entity_id: "{{ satellite_entity }}"
        data:
          message: "{{ cancel_message }}"
