blueprint:
  name: "Voice – Memory Semantic Search (tool script)"
  description: |
    ## Version 1.0

    SCRIPT TOOL: Semantic (meaning-based) memory search via sqlite-vec.

    Wraps `pyscript.memory_semantic_search` — pure KNN vector similarity
    search against embedded L2 memories. Use when regular FTS5 search
    (via voice_memory_tool) returns no results, or when the user describes
    something in different words than how it was stored.

    PREREQUISITES
    -------------
    - Pyscript integration installed and configured
    - `pyscript/memory.py` deployed with sqlite-vec support
    - `vec0.so` compiled and deployed at `/config/vec0.so`
    - Memories must have embeddings (generated by `embedding_batch` nightly job)

    HOW TO USE
    ----------
    1. Create this script from the blueprint:
         script.voice_memory_semantic

    2. In this script's settings:
         - Adjust default_limit and max_limit if needed.

    3. Expose script.voice_memory_semantic to Assist (Settings → Entities → toggle).

    4. Add to each conversation agent's system prompt:

       ---
       TOOL: script.voice_memory_semantic
       --------------------------------
       Purpose:
         - Search memories by meaning, not exact keywords.

       Use this when:
         - Regular memory search returns no results.
         - The user asks about a topic using different words than stored.

       Arguments: query (natural language), limit (1-10, default 5).
       Try regular search first — this costs one embedding API call.
       ---

  domain: script
  author: Madalone + Assistant
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/script/voice_memory_semantic_search.yaml

  input:
    # =========================================================================
    # ① CORE CONFIGURATION
    # =========================================================================
    core:
      name: "① Core configuration"
      icon: mdi:brain
      description: "Configure search limits for semantic memory queries."
      collapsed: false
      input:
        default_limit:
          name: "Default result limit"
          description: |
            Number of results to return when the LLM does not specify a limit.
          default: 5
          selector:
            number:
              min: 1
              max: 10
              mode: slider

        max_limit:
          name: "Maximum result limit"
          description: |
            Hard cap on results per query. Prevents the LLM from requesting
            an excessive number of results. The LLM-provided limit is clamped
            to this value.
          default: 10
          selector:
            number:
              min: 1
              max: 20
              mode: slider

fields:
  query:
    name: Query
    description: Natural language query to find semantically similar memories.
    required: true
    selector:
      text:
        multiline: true
  limit:
    name: Limit
    description: Maximum number of results.
    default: 5
    selector:
      number:
        min: 1
        max: 20

mode: single
max_exceeded: silent

variables:
  default_limit: !input default_limit
  max_limit: !input max_limit
  clamped_limit: >-
    {{ [1, [limit | default(default_limit) | int(default_limit), max_limit] | min] | max }}

sequence:
  - alias: "Call pyscript.memory_semantic_search with clamped limit"
    action: pyscript.memory_semantic_search
    data:
      query: "{{ query }}"
      limit: "{{ clamped_limit }}"
    response_variable: result
    continue_on_error: true

  - alias: "Stop: "
    stop: ""
    response_variable: result
