blueprint:
  name: "Music — Approve Staged Compositions"
  description: >
    Move music compositions from staging to production cache.
    Compositions generated via batch or manual calls land in staging
    for review. This script approves them for playback use.
  domain: script
  author: madalone
  source_url: https://github.com/mmadalone/Project_Fronkensteen/blob/main/script/music_compose_approve.yaml
  homeassistant:
    min_version: "2024.10.0"
  input:
    approval:
      name: "① Approval Settings"
      icon: mdi:check-circle
      collapsed: false
      input:
        approve_mode:
          name: Approve mode
          description: >
            all = approve everything in staging.
            by_agent = approve only a specific agent's compositions.
            by_content_type = approve only a specific content type.
          default: all
          selector:
            select:
              options:
                - label: "All staged compositions"
                  value: all
                - label: "By agent"
                  value: by_agent
                - label: "By content type"
                  value: by_content_type
        agent_filter:
          name: Agent filter
          description: >
            When approve mode is "by_agent", only approve this agent's files.
            (e.g. rick, quark, deadpool, kramer, portuondo)
          default: ""
          selector:
            text:
        content_type_filter:
          name: Content type filter
          description: >
            When approve mode is "by_content_type", only approve this type.
            (e.g. theme, chime, thinking, stinger, wake_melody, bedtime)
          default: ""
          selector:
            text:

variables:
  _mode: !input approve_mode
  _agent: !input agent_filter
  _type: !input content_type_filter

sequence:
  - alias: "Approve staged compositions"
    action: pyscript.music_compose_approve
    response_variable: result
    data:
      approve_mode: "{{ _mode }}"
      agent_filter: "{{ _agent }}"
      content_type_filter: "{{ _type }}"
    continue_on_error: true

  - alias: "Notify result"
    action: persistent_notification.create
    data:
      title: "Music Compositions Approved"
      message: >-
        Moved {{ (result | default({})).get('moved', '?') }} files to production.
        Skipped {{ (result | default({})).get('skipped', '?') }} files.
      notification_id: music_compose_approve

  - stop: "Approval complete"
    response_variable: result
